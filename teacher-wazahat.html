<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضاحت نامہ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/jameel-noori-nastaleeq" rel="stylesheet" />
    <style>
        body { font-family: 'Jameel Noori Nastaleeq', serif; background-color: #f3f4f6; }
        .official-card { border-top: 8px solid #b91c1c; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden official-card">
        <div class="bg-gray-50 p-6 border-b text-center">
            <h1 class="text-3xl font-bold text-red-800">وضاحت نامہ</h1>
            <p class="text-gray-600 mt-2">براہِ کرم کمزور تعلیمی نتیجے کی وجوہات درج کریں</p>
        </div>

        <div class="p-8">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
        <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
            <span class="text-gray-500 block text-xs">درجہ:</span>
            <span id="display-class" class="font-bold text-blue-900 text-sm md:text-base">-</span>
        </div>
        <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
            <span class="text-gray-500 block text-xs">نام استاد:</span>
            <span id="display-teacher" class="font-bold text-blue-900 text-sm md:text-base">-</span>
        </div>
        <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
            <span class="text-gray-500 block text-xs">مضمون:</span>
            <span id="display-subject" class="font-bold text-blue-900 text-sm md:text-base">-</span>
        </div>
        <div class="bg-red-50 p-3 rounded-lg border border-red-100">
            <span class="text-gray-500 block text-xs">فیصد:</span>
            <span id="display-perc" class="font-bold text-red-700 text-lg font-sans">-</span>
        </div>
        <div class="bg-red-50 p-3 rounded-lg border border-red-100">
            <span class="text-gray-500 block text-xs">کیفیت:</span>
            <span id="display-kef" class="font-bold text-red-700 text-sm md:text-base">-</span>
        </div>
    </div>

    <form id="wazahat-form" class="space-y-6">
        <div>
            <label class="block text-xl mb-2 font-bold text-gray-700 underline decoration-red-200">آپ کی وضاحت (Explanation):</label>
            <textarea id="explanation-text" required rows="6" 
                class="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-red-500 focus:outline-none text-xl leading-relaxed"
                placeholder="نتیجہ کمزور رہنے کی وجوہات اور آئندہ کے لیے بہتری کا منصوبہ یہاں تفصیل سے لکھیں۔۔۔"></textarea>
        </div>

        <button type="submit" id="submit-btn"
            class="w-full bg-red-700 hover:bg-red-800 text-white text-2xl py-3 rounded-lg shadow-lg transition duration-300 font-bold">
            وضاحت جمع کرائیں
        </button>
    </form>

    <div id="success-msg" class="hidden mt-6 p-6 bg-green-100 text-green-800 rounded-lg shadow-inner">
        <div class="text-center">
            <h2 class="text-3xl font-bold mb-2">جزاک اللہ خیرا!</h2>
            <p class="text-xl">آپ کی وضاحت کامیابی سے ریکارڈ میں جمع کر لی گئی ہے۔</p>
        </div>
        <hr class="my-4 border-green-200">
        <div class="bg-white p-4 rounded-lg border border-green-200">
            <p class="text-xs text-gray-500 mb-2 font-sans">آپ کی بھیجی گئی وضاحت:</p>
            <p id="final-wazahat-display" class="text-lg text-gray-800 leading-relaxed italic"></p>
        </div>
    </div>
</div>

        <div class="bg-gray-100 p-4 text-center text-xs text-gray-500 font-sans">
            &copy; مجلس تعلیمی امور جامعۃ المدینہ ہند
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app",
        messagingSenderId: "449137002393",
        appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
        measurementId: "G-1PHNJQWNPZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Data Fill karne ka function
    // 1. Data Fill function mein Class add karein
const fillData = () => {
    const urlParams = new URLSearchParams(window.location.search);
    
    document.getElementById('display-class').innerText = decodeURIComponent(urlParams.get('class') || '-');
    document.getElementById('display-teacher').innerText = decodeURIComponent(urlParams.get('teacher') || '-');
    document.getElementById('display-subject').innerText = decodeURIComponent(urlParams.get('subject') || '-');
    document.getElementById('display-perc').innerText = (urlParams.get('perc') || '-') + "%";
    document.getElementById('display-kef').innerText = decodeURIComponent(urlParams.get('kef') || '-');
};

// 2. Form Submission ke andar success par text set karein
// (updateDoc ke baad ye line add karein)
document.getElementById('submitted-text-display').innerText = text; 
document.getElementById('wazahat-form').classList.add('hidden');
document.getElementById('success-msg').classList.remove('hidden');;

    // Form Submission
    const wForm = document.getElementById('wazahat-form');
    if (wForm) {
        wForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const text = document.getElementById('explanation-text').value;
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            const subjectKey = decodeURIComponent(urlParams.get('subject') || '-').replace(/\./g, '_');

            if (!docId) return alert("Error: Document ID nahi mili.");

            btn.disabled = true;
            btn.innerText = "ارسال کیا جا رہا ہے...";

            try {
                const docRef = doc(db, "asatiza_wise_results", docId);
                await updateDoc(docRef, {
                    [`wazahat_map.${subjectKey}`]: text,
                    [`wazahat_date_map.${subjectKey}`]: new Date().toISOString(),
                    wazahat_status: "Submitted"
                });

                document.getElementById('wazahat-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("معذرت! ڈیٹا محفوظ نہیں ہو سکا۔ دوبارہ کوشش کریں۔");
                btn.disabled = false;
                btn.innerText = "وضاحت جمع کرائیں";
            }
        });
    }

    // Run fillData
    fillData();
    </script>
</body>
</html>
