<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماہانہ جائزہ وضاحت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/jameel-noori-nastaleeq" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Jameel Noori Nastaleeq', serif; background-color: #f3f4f6; }
        .official-card { border-top: 8px solid #b91c1c; }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden official-card" id="main-card">
        
        <!-- HEADER -->
        <div class="bg-gray-50 p-6 border-b text-center">
            <h1 id="page-title" class="text-3xl font-bold text-red-800">ماہانہ جائزہ وضاحت</h1>
            <p id="page-subtitle" class="text-gray-600 mt-2">ماہانہ کارکردگی کے حوالے سے مشترکہ وضاحت درج کریں</p>
        </div>

        <div class="p-5 md:p-8">

            <!-- SECTION 1: STRICT AJEER CODE LOGIN -->
            <div id="login-section" class="hidden text-center py-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">لاگ ان کریں</h2>
                <div class="max-w-xs mx-auto space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1 font-sans">Ajeer Code</label>
                        <input type="text" id="ajeer-code-input" class="w-full p-3 border-2 border-gray-300 rounded-lg text-center font-sans text-xl focus:border-red-500 focus:outline-none" placeholder="اپنا اجیر کوڈ درج کریں" required>
                    </div>
                    <!-- Error Message Box -->
                    <p id="teacher-code-error" class="hidden text-red-600 text-sm mt-1 font-bold"></p>
                    
                    <button id="login-btn" class="w-full bg-teal-700 hover:bg-teal-800 text-white text-xl py-3 rounded-lg font-bold shadow transition">
                        آگے بڑھیں
                    </button>
                </div>
            </div>

            <!-- SECTION 2: MULTIPLE SUBJECTS (MOBILE RESPONSIVE) -->
            <div id="jaiza-details-box" class="hidden mb-8 bg-indigo-50 rounded-lg border border-indigo-100 overflow-hidden">
                <div class="flex flex-col md:flex-row bg-indigo-100 p-2 md:p-3 border-b border-indigo-200">
                    <div class="w-full md:w-1/3 text-center border-b md:border-b-0 md:border-l border-indigo-200 py-2">
                        <span class="text-indigo-600 block text-xs">مہینہ</span>
                        <span id="j-month" class="font-bold text-indigo-900 text-lg font-sans" dir="ltr">-</span>
                    </div>
                    <div class="w-full md:w-1/3 text-center border-b md:border-b-0 md:border-l border-indigo-200 py-2">
                        <span class="text-indigo-600 block text-xs">جامعہ</span>
                        <span id="j-jamia" class="font-bold text-indigo-900 text-lg">-</span>
                    </div>
                    <div class="w-full md:w-1/3 text-center py-2">
                        <span class="text-indigo-600 block text-xs">نام استاد</span>
                        <span id="j-teacher" class="font-bold text-indigo-900 text-lg">-</span>
                    </div>
                </div>
                <div class="p-4">
                    <p class="text-sm text-gray-600 mb-3 font-bold border-b pb-1">مطلوبہ مضامین (کمزور / مناسب):</p>
                    <ul id="j-subjects-list" class="space-y-3">
                        <!-- Subjects yahan aayenge -->
                    </ul>
                </div>
            </div>

            <!-- FORM SECTION -->
            <form id="wazahat-form" class="space-y-6 hidden">
                <div>
                    <label class="block text-xl mb-2 font-bold text-gray-700 underline decoration-red-200">آپ کی وضاحت (Explanation):</label>
                    <textarea id="explanation-text" required rows="6" 
                        class="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-red-500 focus:outline-none text-xl leading-relaxed"
                        placeholder="نتیجہ کمزور رہنے کی وجوہات اور آئندہ کے لیے بہتری کا منصوبہ یہاں تفصیل سے لکھیں۔۔۔"></textarea>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-red-700 hover:bg-red-800 text-white text-2xl py-3 rounded-lg shadow-lg transition duration-300 font-bold">
                    وضاحت جمع کرائیں
                </button>
            </form>

            <!-- SUCCESS / ALREADY SUBMITTED MESSAGE -->
            <div id="success-msg" class="hidden mt-6 p-5 bg-green-50 text-green-800 rounded-lg border border-green-200 shadow-sm">
                <div class="text-center">
                    <h2 id="success-title" class="text-3xl font-bold mb-2">جزاک اللہ خیرا!</h2>
                    <p id="success-desc" class="text-xl">آپ کی وضاحت کامیابی سے ریکارڈ میں جمع کر لی گئی ہے۔</p>
                    <p id="success-time" class="text-sm text-gray-500 mt-2 font-sans font-bold"></p>
                </div>
                <hr class="my-4 border-green-200">
                <div class="bg-white p-4 rounded-lg border border-green-100 text-right">
                    <p class="text-xs text-gray-500 mb-2 font-sans">آپ کی بھیجی گئی وضاحت:</p>
                    <p id="final-wazahat-display" class="text-lg text-gray-800 leading-relaxed italic"></p>
                </div>
            </div>

        </div>

        <div class="bg-gray-100 p-4 text-center text-xs text-gray-500 font-sans border-t">
            &copy; مجلس تعلیمی امور جامعۃ المدینہ ہند
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, collection, addDoc, getDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app",
        messagingSenderId: "449137002393",
        appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
        measurementId: "G-1PHNJQWNPZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode');

    // DOM Elements
    const jaizaBox = document.getElementById('jaiza-details-box');
    const loginSec = document.getElementById('login-section');
    const wForm = document.getElementById('wazahat-form');
    const submitBtn = document.getElementById('submit-btn');
    const codeError = document.getElementById('teacher-code-error'); // Error message element

    if (mode === 'jaiza') {
        loginSec.classList.remove('hidden');
        const sid = urlParams.get('sid'); 
        let verifiedAjeerCode = "";

        // Enter key se login karne ka option
        document.getElementById('ajeer-code-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const codeInput = document.getElementById('ajeer-code-input').value.trim();
            codeError.classList.add('hidden'); // Reset error
            
            if (!codeInput) { 
                codeError.textContent = 'براہ کرم اپنا اجیر کوڈ درج کریں۔';
                codeError.classList.remove('hidden');
                return; 
            }
            if (!sid) { 
                alert("لنک نامکمل ہے یا غلط ہے۔"); 
                return; 
            }

            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Wait...';
            loginBtn.disabled = true;

            try {
                // 1. Data load karein
                const docRef = doc(db, "jaiza_short_links", sid);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    alert("یہ لنک ایکسپائر ہو چکا ہے یا غلط ہے۔");
                    loginBtn.innerText = "آگے بڑھیں";
                    loginBtn.disabled = false;
                    return;
                }

                const payloadData = docSnap.data();

                // 🌟 AJEER CODE VALIDATION (STRICT CHECK) 🌟
                if (payloadData.expectedCode && codeInput !== payloadData.expectedCode) {
                    codeError.textContent = 'اجیر کوڈ درست نہیں ہے، دوبارہ چیک کریں۔';
                    codeError.classList.remove('hidden');
                    loginBtn.innerText = "آگے بڑھیں";
                    loginBtn.disabled = false;
                    return; // Rok dega, form open nahi hoga
                }

                verifiedAjeerCode = codeInput;
                window.wazahatContext = payloadData; 

                // 2. Check karein kya Wazahat pehle se jama ho chuki hai?
                const q = query(collection(db, "mahana_wazahat_records"), where("linkId", "==", sid));
                const existingSnap = await getDocs(q);

                loginSec.classList.add('hidden');
                jaizaBox.classList.remove('hidden');

                // Header set karein
                document.getElementById('j-jamia').innerText = payloadData.jamia;
                document.getElementById('j-teacher').innerText = payloadData.teacher;
                document.getElementById('j-month').innerText = payloadData.month; 

                // Subjects list set karein
                const ul = document.getElementById('j-subjects-list');
                ul.innerHTML = '';
                payloadData.data.forEach(sub => {
                    const color = sub.grade === 'کمزور' ? 'text-red-700' : 'text-amber-700';
                    const bgColor = sub.grade === 'کمزور' ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200';
                    ul.innerHTML += `
                        <li class="${bgColor} p-3 rounded-lg border flex flex-col md:flex-row md:justify-between md:items-center shadow-sm">
                            <span class="font-bold text-gray-800 text-sm md:text-base mb-1 md:mb-0">${sub.class} <span class="text-gray-400 mx-1">|</span> ${sub.book}</span>
                            <span class="font-sans font-bold ${color}">${sub.percent}% (${sub.grade})</span>
                        </li>
                    `;
                });

                // Agar pehle se submit hai to message dikhayein
                if (!existingSnap.empty) {
                    const existingData = existingSnap.docs[0].data();
                    const sDate = new Date(existingData.timestamp);
                    const formattedDate = sDate.toLocaleDateString('ur-PK') + " - " + sDate.toLocaleTimeString('ur-PK', {hour: '2-digit', minute:'2-digit'});

                    document.getElementById('success-title').innerText = "وضاحت موصول ہو چکی ہے";
                    document.getElementById('success-desc').innerText = "آپ کا جواب پہلے ہی ریکارڈ میں محفوظ ہے۔";
                    document.getElementById('success-time').innerText = `Date: ${formattedDate}`;
                    document.getElementById('final-wazahat-display').innerText = existingData.wazahat;
                    
                    document.getElementById('success-msg').classList.remove('hidden');
                } else {
                    // Naya form dikhayein
                    wForm.classList.remove('hidden');
                }

            } catch (error) {
                console.error(error);
                alert("ڈیٹا لوڈ کرنے میں مسئلہ ہوا۔");
                loginBtn.innerText = "آگے بڑھیں";
                loginBtn.disabled = false;
            }
        });

        // Nayi Wazahat Submit karna
        wForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('explanation-text').value;
            const payloadData = window.wazahatContext;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ارسال کیا جا رہا ہے...';

            try {
                const now = new Date();
                await addDoc(collection(db, "mahana_wazahat_records"), {
                    jamia: payloadData.jamia,
                    teacherName: payloadData.teacher,
                    ajeerCode: verifiedAjeerCode,
                    month: payloadData.month,
                    subjectsDetails: payloadData.data,
                    wazahat: text,
                    linkId: sid,
                    timestamp: now.toISOString()
                });

                wForm.classList.add('hidden');
                
                const formattedDate = now.toLocaleDateString('ur-PK') + " - " + now.toLocaleTimeString('ur-PK', {hour: '2-digit', minute:'2-digit'});
                document.getElementById('success-time').innerText = `Date: ${formattedDate}`;
                document.getElementById('final-wazahat-display').innerText = text;
                document.getElementById('success-msg').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("معذرت! ڈیٹا محفوظ نہیں ہو سکا۔ دوبارہ کوشش کریں۔");
                submitBtn.disabled = false;
                submitBtn.innerText = "وضاحت جمع کرائیں";
            }
        });
    }
    </script>
</body>
</html>
