<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سرکاری وضاحت فارم | Official Explanation Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/jameel-noori-nastaleeq" rel="stylesheet" />
    <style>
        body { font-family: 'Jameel Noori Nastaleeq', serif; background-color: #f3f4f6; }
        .official-card { border-top: 8px solid #b91c1c; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden official-card">
        <div class="bg-gray-50 p-6 border-b text-center">
            <h1 class="text-3xl font-bold text-red-800">تعلیمی وضاحت فارم</h1>
            <p class="text-gray-600 mt-2">براہِ کرم کمزور تعلیمی نتیجے کی وجوہات درج کریں</p>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-2 gap-4 mb-8 bg-blue-50 p-4 rounded-lg text-sm md:text-base">
                <div>
                    <span class="text-gray-500 block">نام استاد:</span>
                    <span id="display-teacher" class="font-bold text-blue-900">-</span>
                </div>
                <div>
                    <span class="text-gray-500 block">مضمون:</span>
                    <span id="display-subject" class="font-bold text-blue-900">-</span>
                </div>
            </div>

            <form id="wazahat-form" class="space-y-6">
                <div>
                    <label class="block text-xl mb-2 font-bold text-gray-700">آپ کی وضاحت (Explanation):</label>
                    <textarea id="explanation-text" required rows="6" 
                        class="w-full p-4 border-2 border-gray-200 rounded-lg focus:border-red-500 focus:outline-none text-lg"
                        placeholder="یہاں اپنی بات تفصیل سے لکھیں۔۔۔"></textarea>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-red-700 hover:bg-red-800 text-white text-2xl py-3 rounded-lg shadow-lg transition duration-300 font-bold">
                    وضاحت جمع کرائیں
                </button>
            </form>

            <div id="success-msg" class="hidden mt-6 p-4 bg-green-100 text-green-800 rounded-lg text-center text-xl font-bold">
                جزاک اللہ خیرا! آپ کی وضاحت کامیابی سے جمع کر لی گئی ہے۔
            </div>
        </div>

        <div class="bg-gray-100 p-4 text-center text-xs text-gray-500">
            &copy; 2026 امتحانی کنٹرول بورڈ | یہ ایک سرکاری دستاویز ہے
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🟢 APNI FIREBASE CONFIG YAHAN COPY-PASTE KAREIN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL se data nikalna
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');
        const teacher = urlParams.get('teacher');
        const subject = urlParams.get('subject');

        document.getElementById('display-teacher').innerText = teacher;
        document.getElementById('display-subject').innerText = subject;

        // Form Submit
        document.getElementById('wazahat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const text = document.getElementById('explanation-text').value;

            btn.disabled = true;
            btn.innerText = "ارسال کیا جا رہا ہے...";

            try {
                // Firestore mein wazahat update karna
                const docRef = doc(db, "asatiza_wise_results", docId);
                await updateDoc(docRef, {
                    wazahat: text,
                    wazahat_date: new Date().toISOString(),
                    status: "submitted"
                });

                document.getElementById('wazahat-form').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("معذرت! ڈیٹا جمع نہیں ہو سکا۔ دوبارہ کوشش کریں۔");
                btn.disabled = false;
                btn.innerText = "وضاحت جمع کرائیں";
            }
        });
    </script>
</body>
</html>
