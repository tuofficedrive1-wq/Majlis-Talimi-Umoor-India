<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Asatiza Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        .urdu-font { font-family: 'Noto Nastaliq Urdu', serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .inner-table input { width: 100%; border: 1px solid #e2e8f0; text-align: center; font-size: 12px; padding: 4px; border-radius: 4px; }
        .inner-table input:focus { border-color: #0d9488; outline: none; background: #f0fdfa; }
        .teacher-row:nth-child(even) { background-color: #f9fafb; }
        th { font-weight: bold; color: #374151; }
    </style>
</head>
<body class="bg-gray-100 p-2 sm:p-6">

    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden border-t-4 border-teal-700">
        <div class="bg-white p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-bold urdu-font text-teal-800">اساتذہ وائز رزلٹ</h1>
            <div id="jamia-name-head" class="text-teal-600 font-bold border-b-2 border-teal-600"></div>
        </div>

        <div class="p-4">
            <div class="flex flex-wrap gap-4 mb-6 bg-teal-50 p-4 rounded-lg border border-teal-100 shadow-sm">
                <div class="w-full sm:w-auto">
                    <label class="block text-[10px] font-bold text-teal-600 mb-1">رپورٹنگ مہینہ (Month)</label>
                    <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]" id="display-month">---</div>
                </div>
                <div class="w-full sm:w-auto">
                    <label class="block text-[10px] font-bold text-teal-600 mb-1">امتحان (Exam Type)</label>
                    <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]" id="display-type">---</div>
                </div>
                <div class="w-full sm:w-auto">
                    <label class="block text-[10px] font-bold text-teal-600 mb-1">تعلیمی سال (Year)</label>
                    <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[100px]" id="display-year">---</div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-300">
                    <thead class="bg-teal-50 text-sm">
                        <tr>
                            <th class="border border-gray-300 p-2 w-10">نمبر</th>
                            <th class="border border-gray-300 p-2 w-48">نام استاد</th>
                            <th class="border border-gray-300 p-2 text-right px-4">تعلیمی تفصیلات (کلاس و مضمون وار)</th>
                            <th class="border border-gray-300 p-2 w-28">مجموعی فیصد %</th>
                        </tr>
                    </thead>
                    <tbody id="main-teacher-body">
                        </tbody>
                </table>
            </div>

            <div class="mt-10 flex justify-center border-t pt-8">
                <button onclick="window.print()" class="bg-teal-600 text-white px-12 py-3 rounded-xl font-bold text-lg hover:bg-teal-700 shadow-lg transform active:scale-95 transition">
                    پرنٹ نکالیں (Print)
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // URL Params load karein
            const params = new URLSearchParams(window.location.search);
            document.getElementById('jamia-name-head').innerText = params.get('jamia') || 'جامعہ کا نام';
            document.getElementById('display-month').innerText = params.get('month') || '---';
            document.getElementById('display-type').innerText = params.get('examType') || '---';
            document.getElementById('display-year').innerText = params.get('examYear') || '---';

            // Academic Structure load karein (Data Fetching)
            loadAsatizaFromStructure();
        });

        function loadAsatizaFromStructure() {
            const structureData = localStorage.getItem('academicStructure');
            if (!structureData) {
                document.getElementById('main-teacher-body').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">کوئی ڈیٹا نہیں ملا۔ براہ کرم پہلے سیٹ اپ مکمل کریں۔</td></tr>';
                return;
            }

            const data = JSON.parse(structureData);
            const teacherMap = {};

            // Classes se teachers aur unke subjects organize karein
            data.classes.forEach(cls => {
                cls.periods.forEach(p => {
                    if (!teacherMap[p.teacher]) {
                        teacherMap[p.teacher] = [];
                    }
                    teacherMap[p.teacher].push({
                        className: cls.className,
                        bookName: p.bookName
                    });
                });
            });

            const tbody = document.getElementById('main-teacher-body');
            tbody.innerHTML = '';
            let count = 1;

            for (const teacher in teacherMap) {
                const row = document.createElement('tr');
                row.className = "teacher-row border-b border-gray-200";
                
                let periodsHtml = teacherMap[teacher].map(p => `
                    <tr>
                        <td><input type="text" value="${p.className}" class="urdu-font bg-gray-50" readonly></td>
                        <td><input type="text" value="${p.bookName}" class="urdu-font bg-gray-50" readonly></td>
                        <td><input type="number" class="total-std" oninput="calculateTeacher(${count})"></td>
                        <td><input type="number" class="passed-std" oninput="calculateTeacher(${count})"></td>
                        <td><input type="text" class="period-perc font-bold bg-gray-100" readonly></td>
                    </tr>
                `).join('');

                row.innerHTML = `
                    <td class="border p-2 text-center text-sm font-bold">${count}</td>
                    <td class="border p-2 font-bold urdu-font text-teal-900">${teacher}</td>
                    <td class="border p-2">
                        <table class="w-full inner-table" id="periods-table-${count}">
                            <thead class="bg-gray-50 text-[10px]">
                                <tr>
                                    <th>درجہ</th>
                                    <th>کتاب</th>
                                    <th>کل طلبہ</th>
                                    <th>کامیاب</th>
                                    <th>فیصد</th>
                                </tr>
                            </thead>
                            <tbody>${periodsHtml}</tbody>
                        </table>
                    </td>
                    <td class="border p-2 text-center">
                        <div id="total-perc-${count}" class="text-lg font-bold text-teal-700">0%</div>
                    </td>
                `;
                tbody.appendChild(row);
                count++;
            }
        }

        function calculateTeacher(tIdx) {
            const rows = document.querySelectorAll(`#periods-table-${tIdx} tbody tr`);
            let totalT = 0, totalP = 0;

            rows.forEach(row => {
                const t = parseFloat(row.querySelector('.total-std').value) || 0;
                const p = parseFloat(row.querySelector('.passed-std').value) || 0;
                const percInput = row.querySelector('.period-perc');

                if (t > 0) {
                    const res = (p / t) * 100;
                    percInput.value = res.toFixed(1) + '%';
                    totalT += t;
                    totalP += p;
                } else {
                    percInput.value = '';
                }
            });

            const overall = totalT > 0 ? ((totalP / totalT) * 100).toFixed(1) : 0;
            document.getElementById(`total-perc-${tIdx}`).innerText = overall + '%';
        }
    </script>
</body>
</html>
