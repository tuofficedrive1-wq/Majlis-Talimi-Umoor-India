<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asatiza Wise Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.cdnfonts.com/css/jameel-noori-nastaleeq" rel="stylesheet" />
  <style>
  body { font-family:'Jameel Noori Nastaleeq', serif; }
  input,button,textarea,select { font-family:'Jameel Noori Nastaleeq', serif; }

  /* Responsive font scaling */
  html { font-size:16px; }
  @media (min-width:768px){ html{font-size:18px;} }
  @media (min-width:1280px){ html{font-size:20px;} }

  .inner-table input{
    width:100%;
    border:1px solid #e2e8f0;
    text-align:center;
    padding:6px;
    border-radius:6px;
    font-size:0.95rem;
  }
  .teacher-row:nth-child(even){ background:#f9fafb; }

  /* Mobile table layout */
  @media (max-width:640px){
    table{font-size:0.95rem;}
    th,td{padding:8px 6px;}
    .inner-table input{font-size:0.9rem;padding:6px;}
  }

  /* Desktop readability */
  @media (min-width:1024px){
    table{font-size:1.05rem;}
    th{font-size:1rem;}
  }
</style>
</head>
<body class="bg-gray-100 p-2 sm:p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden border-t-4 border-teal-700">
  <div class="bg-white p-4 flex justify-between items-center border-b">
    <h1 class="text-xl font-bold text-teal-800">اساتذہ وائز رزلٹ</h1>
    <div id="jamia-name-head" class="text-teal-600 font-bold border-b-2 border-teal-600"></div>
  </div>

  <div class="p-4">
    <div class="flex flex-wrap gap-4 mb-6 bg-teal-50 p-4 rounded-lg border border-teal-100 shadow-sm">
      <div>
        <label class="block text-[10px] font-bold text-teal-600 mb-1">امتحان</label>
        <div id="display-type" class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]">---</div>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-teal-600 mb-1">تعلیمی سال</label>
        <div id="display-year" class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]">---</div>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse border border-gray-300">
        <thead class="bg-teal-50 text-sm">
          <tr>
            <th class="border p-2 w-10">نمبر</th>
            <th class="border p-2 w-48">نام استاد</th>
            <th class="border p-2">تفصیل</th>
            <th class="border p-2 w-28">مجموعی فیصد</th>
          </tr>
        </thead>
        <tbody id="main-teacher-body"></tbody>
      </table>
    </div>

    <div class="mt-6 flex items-center justify-between">
      <button onclick="addTeacherRow()" class="w-44 bg-slate-800 text-white py-2.5 rounded-lg font-bold text-sm hover:bg-slate-700">+ استاذ شامل کریں</button>
      <div class="flex gap-2">
        <button id="lock-btn" onclick="toggleLock()" class="hidden bg-red-600 text-white px-6 py-2 rounded-lg font-bold">رزلٹ لاک کریں 🔒</button>
        <button onclick="saveData()" class="w-44 bg-teal-600 text-white py-2.5 rounded-lg font-bold text-sm hover:bg-teal-700">محفوظ کریں</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 Firebase config apna lagayein
const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.appspot.com",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508"
        };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
// ===== Params & Header =====
const params = new URLSearchParams(window.location.search);
const jamiaName = params.get('jamia') || 'Jamia';
const examType = params.get('examType') || '';
const examYear = params.get('examYear') || '';
const isAdmin = params.get('role') === 'admin';
const lockKey = `locked_asatiza_${jamiaName}`;

async function loadFromFirestore(){
  const q=query(
    collection(db,"asatiza_results"),
    where("jamia","==",jamiaName),
    where("examYear","==",examYear),
    where("examType","==",examType)
  );

  const snap=await getDocs(q);
  if(snap.empty) return;

  const doc=snap.docs[0].data();
  doc.data.forEach(t=>addTeacherRow(t.teacher,t.periods));
}
  document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('jamia-name-head').innerText = decodeURIComponent(jamiaName);
  if (examType) document.getElementById('display-type').innerText = decodeURIComponent(examType);
  if (examYear) document.getElementById('display-year').innerText = decodeURIComponent(examYear);

  const lockBtn = document.getElementById('lock-btn');
  const isLocked = localStorage.getItem(lockKey) === 'true';

  if (isAdmin) {
    lockBtn.classList.remove('hidden');
    updateLockButton(isLocked);
  }
  if (isLocked) applyLockdown();

  loadSaved();
});

// ===== Lock System =====
function toggleLock(){
  const isLocked = localStorage.getItem(lockKey) === 'true';
  if(!isLocked){
    if(confirm('کیا آپ واقعی لاک کرنا چاہتے ہیں؟')){
      localStorage.setItem(lockKey,'true');
      applyLockdown();
      updateLockButton(true);
    }
  }else{
    if(confirm('انلاک کریں؟')){
      localStorage.removeItem(lockKey);
      removeLockdown();
      updateLockButton(false);
    }
  }
}
function updateLockButton(locked){
  const btn=document.getElementById('lock-btn');
  if(!btn) return;
  if(locked){
    btn.innerText='انلاک کریں 🔓';
    btn.classList.remove('bg-red-600');
    btn.classList.add('bg-orange-500');
  }else{
    btn.innerText='رزلٹ لاک کریں 🔒';
    btn.classList.remove('bg-orange-500');
    btn.classList.add('bg-red-600');
  }
}
function applyLockdown(){
  document.querySelectorAll('input, select, textarea, button:not(#lock-btn)').forEach(el=>{
    el.disabled=true;
    el.readOnly=true;
    el.style.pointerEvents='none';
    el.style.opacity='0.7';
  });
}
function removeLockdown(){
  document.querySelectorAll('input, select, textarea, button').forEach(el=>{
    el.disabled=false;
    el.readOnly=false;
    el.style.pointerEvents='auto';
    el.style.opacity='1';
  });
}

// ===== Teacher Rows =====
let teacherCount=0;
function addTeacherRow(name='',periods=null){
  teacherCount++;
  const tbody=document.getElementById('main-teacher-body');
  const tr=document.createElement('tr');
  tr.className='teacher-row border-b';

  let periodsHTML='';
  if(periods){
    periods.forEach(p=>{ periodsHTML+=periodRowHTML(p); });
  }else{
    for(let i=0;i<3;i++) periodsHTML+=periodRowHTML();
  }

  tr.innerHTML=`
    <td class='border p-2 text-center'>${teacherCount}</td>
    <td class='border p-2'>
      <div class='flex gap-2'>
        <input value='${name}' placeholder='نام استاد' class='w-full p-2 border rounded'>
        <button onclick='this.closest("tr").remove()' class='text-red-600'>🗑</button>
      </div>
    </td>
    <td class='border p-2'>
      <table class='w-full inner-table'>
        <thead class="bg-gray-100 text-[11px]">
          <tr>
            <th class="w-20">کلاس</th>
            <th>مضمون</th>
            <th class="w-16">کل</th>
            <th class="w-16">کامیاب</th>
            <th class="w-20">فیصد</th>
            <th class="w-24">کیفیت</th>
          </tr>
        </thead>
        <tbody id='periods-${teacherCount}'>${periodsHTML}</tbody>
      </table>
      <button onclick='addPeriodRow(${teacherCount})' class='text-teal-600 text-xs mt-1'>+ پیریڈ</button>
    </td>
    <td class='border p-2 text-center'>
      <div id='total-${teacherCount}' class='font-bold text-teal-700'>0%</div>
    </td>`;
  tbody.appendChild(tr);
}

function periodRowHTML(p={}){
  return `<tr>
    <td><input value='${p.class||""}' placeholder='کلاس'></td>
    <td><input value='${p.subject||""}' placeholder='مضمون'></td>
    <td><input type='number' value='${p.total||""}' oninput='calcRow(this)'></td>
    <td><input type='number' value='${p.passed||""}' oninput='calcRow(this)'></td>
    <td><input readonly value='${p.percentage||""}'></td>
    <td><input readonly value='${p.kaifiyat||""}'></td>
  </tr>`;
}

function addPeriodRow(id){
  document.getElementById(`periods-${id}`).insertAdjacentHTML('beforeend',periodRowHTML());
}

function calcRow(inp){
  const tr=inp.closest('tr');
  const t=parseFloat(tr.children[2].children[0].value)||0;
  const p=parseFloat(tr.children[3].children[0].value)||0;
  const perc=tr.children[4].children[0];
  const kaif=tr.children[5].children[0];

  if(t>0){
    const val=(p/t)*100;
    perc.value=val.toFixed(1)+'%';

    let k='',color='';
    if(val>=90){k='ممتاز';color='#059669';}
    else if(val>=70){k='بہتر';color='#2563eb';}
    else if(val>=60){k='مناسب';color='#d97706';}
    else if(val>=51){k='کمزور';color='#7c3aed';}
    else{k='تشویش ناک';color='#dc2626';}

    kaif.value=k;
    kaif.style.color=color;
    perc.style.color=color;
    perc.style.fontWeight='bold';
    kaif.style.fontWeight='bold';
  }else{
    perc.value='';
    kaif.value='';
    perc.style.color='';
    kaif.style.color='';
  }

  updateTotal(tr.closest('tbody').id.split('-')[1]);
}

function updateTotal(id){
  const rows=document.querySelectorAll(`#periods-${id} tr`);
  let t=0,p=0;
  rows.forEach(r=>{
    t+=parseFloat(r.children[2].children[0].value)||0;
    p+=parseFloat(r.children[3].children[0].value)||0;
  });
  const box=document.getElementById(`total-${id}`);
  if(t>0){
    const val=(p/t)*100;
    let k='',color='';
    if(val>=90){k='ممتاز';color='#059669';}
    else if(val>=70){k='بہتر';color='#2563eb';}
    else if(val>=60){k='مناسب';color='#d97706';}
    else if(val>=51){k='کمزور';color='#7c3aed';}
    else{k='تشویش ناک';color='#dc2626';}

    box.innerHTML=`<div style="color:${color};font-weight:bold">${val.toFixed(1)}%</div>
                   <div style="color:${color};font-size:12px">${k}</div>`;
  }else{
    box.innerText='0%';
  }
}

// ===== Save / Load =====
// 🔥 Firestore Save (Fixed & Unified)
async function saveData() {
  const jamiaName = document.getElementById('jamiaName').value;
  const examType = document.getElementById('examType').value;
  const examYear = document.getElementById('examYear').value;

  if (!jamiaName) {
    alert("براہ کرم جامعہ کا نام درج کریں۔");
    return;
  }

  const teacherRows = document.querySelectorAll(".teacher-row");
  const allTeachers = [];

  teacherRows.forEach(tr => {
    const teacherInput = tr.querySelector('input[placeholder="استاد کا نام"]');
    if (!teacherInput) return;

    const teacherName = teacherInput.value;
    const periods = [];
    
    tr.querySelectorAll('.inner-table tbody tr').forEach(r => {
      const i = r.querySelectorAll('input');
      if (i.length >= 6) {
        periods.push({
          class: i[0].value,
          subject: i[1].value,
          total: i[2].value,
          passed: i[3].value,
          percentage: i[4].value,
          kaifiyat: i[5].value
        });
      }
    });
    allTeachers.push({ teacher: teacherName, periods });
  });

  try {
    // Collection name set to 'asatiza_results'
    await addDoc(collection(db, "asatiza_results"), {
      jamia: jamiaName,
      examType: examType,
      examYear: examYear,
      data: allTeachers,
      timestamp: Date.now()
    });
    alert("رزلٹ کامیابی سے محفوظ ہو گیا ہے۔ ✅");
  } catch (e) {
    alert("Save error: " + e.message);
  }
}

// 🔥 Firestore Load (Fixed & Unified)
async function loadFirestore() {
  const jamiaName = document.getElementById('jamiaName').value;
  const examType = document.getElementById('examType').value;
  const examYear = document.getElementById('examYear').value;

  if (!jamiaName) {
    alert("لوڈ کرنے کے لیے جامعہ کا نام ضروری ہے۔");
    return;
  }

  // Same collection name 'asatiza_results'
  const q = query(
    collection(db, "asatiza_results"), 
    where("jamia", "==", jamiaName),
    where("examType", "==", examType),
    where("examYear", "==", examYear)
  );

  try {
    const snap = await getDocs(q);
    if (snap.empty) {
      alert("کوئی ریکارڈ نہیں ملا۔");
      return;
    }
    
    document.getElementById('main-teacher-body').innerHTML = "";
    const docData = snap.docs[0].data();
    
    docData.data.forEach(t => {
      if(typeof addTeacherRow === 'function') addTeacherRow(t.teacher, t.periods);
    });

    // 🔄 Recalculate colors & totals after load
    setTimeout(() => {
      document.querySelectorAll('#main-teacher-body .inner-table tbody tr').forEach(tr => {
        const inputs = tr.querySelectorAll('input');
        if(inputs[2] && inputs[2].value && typeof calcRow === 'function') {
          calcRow(inputs[2]);
        }
      });
      alert("ڈیٹا کامیابی سے لوڈ ہو گیا ہے۔ ✅");
    }, 100);

  } catch (e) {
    alert("Load error: " + e.message);
  }
}
  
</script>
</body>
</html>
