<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Asatiza Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        .urdu-font { font-family: 'Noto Nastaliq Urdu', serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .inner-table input { width: 100%; border: 1px solid #e2e8f0; text-align: center; font-size: 12px; padding: 4px; border-radius: 4px; }
        .inner-table input:focus { border-color: #0d9488; outline: none; background: #f0fdfa; }
        .teacher-row:nth-child(even) { background-color: #f9fafb; }
        th { font-weight: bold; color: #374151; }
    </style>
</head>
<body class="bg-gray-100 p-2 sm:p-6">

    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden border-t-4 border-teal-700">
        <div class="bg-white p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-bold urdu-font text-teal-800">اساتذہ وائز رزلٹ</h1>
            <div id="jamia-name-head" class="text-teal-600 font-bold border-b-2 border-teal-600"></div>
        </div>

        <div class="p-4">
           <div class="flex flex-wrap gap-4 mb-6 bg-teal-50 p-4 rounded-lg border border-teal-100 shadow-sm">
    <div class="w-full sm:w-auto">
        <label class="block text-[10px] font-bold text-teal-600 mb-1">رپورٹنگ مہینہ (Month)</label>
        <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]" id="display-month">---</div>
    </div>
    <div class="w-full sm:w-auto">
        <label class="block text-[10px] font-bold text-teal-600 mb-1">امتحان (Exam Type)</label>
        <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[120px]" id="display-type">---</div>
    </div>
    <div class="w-full sm:w-auto">
        <label class="block text-[10px] font-bold text-teal-600 mb-1">تعلیمی سال (Year)</label>
        <div class="p-2 bg-white border rounded font-bold text-gray-700 min-w-[100px]" id="display-year">---</div>
    </div>
</div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-300">
                    <thead class="bg-teal-50 text-sm">
                        <tr>
                            <th class="border border-gray-300 p-2 w-10">نمبر</th>
                            <th class="border border-gray-300 p-2 w-48">نام استاد</th>
                            <th class="border border-gray-300 p-2 text-right px-4">تعلیمی تفصیلات (کلاس و مضمون وار)</th>
                            <th class="border border-gray-300 p-2 w-28">مجموعی فیصد %</th>
                        </tr>
                    </thead>
                    <tbody id="main-teacher-body"></tbody>
                </table>
            </div>

            <button onclick="addTeacherRow()" class="mt-4 bg-gray-800 text-white px-5 py-2 rounded-lg text-sm hover:bg-gray-700 transition">
                + نیا استاد شامل کریں
            </button>

            <div class="mt-10 flex justify-center border-t pt-8">
                <button class="bg-teal-600 text-white px-12 py-3 rounded-xl font-bold text-lg hover:bg-teal-700 shadow-lg transform active:scale-95 transition">
                    ڈیٹا محفوظ کریں (Submit)
                </button>
            </div>
        </div>
    </div>

    <script>
        let teacherCount = 0;

       document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    
    // 1. URL se values hasil karein
    const jamiaName = params.get('jamia') || 'جامعہ کا نام';
    const selectedMonth = params.get('month');
    const selectedType = params.get('examType') || 'Half Yearly';
    const selectedYear = params.get('examYear') || '2025-26';

    // 2. UI mein labels set karein (Display Only)
    document.getElementById('jamia-name-head').innerText = jamiaName;
    if(document.getElementById('display-month')) document.getElementById('display-month').innerText = selectedMonth;
    if(document.getElementById('display-type'))  document.getElementById('display-type').innerText = selectedType;
    if(document.getElementById('display-year'))  document.getElementById('display-year').innerText = selectedYear;

    // 3. Academic Structure load karein
    loadAsatizaFromStructure(jamiaName);
});

// Academic structure se asatiza aur kitabein load karne ka function
function loadAsatizaFromStructure(jamiaName) {
    const container = document.getElementById('teachers-container');
    const rawData = localStorage.getItem('academicStructure'); // index.html se save kiya hua data
    
    if (!rawData) {
        // Agar data nahi mila toh purana tarika (3 khali rows)
        for(let i=0; i<3; i++) addTeacherRow();
        return;
    }

    const allEntries = JSON.parse(rawData);
    
    // Sirf is Jamia ka data filter karein
    const filteredData = allEntries.filter(item => item.jamiaName === jamiaName);

    if (filteredData.length > 0) {
        container.innerHTML = ""; // Khali rows hatayein

        // Teachers ke hisab se group karein
        const groupedByTeacher = filteredData.reduce((acc, curr) => {
            if (!acc[curr.teacherName]) acc[curr.teacherName] = [];
            acc[curr.teacherName].push(curr);
            return acc;
        }, {});

        // Har ustad ke liye card banayein
        for (const teacherName in groupedByTeacher) {
            const periods = groupedByTeacher[teacherName];
            addTeacherWithAcademicData(teacherName, periods);
        }
    } else {
        for(let i=0; i<3; i++) addTeacherRow();
    }
}

// Data ke sath ustad ka card banane wala function
function addTeacherWithAcademicData(teacherName, periods) {
    const tId = Date.now() + Math.random();
    const container = document.getElementById('teachers-container');
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded-xl shadow-sm border mb-6 teacher-card urdu-font text-right";
    div.id = `teacher-${tId}`;

    const rowsHtml = periods.map(p => `
        <tr class="border-b last:border-0">
            <td class="p-1"><input type="text" value="${p.className}" class="w-full p-1 border rounded text-xs text-center bg-gray-50" readonly></td>
            <td class="p-1"><input type="text" value="${p.bookName}" class="w-full p-1 border rounded text-xs text-center bg-gray-50" readonly></td>
            <td class="p-1"><input type="number" class="total-std w-16 p-1 border rounded text-center" oninput="calculateTeacher('${tId}')" placeholder="0"></td>
            <td class="p-1"><input type="number" class="passed-std w-16 p-1 border rounded text-center" oninput="calculateTeacher('${tId}')" placeholder="0"></td>
            <td class="p-1"><input type="text" class="period-perc w-16 p-1 bg-gray-50 text-center font-bold text-xs" readonly></td>
        </tr>
    `).join('');

    div.innerHTML = `
        <div class="flex flex-row-reverse justify-between items-center border-b pb-2 mb-3">
            <h3 class="font-bold text-teal-700 text-lg">${teacherName}</h3>
            <button onclick="removeTeacher('${tId}')" class="text-red-400 text-[10px]">حذف</button>
        </div>
        <table class="w-full text-sm inner-table">
            <thead>
                <tr class="text-gray-500 border-b">
                    <th class="p-2 text-center text-[10px]">درجہ</th>
                    <th class="p-2 text-center text-[10px]">کتاب</th>
                    <th class="p-2 text-center text-[10px]">کل طلبہ</th>
                    <th class="p-2 text-center text-[10px]">کامیاب</th>
                    <th class="p-2 text-center text-[10px]">فیصد</th>
                </tr>
            </thead>
            <tbody id="periods-${tId}">${rowsHtml}</tbody>
        </table>
        <div class="mt-3 flex justify-between items-center">
            <button onclick="addPeriodRow('${tId}')" class="text-teal-600 text-xs font-bold">+ مزید کتاب</button>
            <div class="text-xs font-bold">مجموعی فیصد: <span id="total-percent-${tId}">0%</span></div>
        </div>
    `;
    container.appendChild(div);
}

        function addTeacherRow() {
            teacherCount++;
            const tbody = document.getElementById('main-teacher-body');
            const tr = document.createElement('tr');
            tr.className = "teacher-row border-b border-gray-300";
            
            tr.innerHTML = `
                <td class="border border-gray-300 p-2 text-center font-bold text-gray-400">${teacherCount}</td>
                <td class="border border-gray-300 p-2 align-top">
                    <input type="text" placeholder="نام استاد" class="w-full p-2 border rounded font-bold text-gray-800">
                </td>
                <td class="border border-gray-300 p-2">
                    <table class="w-full inner-table">
                        <thead class="bg-gray-100">
                            <tr class="text-[11px]">
                                <th class="w-24">درجہ / کلاس</th>
                                <th>مضمون</th>
                                <th class="w-16">کل طلبہ</th>
                                <th class="w-16">کامیاب</th>
                                <th class="w-20">فیصد</th>
                            </tr>
                        </thead>
                        <tbody id="periods-${teacherCount}">
                            ${createInitialPeriodRows(teacherCount)}
                        </tbody>
                    </table>
                    <button onclick="addPeriodRow(${teacherCount})" class="text-[11px] text-teal-600 mt-2 font-bold hover:underline">+ پیریڈ شامل کریں</button>
                </td>
                <td class="border border-gray-300 p-2 text-center align-middle">
                    <div id="total-percent-${teacherCount}" class="text-xl font-bold text-teal-700 bg-teal-50 py-2 rounded">0%</div>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function createInitialPeriodRows(tId) {
            let rows = '';
            for(let i=0; i<4; i++) { rows += createPeriodRow(tId); }
            return rows;
        }

        function createPeriodRow(tId) {
            return `
                <tr>
                    <td><input type="text" placeholder="کلاس"></td>
                    <td><input type="text" placeholder="مضمون"></td>
                    <td><input type="number" class="total-std" oninput="calculateTeacher(${tId})"></td>
                    <td><input type="number" class="passed-std" oninput="calculateTeacher(${tId})"></td>
                    <td><input type="text" class="period-perc bg-gray-50 text-teal-600 font-bold" readonly></td>
                </tr>`;
        }

        function addPeriodRow(tId) {
            const pBody = document.getElementById(`periods-${tId}`);
            const tr = document.createElement('tr');
            tr.innerHTML = createPeriodRow(tId);
            pBody.appendChild(tr);
        }

        function calculateTeacher(tId) {
            const pBody = document.getElementById(`periods-${tId}`);
            const rows = pBody.querySelectorAll('tr');
            let totalSum = 0;
            let passSum = 0;

            rows.forEach(row => {
                const total = parseFloat(row.querySelector('.total-std').value) || 0;
                const pass = parseFloat(row.querySelector('.passed-std').value) || 0;
                const percField = row.querySelector('.period-perc');

                if(total > 0) {
                    const p = (pass / total) * 100;
                    percField.value = p.toFixed(1) + '%';
                    totalSum += total;
                    passSum += pass;
                } else {
                    percField.value = '';
                }
            });

            const finalLabel = document.getElementById(`total-percent-${tId}`);
            if(totalSum > 0) {
                const finalPerc = (passSum / totalSum) * 100;
                finalLabel.innerText = finalPerc.toFixed(1) + '%';
            } else {
                finalLabel.innerText = '0%';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
    // 1. URL se parameters hasil karna
    const params = new URLSearchParams(window.location.search);
    
    const month = params.get('month');
    const type = params.get('examType'); // Dashboard se 'examType' bheja tha
    const year = params.get('examYear'); // Dashboard se 'examYear' bheja tha

    // 2. UI mein data set karna
    if (month) document.getElementById('display-month').innerText = month;
    if (type)  document.getElementById('display-type').innerText = type;
    if (year)  document.getElementById('display-year').innerText = year;

    // 3. Global Variables (Taki jab aap Save button dabayein to ye data sheet me jaye)
    window.currentMonth = month;
    window.currentExamType = type;
    window.currentExamYear = year;
});
        // Firebase Firestore se data lene ka function
async function loadAsatizaFromFirestore(jamiaId) {
    const container = document.getElementById('teachers-container');
    showLoader(true); // Agar loader hai toh

    try {
        // 'academic_structure' collection se is Jamia ka data uthana
        const q = query(
            collection(db, "academic_structure"),
            where("jamiaId", "==", jamiaId)
        );

        const querySnapshot = await getDocs(q);
        
        if (querySnapshot.empty) {
            console.log("No data found for this Jamia");
            for(let i=0; i<3; i++) addTeacherRow(); // Khali rows agar data na mile
            return;
        }

        container.innerHTML = ""; // Purana content saaf karein

        // Data ko Teacher Name ke hisab se group karein
        const teachersData = {};
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (!teachersData[data.teacherName]) {
                teachersData[data.teacherName] = [];
            }
            teachersData[data.teacherName].push(data);
        });

        // Har ustad ke liye card generate karein
        for (const teacherName in teachersData) {
            renderTeacherCard(teacherName, teachersData[teacherName]);
        }

    } catch (error) {
        console.error("Error loading structure:", error);
    } finally {
        showLoader(false);
    }
}
        function renderTeacherCard(teacherName, periods) {
    const tId = Date.now() + Math.random();
    const container = document.getElementById('teachers-container');
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded-xl shadow-sm border mb-6 teacher-card urdu-font text-right";
    
    const rowsHtml = periods.map(p => `
        <tr class="border-b">
            <td class="p-1"><input type="text" value="${p.className}" class="bg-gray-50 p-1 border rounded w-full text-center" readonly></td>
            <td class="p-1"><input type="text" value="${p.bookName}" class="bg-gray-50 p-1 border rounded w-full text-center" readonly></td>
            <td class="p-1"><input type="number" class="total-std p-1 border rounded w-16 text-center" oninput="calculateTeacher('${tId}')"></td>
            <td class="p-1"><input type="number" class="passed-std p-1 border rounded w-16 text-center" oninput="calculateTeacher('${tId}')"></td>
            <td class="p-1"><input type="text" class="period-perc p-1 bg-gray-100 w-16 text-center font-bold" readonly></td>
        </tr>
    `).join('');

    div.innerHTML = `
        <div class="flex justify-between items-center border-b pb-2 mb-3">
            <h3 class="font-bold text-teal-700">${teacherName}</h3>
            <button onclick="this.closest('.teacher-card').remove()" class="text-red-500 text-xs">حذف</button>
        </div>
        <table class="w-full text-sm">
            <tbody id="periods-${tId}">${rowsHtml}</tbody>
        </table>
    `;
    container.appendChild(div);
}
    </script>
</body>
</html>
