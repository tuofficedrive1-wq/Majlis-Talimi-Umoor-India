    <script>
        let teacherCount = 0;

       document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    
    // 1. URL parameters load karein
    const jamiaName = params.get('jamia') || 'جامعہ کا نام';
    const selectedMonth = params.get('month');
    const selectedType = params.get('examType') || 'Half Yearly';
    const selectedYear = params.get('examYear') || '2025-26';

    document.getElementById('jamia-name-head').innerText = jamiaName;
    if(document.getElementById('display-month')) document.getElementById('display-month').innerText = selectedMonth;
    if(document.getElementById('display-type')) document.getElementById('display-type').innerText = selectedType;
    if(document.getElementById('display-year')) document.getElementById('display-year').innerText = selectedYear;

    // 2. Check karein agar pehle se data save hai
    const savedData = localStorage.getItem('savedAsatizaResult');
    if (savedData) {
        loadSavedData(JSON.parse(savedData));
    } else {
        loadAsatizaFromStructure(jamiaName);
    }
});

// Academic structure se asatiza aur kitabein load karne ka function
function loadAsatizaFromStructure(jamiaName) {
    const container = document.getElementById('teachers-container');
    const rawData = localStorage.getItem('academicStructure'); // index.html se save kiya hua data
    
    if (!rawData) {
        // Agar data nahi mila toh purana tarika (3 khali rows)
        for(let i=0; i<3; i++) addTeacherRow();
        return;
    }

    const allEntries = JSON.parse(rawData);
    
    // Sirf is Jamia ka data filter karein
    const filteredData = allEntries.filter(item => item.jamiaName === jamiaName);

    if (filteredData.length > 0) {
        container.innerHTML = ""; // Khali rows hatayein

        // Teachers ke hisab se group karein
        const groupedByTeacher = filteredData.reduce((acc, curr) => {
            if (!acc[curr.teacherName]) acc[curr.teacherName] = [];
            acc[curr.teacherName].push(curr);
            return acc;
        }, {});

        // Har ustad ke liye card banayein
        for (const teacherName in groupedByTeacher) {
            const periods = groupedByTeacher[teacherName];
            addTeacherWithAcademicData(teacherName, periods);
        }
    } else {
        for(let i=0; i<3; i++) addTeacherRow();
    }
}

// Data ke sath ustad ka card banane wala function
function addTeacherWithAcademicData(teacherName, periods) {
    const tId = Date.now() + Math.random();
    const container = document.getElementById('teachers-container');
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded-xl shadow-sm border mb-6 teacher-card urdu-font text-right";
    div.id = `teacher-${tId}`;

    const rowsHtml = periods.map(p => `
        <tr class="border-b last:border-0">
            <td class="p-1"><input type="text" value="${p.className}" class="w-full p-1 border rounded text-xs text-center bg-gray-50" readonly></td>
            <td class="p-1"><input type="text" value="${p.bookName}" class="w-full p-1 border rounded text-xs text-center bg-gray-50" readonly></td>
            <td class="p-1"><input type="number" class="total-std w-16 p-1 border rounded text-center" oninput="calculateTeacher('${tId}')" placeholder="0"></td>
            <td class="p-1"><input type="number" class="passed-std w-16 p-1 border rounded text-center" oninput="calculateTeacher('${tId}')" placeholder="0"></td>
            <td class="p-1"><input type="text" class="period-perc w-16 p-1 bg-gray-50 text-center font-bold text-xs" readonly></td>
        </tr>
    `).join('');

    div.innerHTML = `
        <div class="flex flex-row-reverse justify-between items-center border-b pb-2 mb-3">
            <h3 class="font-bold text-teal-700 text-lg">${teacherName}</h3>
            <button onclick="removeTeacher('${tId}')" class="text-red-400 text-[10px]">حذف</button>
        </div>
        <table class="w-full text-sm inner-table">
            <thead>
    <tr class="text-gray-500 border-b">
        <th class="p-2 text-center text-[10px]">درجہ</th>
        <th class="p-2 text-center text-[10px]">کتاب</th>
        <th class="p-2 text-center text-[10px]">کل طلبہ</th>
        <th class="p-2 text-center text-[10px]">کامیاب</th>
        <th class="p-2 text-center text-[10px]">فیصد</th>
        <th class="p-2 text-center text-[10px]">کیفیت</th> </tr>
</thead>
            <tbody id="periods-${tId}">${rowsHtml}</tbody>
        </table>
        <div class="mt-3 flex justify-between items-center">
            <button onclick="addPeriodRow('${tId}')" class="text-teal-600 text-xs font-bold">+ مزید کتاب</button>
            <div class="text-xs font-bold">مجموعی فیصد: <span id="total-percent-${tId}">0%</span></div>
        </div>
    `;
    container.appendChild(div);
}
        

        function addTeacherRow(savedName = '', savedPeriods = null) {
    teacherCount++;
    const tbody = document.getElementById('main-teacher-body');
    const tr = document.createElement('tr');
    tr.className = "teacher-row border-b border-gray-300";
    
    let periodsHTML = "";
    if (savedPeriods && savedPeriods.length > 0) {
        savedPeriods.forEach(p => {
            periodsHTML += `
                <tr>
                    <td><input type="text" value="${p.class}" placeholder="درجہ / کلاس"></td>
                    <td><input type="text" value="${p.subject}" placeholder="مضمون"></td>
                    <td><input type="number" value="${p.total}" oninput="calculateRowPercent(this)" placeholder="کل"></td>
                    <td><input type="number" value="${p.passed}" oninput="calculateRowPercent(this)" placeholder="کامیاب"></td>
                    <td><input type="text" value="${p.percentage}" class="bg-gray-50 font-bold text-teal-700" readonly></td>
                    <td><input type="text" value="${p.kaifiyat}" placeholder="کیفیت"></td>
                </tr>`;
        });
    } else {
        periodsHTML = createInitialPeriodRows(teacherCount);
    }

    tr.innerHTML = `
        <td class="border border-gray-300 p-2 text-center font-bold text-gray-400">${teacherCount}</td>
        <td class="border border-gray-300 p-2 align-top">
            <div class="flex items-center gap-2">
                <input type="text" value="${savedName}" placeholder="نام استاد"
                    class="w-full p-2 border rounded font-bold text-gray-800">
                <button onclick="removeTeacherRow(this)"
                    class="p-2 rounded-lg bg-red-50 hover:bg-red-100 text-red-600">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        </td>
        <td class="border border-gray-300 p-2">
            <table class="w-full inner-table">
                <thead class="bg-gray-100">
                    <tr class="text-[11px]">
                        <th class="w-24">درجہ / کلاس</th>
                        <th>مضمون</th>
                        <th class="w-16">کل طلبہ</th>
                        <th class="w-16">کامیاب</th>
                        <th class="w-20">فیصد</th>
                        <th class="w-20">کیفیت</th>
                    </tr>
                </thead>
                <tbody id="periods-${teacherCount}">
                    ${periodsHTML}
                </tbody>
            </table>
            <div class="flex gap-2 mt-2">
                <button onclick="addPeriodRow(${teacherCount})"
                    class="flex items-center gap-1 text-teal-600 bg-teal-50 hover:bg-teal-100 px-2 py-1 rounded-md text-xs font-bold">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> پیریڈ
                </button>
                <button onclick="removePeriodRow(${teacherCount})"
                    class="flex items-center gap-1 text-red-600 bg-red-50 hover:bg-red-100 px-2 py-1 rounded-md text-xs font-bold">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> حذف
                </button>
            </div>
        </td>
        <td class="border border-gray-300 p-2 text-center align-middle">
            <div id="total-percent-${teacherCount}" class="text-xl font-bold text-teal-700 bg-teal-50 py-2 rounded">0%</div>
        </td>
    `;
    tbody.appendChild(tr);
    lucide.createIcons();
    // Load hone ke baad total calculation refresh karein
    updateTeacherTotal(teacherCount);
}

// Save kiya hua data wapis load karne ka function
function loadSavedData(data) {
    const body = document.getElementById('main-teacher-body');
    body.innerHTML = '';
    data.forEach(item => {
        addTeacherRow(item.teacher, item.periods);
    });
}

        function createInitialPeriodRows(tId) {
            let rows = '';
            for(let i=0; i<4; i++) { rows += createPeriodRow(tId); }
            return rows;
        }

        function createPeriodRow(tId) {
            return `
                <tr>
                    <td><input type="text" placeholder="کلاس"></td>
                    <td><input type="text" placeholder="مضمون"></td>
                    <td><input type="number" class="total-std" oninput="calculateTeacher(${tId})"></td>
                   <td><input type="number" class="passed-std" oninput="calculateTeacher(${tId})"></td>
<td>
  <input type="text"
         class="period-perc bg-gray-50 text-teal-600 font-bold"
         readonly>
</td>

<td>
  <input type="text"
         class="period-kaifiyat bg-gray-50 font-bold text-[10px]"
         readonly
         placeholder="-">
</td>
                </tr>`;
        }

        function addPeriodRow(tId) {
            const pBody = document.getElementById(`periods-${tId}`);
            const tr = document.createElement('tr');
            tr.innerHTML = createPeriodRow(tId);
            pBody.appendChild(tr);
            lucide.createIcons();
        }

     function calculateTeacher(tId) {
    const pBody = document.getElementById(`periods-${tId}`);
    const rows = pBody.querySelectorAll('tr');
    let totalSum = 0;
    let passSum = 0;

   rows.forEach(row => {
    const total = parseFloat(row.querySelector('.total-std').value) || 0;
    const pass = parseFloat(row.querySelector('.passed-std').value) || 0;
    const percField = row.querySelector('.period-perc');
    const kaifiyatField = row.querySelector('.period-kaifiyat');

    let kaifiyat = "";   // ✅ yahan declare karo
    let color = "";

    if (total > 0) {
        const p = (pass / total) * 100;
        percField.value = p.toFixed(0) + "%";

        if (p >= 90) { kaifiyat = "ممتاز"; color = "#059669"; }
        else if (p >= 80) { kaifiyat = "بہتر"; color = "#2563eb"; }
        else if (p >= 70) { kaifiyat = "مناسب"; color = "#d97706"; }
        else if (p >= 51) { kaifiyat = "کمزور"; color = "#7c3aed"; }
        else { kaifiyat = "تشویش ناک"; color = "#dc2626"; }

        if (kaifiyatField) {
            kaifiyatField.value = kaifiyat;
            kaifiyatField.style.color = color;
        }

        percField.style.color = color;

        totalSum += total;
        passSum += pass;
    } 
    else {
        percField.value = '';
        if (kaifiyatField) kaifiyatField.value = '';
    }
});

    const finalLabel = document.getElementById(`total-percent-${tId}`);
    if (totalSum > 0) {
        const finalPerc = (passSum / totalSum) * 100;
        let fKaifiyat = ""; let fColor = "";
        
        if (finalPerc >= 90) { fKaifiyat = "ممتاز"; fColor = "#059669"; }
        else if (finalPerc >= 80) { fKaifiyat = "بہتر"; fColor = "#2563eb"; }
        else if (finalPerc >= 70) { fKaifiyat = "مناسب"; fColor = "#d97706"; }
        else if (finalPerc >= 51) { fKaifiyat = "کمزور"; fColor = "#7c3aed"; }
        else { fKaifiyat = "تشویش ناک"; fColor = "#dc2626"; }

        finalLabel.innerHTML = `
            <div style="color: ${fColor}; font-size: 16px;">${finalPerc.toFixed(1)}%</div>
            <div style="color: ${fColor}; font-size: 12px; margin-top: -4px;">${fKaifiyat}</div>
        `;
    } else {
        finalLabel.innerHTML = '0%';
    }
}

        // Firebase Firestore se data lene ka function
async function loadAsatizaFromFirestore(jamiaId) {
    const container = document.getElementById('teachers-container');
    showLoader(true); // Agar loader hai toh

    try {
        // 'academic_structure' collection se is Jamia ka data uthana
        const q = query(
            collection(db, "academic_structure"),
            where("jamiaId", "==", jamiaId)
        );

        const querySnapshot = await getDocs(q);
        
        if (querySnapshot.empty) {
            console.log("No data found for this Jamia");
            for(let i=0; i<3; i++) addTeacherRow(); // Khali rows agar data na mile
            return;
        }

        container.innerHTML = ""; // Purana content saaf karein

        // Data ko Teacher Name ke hisab se group karein
        const teachersData = {};
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (!teachersData[data.teacherName]) {
                teachersData[data.teacherName] = [];
            }
            teachersData[data.teacherName].push(data);
        });

        // Har ustad ke liye card generate karein
        for (const teacherName in teachersData) {
            renderTeacherCard(teacherName, teachersData[teacherName]);
        }

    } catch (error) {
        console.error("Error loading structure:", error);
    } finally {
        showLoader(false);
    }
}

     // Data Save karne ka function
function saveData() {
    const allTeachers = [];
    // Sahi ID 'main-teacher-body' use karein
    const teacherRows = document.querySelectorAll('#main-teacher-body > tr');

    if (teacherRows.length === 0) {
        alert("سیو کرنے کے لیے کوئی ڈیٹا نہیں ملا!");
        return;
    }

    teacherRows.forEach(row => {
        const teacherInput = row.querySelector('td:nth-child(2) input');
        const teacherName = teacherInput ? teacherInput.value.trim() : "";

        const periodRows = row.querySelectorAll('.inner-table tbody tr');
        const periods = [];

        periodRows.forEach(pr => {
            const inputs = pr.querySelectorAll('input');
            if (inputs.length >= 6) {
                periods.push({
                    class: inputs[0].value,
                    subject: inputs[1].value,
                    total: inputs[2].value,
                    passed: inputs[3].value,
                    percentage: inputs[4].value,
                    kaifiyat: inputs[5].value
                });
            }
        });

        allTeachers.push({
            teacher: teacherName,
            periods: periods
        });
    });

    localStorage.setItem('savedAsatizaResult', JSON.stringify(allTeachers));
    alert("رزلٹ کامیابی سے محفوظ ہوگیا ✅");
}
        function removePeriodRow(tId) {
    const tbody = document.getElementById(`periods-${tId}`);
    const rows = tbody.querySelectorAll('tr');

    if (rows.length > 1) {
        tbody.removeChild(rows[rows.length - 1]);
    } else {
        alert("کم از کم ایک پیریڈ ضروری ہے");
    }
}

        function removeTeacherRow(btn) {
    const row = btn.closest('tr');
    row.remove();
}
        function calculateRowPercent(input) {
    const tr = input.closest('tr');
    const inputs = tr.querySelectorAll('input');
    const total = parseFloat(inputs[2].value) || 0;
    const passed = parseFloat(inputs[3].value) || 0;
    const percentInput = inputs[4];
    const kaifiyatInput = inputs[5];

    if (total > 0) {
        const p = ((passed / total) * 100).toFixed(2);
        percentInput.value = p + "%";
        
        let kaifiyat = "";
        let color = "";

        // Aapki di hui conditions
        if (p >= 90) { kaifiyat = "ممتاز"; color = "#059669"; }
        else if (p >= 80) { kaifiyat = "بہتر"; color = "#2563eb"; }
        else if (p >= 70) { kaifiyat = "مناسب"; color = "#d97706"; }
        else if (p >= 51) { kaifiyat = "کمزور"; color = "#7c3aed"; }
        else { kaifiyat = "تشویش ناک"; color = "#dc2626"; }

        kaifiyatInput.value = kaifiyat;
        kaifiyatInput.style.color = color;
        kaifiyatInput.style.fontWeight = "bold";
        percentInput.style.color = color;
    } else {
        percentInput.value = "0%";
        kaifiyatInput.value = "";
    }
    
    const teacherId = tr.closest('tbody').id.split('-')[1];
    updateTeacherTotal(teacherId);
}

function updateTeacherTotal(tId) {
    const tbody = document.getElementById(`periods-${tId}`);
    if(!tbody) return;
    
    const rows = tbody.querySelectorAll('tr');
    let totalAll = 0;
    let passedAll = 0;

    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        totalAll += parseFloat(inputs[2].value) || 0;
        passedAll += parseFloat(inputs[3].value) || 0;
    });

    const display = document.getElementById(`total-percent-${tId}`);
    if (totalAll > 0) {
        const p = ((passedAll / totalAll) * 100).toFixed(2);
        
        let kaifiyat = "";
        let color = "";

        if (p >= 90) { kaifiyat = "ممتاز"; color = "#059669"; }
        else if (p >= 80) { kaifiyat = "بہتر"; color = "#2563eb"; }
        else if (p >= 70) { kaifiyat = "مناسب"; color = "#d97706"; }
        else if (p >= 51) { kaifiyat = "کمزور"; color = "#7c3aed"; }
        else { kaifiyat = "تشویش ناک"; color = "#dc2626"; }

        display.innerHTML = `
            <div style="color: ${color}">${p}%</div>
            <div style="color: ${color}; font-size: 12px; margin-top: 4px;">${kaifiyat}</div>
        `;
        display.style.backgroundColor = color + "10"; // Halka background color
    } else {
        display.innerText = "0%";
        display.style.backgroundColor = "transparent";
    }
}
    </script>
</body>
</html>
