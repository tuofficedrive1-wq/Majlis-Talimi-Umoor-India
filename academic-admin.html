<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Admin | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 700; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .eng-label { letter-spacing: 0.5px; }
        input { font-family: 'Poppins', sans-serif !important; }
    </style>
</head>
<body>

    <header class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-university text-xl text-indigo-200"></i>
            <h1 class="font-bold text-lg">Academic Education Office</h1>
        </div>
        <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-2 shadow-md">
            <i class="fas fa-sign-out-alt"></i> Logout & Exit
        </button>
    </header>

    <nav class="bg-white border-b flex px-4 sticky top-[64px] z-40 overflow-x-auto">
        <div class="max-w-7xl mx-auto flex px-4">
            <button class="tab-btn px-6 py-4 text-sm font-semibold tab-active" data-tab="inspectors">Manage Inspectors</button>
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-gray-500" data-tab="reports">Inspection Reports</button>
        </div>
    </nav>

    <main class="p-4 md:p-6 max-w-7xl mx-auto">
        <div id="tab-inspectors" class="tab-content block">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-gray-700">Inspector Profiles</h2>
                    <input type="text" id="search-inspector" placeholder="Search by name..." class="border rounded-lg px-3 py-1 text-sm outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-[11px] font-bold uppercase text-gray-400 border-b">
                            <tr>
                                <th class="px-6 py-4">Photo</th>
                                <th class="px-6 py-4">Inspector Details</th>
                                <th class="px-6 py-4">Region</th>
                                <th class="px-6 py-4">Assigned Jamiaat</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inspectors-list" class="divide-y text-sm text-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-reports" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm hover:shadow-md transition">
                    <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mb-4">
                        <i class="fas fa-plus-circle text-xl"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 mb-1">Fill Inspection Report</h3>
                    <p class="text-xs text-gray-500 mb-4">Open form to submit a new academic inspection report.</p>
                    <button onclick="window.location.href='academic-inspector.html'" class="w-full py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-700 transition">
                        Open Report Form
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-4 border-b bg-indigo-50 flex justify-between items-center">
                <h3 class="font-bold text-indigo-900 eng-label uppercase">Edit Inspector Profile</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[70vh] overflow-y-auto">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Full Name</label>
                    <input type="text" id="edit-name" class="w-full p-2 border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Name">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Email Address (Login ID)</label>
                    <input type="email" id="edit-email" class="w-full p-2 border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Email">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Ajeer Code</label>
                    <input type="text" id="edit-ajeer" class="w-full p-2 border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Code">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Region</label>
                    <input type="text" id="edit-region" class="w-full p-2 border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Region">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Contact No</label>
                    <input type="text" id="edit-contact" class="w-full p-2 border rounded-lg outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Enter Number">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase eng-label">Photo URL</label>
                    <input type="text" id="edit-photo" class="w-full p-2 border rounded-lg text-xs outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Paste URL">
                </div>

                <div class="md:col-span-2 bg-gray-50 p-4 rounded-xl border mt-2">
                    <label class="block text-xs font-bold text-gray-700 mb-2 uppercase eng-label">Assigned Jamiaat List</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="new-jamia-input" placeholder="Jamia Name" class="flex-1 p-2 border rounded-lg text-sm outline-none focus:ring-1 focus:ring-indigo-500">
                        <button onclick="addJamiaTag()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold eng-label">Add</button>
                    </div>
                    <div id="jamia-tags" class="flex flex-wrap gap-2 min-h-[50px]">
                        </div>
                </div>
            </div>

            <div class="p-4 border-t bg-gray-50 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-2 font-bold text-gray-500 border rounded-xl hover:bg-gray-100 eng-label">Cancel</button>
                <button id="btn-save" class="flex-1 py-2 font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg eng-label">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.appspot.com",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let inspectors = [];
        let currentId = null;
        let tempJamias = [];

        // Logout
        document.getElementById('btn-logout').onclick = async () => {
            if(confirm("Are you sure you want to logout?")) {
                try {
                    await signOut(auth);
                    window.location.replace('index.html');
                } catch (err) { console.error(err); }
            }
        };

        // Tab Switch
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('tab-active', 'text-indigo-600');
                    b.classList.add('text-gray-500');
                });
                document.querySelectorAll('.tab-content').forEach(c => c.classList.replace('block', 'hidden'));
                btn.classList.add('tab-active', 'text-indigo-600');
                btn.classList.remove('text-gray-500');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.replace('hidden', 'block');
            };
        });

        // Load Data
        const loadInspectors = () => {
            const q = query(collection(db, "users"), where("role", "==", "inspector"));
            onSnapshot(q, (snap) => {
                inspectors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderInspectors();
            });
        };

        const renderInspectors = () => {
            const list = document.getElementById('inspectors-list');
            list.innerHTML = inspectors.map(ins => `
                <tr class="hover:bg-gray-50 transition border-b">
                    <td class="px-6 py-4">
                        <img src="${ins.photoURL || 'https://placehold.co/40'}" class="w-10 h-10 rounded-full object-cover border shadow-sm">
                    </td>
                    <td class="px-6 py-4">
                        <div class="font-bold text-gray-800">${ins.name || 'Anonymous'}</div>
                        <div class="text-[10px] text-gray-400 font-medium">${ins.email || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-gray-600 font-medium">${ins.region || '-'}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap gap-1">
                            ${(ins.jamiaatList || []).map(j => `<span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded text-[10px] font-bold border border-indigo-100">${j}</span>`).join('')}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="window.editIns('${ins.id}')" class="text-indigo-600 hover:bg-indigo-50 px-3 py-1 rounded-lg font-bold border border-indigo-200 text-xs transition">EDIT</button>
                    </td>
                </tr>
            `).join('');
        };

        window.editIns = (id) => {
            const ins = inspectors.find(i => i.id === id);
            if(!ins) return;
            currentId = id;
            tempJamias = [...(ins.jamiaatList || [])];
            document.getElementById('edit-name').value = ins.name || '';
            document.getElementById('edit-email').value = ins.email || '';
            document.getElementById('edit-ajeer').value = ins.ajeerCode || '';
            document.getElementById('edit-region').value = ins.region || '';
            document.getElementById('edit-contact').value = ins.contact || '';
            document.getElementById('edit-photo').value = ins.photoURL || '';
            renderTags();
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('edit-modal').classList.add('hidden');

        const renderTags = () => {
            const container = document.getElementById('jamia-tags');
            container.innerHTML = tempJamias.map((j, idx) => `
                <div class="bg-indigo-600 text-white px-3 py-1 rounded-full text-xs flex items-center gap-2 shadow-sm">
                    <span class="font-bold">${j}</span>
                    <button onclick="window.removeJ(${idx})" class="hover:text-red-200 transition font-bold">&times;</button>
                </div>
            `).join('');
        };

        window.addJamiaTag = () => {
            const inp = document.getElementById('new-jamia-input');
            const val = inp.value.trim().toUpperCase();
            if(val && !tempJamias.includes(val)) {
                tempJamias.push(val);
                renderTags();
                inp.value = '';
            }
        };

        window.removeJ = (i) => {
            tempJamias.splice(i, 1);
            renderTags();
        };

        document.getElementById('btn-save').onclick = async () => {
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader mx-auto"></div>`;
            try {
                await updateDoc(doc(db, "users", currentId), {
                    name: document.getElementById('edit-name').value,
                    email: document.getElementById('edit-email').value,
                    ajeerCode: document.getElementById('edit-ajeer').value,
                    region: document.getElementById('edit-region').value,
                    contact: document.getElementById('edit-contact').value,
                    photoURL: document.getElementById('edit-photo').value,
                    jamiaatList: tempJamias
                });
                alert("Profile and Email updated!");
                closeModal();
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.disabled = false; btn.innerHTML = "Save Changes"; }
        };

        loadInspectors();
    </script>
</body>
</html>
