<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Education Office | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .urdu-font { font-family: 'Jameel Noori Nastaleeq', 'Arial', sans-serif; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-user-graduate text-2xl"></i>
            <h1 class="text-lg font-bold">Academic Education Office</h1>
        </div>
        <button onclick="window.location.href='index.html'" class="bg-white/20 hover:bg-white/30 px-4 py-1.5 rounded-lg text-sm transition">
            <i class="fas fa-sign-out-alt mr-1"></i> Exit
        </button>
    </header>

    <nav class="bg-white border-b sticky top-[64px] z-40 overflow-x-auto no-scrollbar">
        <div class="max-w-7xl mx-auto flex">
            <button class="tab-btn px-6 py-4 text-sm font-semibold tab-active" data-tab="inspectors">
                <i class="fas fa-users-cog mr-2"></i> Inspectors List
            </button>
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-slate-500" data-tab="reports">
                <i class="fas fa-file-invoice mr-2"></i> Reports
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        
        <div id="main-loader" class="hidden flex justify-center py-10">
            <div class="loader"></div>
        </div>

        <div id="tab-inspectors" class="tab-content block">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-slate-700">Manage Academic Inspectors</h2>
                    <input type="text" id="search-inspector" placeholder="Search..." class="border rounded-md px-3 py-1 text-sm outline-none focus:ring-1 focus:ring-indigo-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-500 text-[11px] uppercase font-bold border-b">
                            <tr>
                                <th class="px-6 py-3">Inspector Name</th>
                                <th class="px-6 py-3">Email</th>
                                <th class="px-6 py-3">Assigned Jamiaat</th>
                                <th class="px-6 py-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inspectors-list-body" class="divide-y text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-reports" class="tab-content hidden">
            <div class="text-center py-20 bg-white rounded-xl border">
                <i class="fas fa-folder-open text-4xl text-slate-300 mb-2"></i>
                <p class="text-slate-500">Inspector ki reports yahan nazar aayengi.</p>
            </div>
        </div>

    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-4 border-b bg-indigo-50 flex justify-between items-center">
                <h3 class="font-bold text-indigo-900">Edit Inspector Profile</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-xl">&times;</button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Inspector Name</label>
                    <input type="text" id="edit-name" class="w-full p-2 bg-slate-50 border rounded-lg outline-none" readonly>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Assign Jamiaat</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="new-jamia-input" placeholder="Jamia ka naam..." class="flex-1 p-2 border rounded-lg text-sm outline-none focus:ring-1 focus:ring-indigo-500">
                        <button onclick="addJamiaTag()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">Add</button>
                    </div>
                    <div id="jamia-tags-container" class="flex flex-wrap gap-2 p-3 border rounded-lg bg-slate-50 min-h-[60px]">
                        </div>
                </div>
            </div>
            <div class="p-4 border-t bg-slate-50 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-2 text-sm font-bold text-slate-600 border rounded-lg hover:bg-slate-100">Cancel</button>
                <button id="btn-save-inspector" class="flex-1 py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-md">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.appspot.com",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allInspectors = [];
        let currentInsId = null;
        let tempJamiaList = [];

        // 1. Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-indigo-600'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.replace('block', 'hidden'));
                
                btn.classList.add('tab-active', 'text-indigo-600');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.replace('hidden', 'block');
            };
        });

        // 2. Fetch Inspectors
        const initInspectors = () => {
            const q = query(collection(db, "users"), where("role", "==", "inspector"));
            onSnapshot(q, (snapshot) => {
                allInspectors = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTable(allInspectors);
            });
        };

        const renderTable = (data) => {
            const body = document.getElementById('inspectors-list-body');
            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-400">Koi Inspector nahi mila.</td></tr>`;
                return;
            }
            body.innerHTML = data.map(ins => `
                <tr class="hover:bg-indigo-50/50">
                    <td class="px-6 py-4 font-bold text-slate-700">${ins.name || 'Anonymous'}</td>
                    <td class="px-6 py-4 text-slate-500">${ins.email || '-'}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap gap-1">
                            ${(ins.jamiaatList || []).map(j => `<span class="bg-white border border-indigo-200 text-indigo-600 px-2 py-0.5 rounded text-[10px] font-bold">${j}</span>`).join('')}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="window.openEditModal('${ins.id}')" class="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-200 transition">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                    </td>
                </tr>
            `).join('');
        };

        // 3. Edit Modal Functions
        window.openEditModal = (id) => {
            const ins = allInspectors.find(i => i.id === id);
            if(!ins) return;

            currentInsId = id;
            tempJamiaList = [...(ins.jamiaatList || [])];
            document.getElementById('edit-name').value = ins.name || '';
            renderJamiaTags();
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
            currentInsId = null;
        };

        const renderJamiaTags = () => {
            const container = document.getElementById('jamia-tags-container');
            container.innerHTML = tempJamiaList.map((j, idx) => `
                <div class="bg-indigo-600 text-white px-3 py-1 rounded-full text-xs flex items-center gap-2">
                    <span class="urdu-font">${j}</span>
                    <button onclick="window.removeJamiaTag(${idx})" class="hover:text-red-200">&times;</button>
                </div>
            `).join('');
        };

        window.addJamiaTag = () => {
            const input = document.getElementById('new-jamia-input');
            const val = input.value.trim().toUpperCase();
            if(val && !tempJamiaList.includes(val)) {
                tempJamiaList.push(val);
                renderJamiaTags();
                input.value = '';
            }
        };

        window.removeJamiaTag = (index) => {
            tempJamiaList.splice(index, 1);
            renderJamiaTags();
        };

        // 4. Save Changes
        document.getElementById('btn-save-inspector').onclick = async () => {
            if(!currentInsId) return;
            const btn = document.getElementById('btn-save-inspector');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader mx-auto" style="width:16px; height:16px;"></div>';

            try {
                await updateDoc(doc(db, "users", currentInsId), {
                    jamiaatList: tempJamiaList
                });
                alert("Settings updated successfully!");
                closeModal();
            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Save Changes";
            }
        };

        // Start
        initInspectors();

    </script>
</body>
</html>
