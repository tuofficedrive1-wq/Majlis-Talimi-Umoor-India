<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Education Office Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; font-weight: 700; }
        .urdu-font { font-family: 'Jameel Noori Nastaleeq', 'Arial', sans-serif; }
    </style>
</head>
<body>

    <header class="bg-indigo-700 text-white shadow-lg p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fas fa-university text-2xl"></i>
            <h1 class="text-lg font-bold">Academic Education Office</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="admin-name" class="text-sm font-medium bg-indigo-800 px-3 py-1 rounded-full">Loading Admin...</span>
            <button onclick="window.location.href='index.html'" class="bg-white text-indigo-700 px-4 py-1 rounded-lg text-sm font-bold hover:bg-indigo-50 transition">
                <i class="fas fa-home mr-1"></i> Exit
            </button>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-[64px] z-40 overflow-x-auto no-scrollbar">
        <div class="max-w-7xl mx-auto flex">
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-slate-500 hover:text-indigo-600 active-tab" data-tab="inspectors">
                <i class="fas fa-user-shield mr-2"></i> Inspectors
            </button>
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-slate-500 hover:text-indigo-600" data-tab="reports">
                <i class="fas fa-file-contract mr-2"></i> Inspection Reports
            </button>
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-slate-500 hover:text-indigo-600" data-tab="assign">
                <i class="fas fa-tasks mr-2"></i> Assign Jamiaat
            </button>
            <button class="tab-btn px-6 py-4 text-sm font-semibold text-slate-500 hover:text-indigo-600" data-tab="analysis">
                <i class="fas fa-chart-line mr-2"></i> Academic Analysis
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <div id="tab-inspectors" class="tab-content block">
            <div class="bg-white rounded-xl shadow-sm border p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Academic Inspectors List</h2>
                    <div class="relative">
                        <input type="text" id="inspector-search" placeholder="Search inspector..." class="pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none w-64 text-sm">
                        <i class="fas fa-search absolute left-3 top-2.5 text-slate-400"></i>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-600 text-xs uppercase font-bold">
                            <tr>
                                <th class="px-6 py-4">Inspector Name</th>
                                <th class="px-6 py-4">Region</th>
                                <th class="px-6 py-4">Assigned Jamiaat</th>
                                <th class="px-6 py-4">Last Visit</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inspectors-table-body" class="divide-y text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-reports" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm border p-6">
                <h2 class="text-xl font-bold mb-4">Mufattisheen Reports</h2>
                <div id="reports-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    </div>
            </div>
        </div>

        <div id="tab-assign" class="tab-content hidden">
            <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md border p-8">
                <h2 class="text-2xl font-bold text-center mb-6 text-indigo-700">Assign Jamia to Inspector</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Select Inspector</label>
                        <select id="assign-inspector-select" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Select Jamia</label>
                        <select id="assign-jamia-select" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none urdu-font"></select>
                    </div>
                    <button id="btn-assign-execute" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-lg">
                        <i class="fas fa-check-circle mr-2"></i> Update Assignment
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-analysis" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-4">Inspection Completion Rate</h3>
                    <canvas id="inspectionChart"></canvas>
                </div>
                <div class="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-slate-700 mb-4">Average Academic Score</h3>
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <div id="report-modal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-2xl max-h-[90vh] overflow-y-auto">
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white">
                <h3 class="font-bold text-lg">Inspection Report Detail</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl">×</button>
            </div>
            <div id="modal-body" class="p-6"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js'; // Aapki config file
        import { collection, query, where, getDocs, onSnapshot, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allInspectors = [];
        
        // 1. Tab Switching Logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                
                btn.classList.add('active-tab');
                const target = btn.dataset.tab;
                document.getElementById(`tab-${target}`).classList.remove('hidden');
            });
        });

        // 2. Fetch Only Inspectors
        const initInspectors = () => {
            const q = query(collection(db, "users"), where("role", "==", "inspector"));
            onSnapshot(q, (snapshot) => {
                allInspectors = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderInspectorsTable(allInspectors);
                populateAssignDropdowns();
            });
        };

        const renderInspectorsTable = (data) => {
            const tbody = document.getElementById('inspectors-table-body');
            tbody.innerHTML = data.map(ins => `
                <tr class="hover:bg-indigo-50 transition">
                    <td class="px-6 py-4 font-bold text-slate-700">${ins.name || 'N/A'}</td>
                    <td class="px-6 py-4">${ins.region || 'All'}</td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap gap-1">
                            ${(ins.jamiaatList || []).map(j => `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-md text-[10px] font-bold">${j}</span>`).join('')}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-slate-500 text-xs">${ins.lastLogin || 'No Visit Yet'}</td>
                    <td class="px-6 py-4 text-center">
                        <button class="bg-indigo-600 text-white px-3 py-1 rounded text-xs hover:bg-indigo-700">Manage</button>
                    </td>
                </tr>
            `).join('');
        };

        // 3. Populate Dropdowns for Assignment
        const populateAssignDropdowns = () => {
            const insSelect = document.getElementById('assign-inspector-select');
            insSelect.innerHTML = allInspectors.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            
            // Yahan aapko apni Jamia List ki logic dalni hogi (Manual ya Firestore se)
            const jamias = ["GULBARGA SHARIF", "JANGAON", "CHHATARPUR"]; 
            document.getElementById('assign-jamia-select').innerHTML = jamias.map(j => `<option value="${j}">${j}</option>`).join('');
        };

        // Execute Assignment
        document.getElementById('btn-assign-execute').addEventListener('click', async () => {
            const insId = document.getElementById('assign-inspector-select').value;
            const jamia = document.getElementById('assign-jamia-select').value;
            
            if(!confirm(`Kya aap ${jamia} is inspector ko assign karna chahte hain?`)) return;

            try {
                const docRef = doc(db, "users", insId);
                await updateDoc(docRef, {
                    jamiaatList: arrayUnion(jamia)
                });
                alert("Jamia successfully assign ho gaya!");
            } catch (err) {
                console.error(err);
                alert("Update fail ho gaya.");
            }
        });

        // Init
        initInspectors();
        
    </script>
</body>
</html>
