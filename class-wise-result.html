<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Wise Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <input type="hidden" id="jamiaName">
    <input type="hidden" id="examType">
    <input type="hidden" id="examYear">
    <style>
        .grade-input:focus { ring: 2px; outline: none; }
        .bg-mumtaz { border-left: 5px solid #4ade80; } /* Green */
        .bg-jayyid { border-left: 5px solid #60a5fa; } /* Blue */
        .bg-fail { border-left: 5px solid #f87171; }    /* Red */
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-2xl mx-auto mt-8 px-4">
        <div class="bg-teal-700 rounded-t-2xl p-6 text-white shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Class Wise Result</h1>
                    <p class="text-teal-100 text-sm opacity-90">Majlis Talimi Umoor: Jamia-tul-Madina India</p>
                </div>
                <i class="fas fa-file-invoice text-4xl opacity-20"></i>
            </div>
        </div>

        <form class="bg-white rounded-b-2xl shadow-xl p-6 space-y-6 border-x border-b border-gray-100">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase">Imtihan Type</label>
                    <div id="display-type" class="p-3 bg-gray-50 border border-gray-200 rounded-xl font-semibold text-gray-700">Salana Imtihan</div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase">Year</label>
                    <div id="display-year" class="p-3 bg-gray-50 border border-gray-200 rounded-xl font-semibold text-gray-700">2024/1446</div>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase">Darjah (Class)</label>
                <select id="darjah-select" class="w-full p-3 bg-white border-2 border-gray-100 rounded-xl focus:border-teal-500 transition-all outline-none appearance-none">
    <option value="">درجہ منتخب کریں</option>
    <option>حفظ کلاس</option>
    <option>ابتدائیہ</option>
    <option>سالِ اوّل</option>
    <option>سالِ دوم</option>
    <option>اولیٰ</option>
    <option>ثانیہ</option>
    <option>ثالثہ</option>
    <option>رابعہ</option>
    <option>خامسہ</option>
    <option>سادسہ</option>
    <option>سابعہ</option>
    <option>دورۃ الحدیث</option>
    <option value="__other__">دیگر (Other)</option>
</select>

<input id="other-class" type="text" placeholder="درجہ لکھیں..."
       class="w-full mt-2 p-3 border rounded-xl hidden">
            </div>

            <hr class="border-gray-100">

            <h3 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
                <i class="fas fa-list-ol mr-2 text-teal-600"></i> Students Breakdown (Kaifiyat)
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <div class="bg-green-50 p-3 rounded-xl bg-mumtaz">
    <label class="block text-xs font-bold text-green-700 mb-1">ممتاز مع الشرف</label>
    <input type="number" placeholder="0" id="mumtaz-sharf" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-green-400">
  </div>

  <div class="bg-green-50 p-3 rounded-xl bg-mumtaz">
    <label class="block text-xs font-bold text-green-700 mb-1">ممتاز</label>
    <input type="number" placeholder="0" id="mumtaz" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-green-400">
  </div>

  <div class="bg-blue-50 p-3 rounded-xl bg-jayyid">
    <label class="block text-xs font-bold text-blue-700 mb-1">جید جدا</label>
    <input type="number" placeholder="0" id="jayyid-jidda" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-blue-400">
  </div>

  <div class="bg-cyan-50 p-3 rounded-xl border-l-4 border-cyan-400">
    <label class="block text-xs font-bold text-cyan-700 mb-1">جید</label>
    <input type="number" placeholder="0" id="jayyid" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-cyan-400">
  </div>

  <div class="bg-amber-50 p-3 rounded-xl border-l-4 border-amber-400">
    <label class="block text-xs font-bold text-amber-700 mb-1">مقبول</label>
    <input type="number" placeholder="0" id="maqbool" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-amber-400">
  </div>

  <div class="bg-purple-50 p-3 rounded-xl border-l-4 border-purple-400">
    <label class="block text-xs font-bold text-purple-700 mb-1">مجاز ضمنی</label>
    <input type="number" placeholder="0" id="majaz-zimni" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-purple-400">
  </div>

  <div class="bg-red-50 p-3 rounded-xl bg-fail">
    <label class="block text-xs font-bold text-red-700 mb-1">ناکام</label>
    <input type="number" placeholder="0" id="nakam" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-red-400">
  </div>

  <div class="bg-gray-100 p-3 rounded-xl border-l-4 border-gray-400">
    <label class="block text-xs font-bold text-gray-700 mb-1">غیر حاضر</label>
    <input type="number" placeholder="0" id="ghaib" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-gray-400">
  </div>

</div>

            <hr class="border-gray-100">

            <div class="bg-gray-50 p-5 rounded-2xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Total Students</label>
                        <input id="total-std" type="number" class="w-full p-3 border-2 border-white rounded-xl shadow-sm focus:border-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Passed (Kamyab)</label>
                        <input id="pass-std" type="number" class="w-full p-3 border-2 border-white rounded-xl shadow-sm focus:border-teal-500 outline-none">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Result Percentage (%)</label>
                    <div id="res-percent" class="w-full p-4 bg-teal-50 border-2 border-teal-100 rounded-xl text-center text-2xl font-black text-teal-700">
                        0%
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.02] shadow-lg active:scale-95">
                <i class="fas fa-cloud-upload-alt mr-2"></i> Submit Result
            </button>
        </form>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
  authDomain: "data-f15ab.firebaseapp.com",
  projectId: "data-f15ab",
  storageBucket: "data-f15ab.appspot.com",
  messagingSenderId: "449137002393",
  appId: "1:449137002393:web:6a23721d00b1b0daeb3508"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== URL params ===== */
const params = new URLSearchParams(window.location.search);
const jamiaName = params.get('jamia') || '';
const examType = params.get('examType') || '';
const examYear = params.get('examYear') || '';

/* ===== Inputs ===== */
const totalInput = document.getElementById('total-std');
const passInput = document.getElementById('pass-std');
const resultDiv = document.getElementById('res-percent');
const darjahSelect = document.querySelector('select');

/* ===== % calc ===== */
function updatePercentage() {
  const total = parseFloat(totalInput.value) || 0;
  const pass = parseFloat(passInput.value) || 0;
  if (total > 0) {
    const percent = (pass / total) * 100;
    resultDiv.innerText = percent.toFixed(2) + "%";
  } else {
    resultDiv.innerText = "0%";
  }
}
totalInput.addEventListener('input', updatePercentage);
passInput.addEventListener('input', updatePercentage);

/* ===== SAVE ===== */
async function saveData(e) {
  e.preventDefault();

  const data = {
    jamia: jamiaName,
    examType: examType,
    examYear: examYear,
    darjah: darjahSelect.value === "__other__"
  ? otherInput.value
  : darjahSelect.value,
    mumtazSharf: document.getElementById('mumtaz-sharf').value,
mumtaz: document.getElementById('mumtaz').value,
jayyidJidda: document.getElementById('jayyid-jidda').value,
jayyid: document.getElementById('jayyid').value,
maqbool: document.getElementById('maqbool').value,
majazZimni: document.getElementById('majaz-zimni').value,
nakam: document.getElementById('nakam').value,
ghaib: document.getElementById('ghaib').value,
    total: totalInput.value,
    passed: passInput.value,
    percent: resultDiv.innerText,
    timestamp: Date.now()
  };

  await addDoc(collection(db, "class_wise_results"), data);
  alert("Result saved ✅");
}

/* ===== LOAD ===== */
async function loadData() {
  if (!d.darjah) return;
    
    if ([...darjahSelect.options].some(o => o.value === d.darjah)) {
  darjahSelect.value = d.darjah;
} else {
  darjahSelect.value = "__other__";
  otherInput.classList.remove('hidden');
  otherInput.value = d.darjah;
}

  const q = query(
    collection(db, "class_wise_results"),
    where("jamia", "==", jamiaName),
    where("examType", "==", examType),
    where("examYear", "==", examYear)
  );

  const snap = await getDocs(q);
  if (snap.empty) return;

  const d = snap.docs[0].data();

  darjahSelect.value = d.darjah || "";
  document.getElementById('mumtaz-sharf').value = d.mumtazSharf || "";
document.getElementById('mumtaz').value = d.mumtaz || "";
document.getElementById('jayyid-jidda').value = d.jayyidJidda || "";
document.getElementById('jayyid').value = d.jayyid || "";
document.getElementById('maqbool').value = d.maqbool || "";
document.getElementById('majaz-zimni').value = d.majazZimni || "";
document.getElementById('nakam').value = d.nakam || "";
document.getElementById('ghaib').value = d.ghaib || "";
  totalInput.value = d.total || "";
  passInput.value = d.passed || "";

  updatePercentage();
}

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", () => {
  const darjahSelect = document.getElementById("darjah-select");
  const otherInput = document.getElementById("other-class");

  if (!darjahSelect || !otherInput) return;

  darjahSelect.addEventListener("change", () => {
    if (darjahSelect.value === "__other__") {
      otherInput.classList.remove("hidden");
    } else {
      otherInput.classList.add("hidden");
      otherInput.value = "";
    }
  });
});
        
        
</script>
</body>
</html>
