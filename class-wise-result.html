<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Wise Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <input type="hidden" id="jamiaName">
    <input type="hidden" id="examType">
    <input type="hidden" id="examYear">
    <style>
        .grade-input:focus { ring: 2px; outline: none; }
        .bg-mumtaz { border-left: 5px solid #4ade80; } /* Green */
        .bg-jayyid { border-left: 5px solid #60a5fa; } /* Blue */
        .bg-fail { border-left: 5px solid #f87171; }    /* Red */

        .locked-input {
    opacity: 0.7;
    pointer-events: none;
    background-color: #f3f4f6 !important;
}
        
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <div class="max-w-2xl mx-auto mt-8 px-4">
        <div class="bg-teal-700 rounded-t-2xl p-6 text-white shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Class Wise Result</h1>
                    <p class="text-teal-100 text-sm opacity-90">Majlis Talimi Umoor: Jamia-tul-Madina India</p>
                </div>
                <i class="fas fa-file-invoice text-4xl opacity-20"></i>
            </div>
        </div>

        <form class="bg-white rounded-b-2xl shadow-xl p-6 space-y-6 border-x border-b border-gray-100">
            <div id="jamia-name-head" class="text-teal-600 font-bold text-lg"></div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase">Imtihan Type</label>
                    <div id="display-type" class="p-3 bg-gray-50 border border-gray-200 rounded-xl font-semibold text-gray-700">Salana Imtihan</div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-400 uppercase">Year</label>
                    <div id="display-year" class="p-3 bg-gray-50 border border-gray-200 rounded-xl font-semibold text-gray-700">2024/1446</div>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase">Darjah (Class)</label>
                <select id="darjah-select" class="w-full p-3 bg-white border-2 border-gray-100 rounded-xl focus:border-teal-500 transition-all outline-none appearance-none">
    <option value="">درجہ منتخب کریں</option>
    <option>حفظ کلاس</option>
    <option>ابتدائیہ</option>
    <option>سالِ اوّل</option>
    <option>سالِ دوم</option>
    <option>اولیٰ</option>
    <option>ثانیہ</option>
    <option>ثالثہ</option>
    <option>رابعہ</option>
    <option>خامسہ</option>
    <option>سادسہ</option>
    <option>سابعہ</option>
    <option>دورۃ الحدیث</option>
    <option value="__other__">دیگر (Other)</option>
</select>

<input id="other-class" type="text" placeholder="درجہ لکھیں..."
       class="w-full mt-2 p-3 border rounded-xl hidden">
            </div>

            <hr class="border-gray-100">

            <h3 class="text-sm font-bold text-gray-700 mb-4 flex items-center">
                <i class="fas fa-list-ol mr-2 text-teal-600"></i> Students Breakdown (Kaifiyat)
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

  <div class="bg-green-50 p-3 rounded-xl bg-mumtaz">
    <label class="block text-xs font-bold text-green-700 mb-1">ممتاز مع الشرف</label>
    <input type="number" placeholder="0" id="mumtaz-sharf" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-green-400">
  </div>

  <div class="bg-green-50 p-3 rounded-xl bg-mumtaz">
    <label class="block text-xs font-bold text-green-700 mb-1">ممتاز</label>
    <input type="number" placeholder="0" id="mumtaz" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-green-400">
  </div>

  <div class="bg-blue-50 p-3 rounded-xl bg-jayyid">
    <label class="block text-xs font-bold text-blue-700 mb-1">جید جدا</label>
    <input type="number" placeholder="0" id="jayyid-jidda" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-blue-400">
  </div>

  <div class="bg-cyan-50 p-3 rounded-xl border-l-4 border-cyan-400">
    <label class="block text-xs font-bold text-cyan-700 mb-1">جید</label>
    <input type="number" placeholder="0" id="jayyid" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-cyan-400">
  </div>

  <div class="bg-amber-50 p-3 rounded-xl border-l-4 border-amber-400">
    <label class="block text-xs font-bold text-amber-700 mb-1">مقبول</label>
    <input type="number" placeholder="0" id="maqbool" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-amber-400">
  </div>

  <div class="bg-purple-50 p-3 rounded-xl border-l-4 border-purple-400">
    <label class="block text-xs font-bold text-purple-700 mb-1">مجاز ضمنی</label>
    <input type="number" placeholder="0" id="majaz-zimni" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-purple-400">
  </div>

  <div class="bg-red-50 p-3 rounded-xl bg-fail">
    <label class="block text-xs font-bold text-red-700 mb-1">ناکام</label>
    <input type="number" placeholder="0" id="nakam" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-red-400">
  </div>

  <div class="bg-gray-100 p-3 rounded-xl border-l-4 border-gray-400">
    <label class="block text-xs font-bold text-gray-700 mb-1">غیر حاضر</label>
    <input type="number" placeholder="0" id="ghaib" class="w-full p-2 rounded-lg border-none focus:ring-2 focus:ring-gray-400">
  </div>

</div>

            <hr class="border-gray-100">

            <div class="bg-gray-50 p-5 rounded-2xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Total Students</label>
                        <input id="total-std" type="number" class="w-full p-3 border-2 border-white rounded-xl shadow-sm focus:border-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Passed (Kamyab)</label>
                        <input id="pass-std" type="number" class="w-full p-3 border-2 border-white rounded-xl shadow-sm focus:border-teal-500 outline-none">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Result Percentage (%)</label>
                    <div id="res-percent" class="w-full p-4 bg-teal-50 border-2 border-teal-100 rounded-xl text-center text-2xl font-black text-teal-700">
                        0%
                    </div>
                </div>
            </div>
<div class="flex gap-2 mt-4">
    <button type="button" id="lock-btn" class="hidden flex-1 bg-red-600 text-white font-bold py-4 rounded-2xl transition-all">
        رزلٹ لاک کریں 🔒
    </button>
    <button type="button" id="save-btn" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl transition-all">
        Submit Result
    </button>
</div>               
        </form>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
  authDomain: "data-f15ab.firebaseapp.com",
  projectId: "data-f15ab",
  storageBucket: "data-f15ab.appspot.com",
  messagingSenderId: "449137002393",
  appId: "1:449137002393:web:6a23721d00b1b0daeb3508"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== URL params ===== */
const params = new URLSearchParams(window.location.search);
const jamiaName = params.get('jamia') || '';
const examType = params.get('examType') || '';
const examYear = params.get('examYear') || '';

/* ===== Inputs ===== */
const totalInput = document.getElementById('total-std');
const passInput = document.getElementById('pass-std');
const resultDiv = document.getElementById('res-percent');
const darjahSelect = document.querySelector('select');
document.getElementById("save-btn").addEventListener("click", saveData);

/* ===== % calc ===== */
function updatePercentage() {
  const total = parseFloat(totalInput.value) || 0;
  const pass = parseFloat(passInput.value) || 0;
  if (total > 0) {
    const percent = (pass / total) * 100;
    resultDiv.innerText = percent.toFixed(2) + "%";
  } else {
    resultDiv.innerText = "0%";
  }
}
totalInput.addEventListener('input', updatePercentage);
passInput.addEventListener('input', updatePercentage);

/* ===== SAVE ===== */
async function saveData() {
  const selectedClass = darjahSelect.value === "__other__" ? document.getElementById('other-class').value : darjahSelect.value;
  
  if (!selectedClass) {
    alert("Please select a class first!");
    return;
  }

  // Ek unique ID banayein taake naya doc na bane, purana update ho jaye
  const customId = `${jamiaName}_${examYear}_${examType}_${selectedClass}`.replace(/\s+/g, '_');

  const data = {
    jamia: jamiaName,
    examType: examType,
    examYear: examYear,
    darjah: selectedClass,
    mumtazSharf: document.getElementById('mumtaz-sharf').value,
    mumtaz: document.getElementById('mumtaz').value,
    jayyidJidda: document.getElementById('jayyid-jidda').value,
    jayyid: document.getElementById('jayyid').value,
    maqbool: document.getElementById('maqbool').value,
    majazZimni: document.getElementById('majaz-zimni').value,
    nakam: document.getElementById('nakam').value,
    ghaib: document.getElementById('ghaib').value,
    total: document.getElementById('total-std').value,
    passed: document.getElementById('pass-std').value,
    percent: resultDiv.innerText,
    timestamp: Date.now()
  };

  try {
    // doc(db, collectionName, documentID)
    await setDoc(doc(db, "class_wise_results", customId), data);
    alert("Result Updated Successfully ✅");
    await checkJamiaStatus(); 
  } catch (e) {
    console.error("Error saving: ", e);
    alert("Error saving data!");
  }
}

/* ===== LOAD ===== */
async function loadData() {
  const selectedClass = darjahSelect.value;
  if (!selectedClass) return; // Agar koi class select nahi hai to ruk jao

  const q = query(
    collection(db, "class_wise_results"),
    where("jamia", "==", jamiaName),
    where("examType", "==", examType),
    where("examYear", "==", examYear),
    where("darjah", "==", selectedClass) // 👈 Sirf select ki hui class ka data mangao
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    // Agar is class ka data pehle se nahi hai, to form khali kar do
    resetFormFields();
    return;
  }

  const d = snap.docs[0].data();

  // Inputs me data wapas bharna (Restore)
  document.getElementById('mumtaz-sharf').value = d.mumtazSharf || 0;
  document.getElementById('mumtaz').value = d.mumtaz || 0;
  document.getElementById('jayyid-jidda').value = d.jayyidJidda || 0;
  document.getElementById('jayyid').value = d.jayyid || 0;
  document.getElementById('maqbool').value = d.maqbool || 0;
  document.getElementById('majaz-zimni').value = d.majazZimni || 0;
  document.getElementById('nakam').value = d.nakam || 0;
  document.getElementById('ghaib').value = d.ghaib || 0;

  totalInput.value = d.total || 0;
  passInput.value = d.passed || 0;

  updatePercentage();
    // Check lock status again after data load
    const isLocked = localStorage.getItem(lockKey) === 'true';
    applyLockdown(isLocked);
}

// Form ko saaf karne ke liye function
function resetFormFields() {
  const fields = ['mumtaz-sharf', 'mumtaz', 'jayyid-jidda', 'jayyid', 'maqbool', 'majaz-zimni', 'nakam', 'ghaib', 'total-std', 'pass-std'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = "";
  });
  resultDiv.innerText = "0%";
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('jamiaName').value = jamiaName;
  document.getElementById('examType').value = examType;
  document.getElementById('examYear').value = examYear;

  document.getElementById('display-type').innerText = decodeURIComponent(examType);
  document.getElementById('display-year').innerText = decodeURIComponent(examYear);
  document.getElementById('jamia-name-head').innerText = decodeURIComponent(jamiaName);

  loadData();
    checkJamiaStatus();
});
        
function updateTotalsFromKaifiyat() {
  const mumtazSharf = parseFloat(document.getElementById('mumtaz-sharf').value) || 0;
  const mumtaz = parseFloat(document.getElementById('mumtaz').value) || 0;
  const jayyidJidda = parseFloat(document.getElementById('jayyid-jidda').value) || 0;
  const jayyid = parseFloat(document.getElementById('jayyid').value) || 0;
  const maqbool = parseFloat(document.getElementById('maqbool').value) || 0;
  const majaz = parseFloat(document.getElementById('majaz-zimni').value) || 0;
  const nakam = parseFloat(document.getElementById('nakam').value) || 0;

  // ✅ Passed
  const passed = mumtazSharf + mumtaz + jayyidJidda + jayyid + maqbool;

  // ✅ Total (exclude ghaib)
  const total = passed + majaz + nakam;

  document.getElementById('pass-std').value = passed;
  document.getElementById('total-std').value = total;

  // update %
  updatePercentage();
}
        [
  'mumtaz-sharf',
  'mumtaz',
  'jayyid-jidda',
  'jayyid',
  'maqbool',
  'majaz-zimni',
  'nakam'
].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', updateTotalsFromKaifiyat);
});

        /* ===== Naya Function: Sabhi Filled Classes aur Total % check karne ke liye ===== */
async function checkJamiaStatus() {
  const q = query(
    collection(db, "class_wise_results"),
    where("jamia", "==", jamiaName),
    where("examType", "==", examType),
    where("examYear", "==", examYear)
  );

  const snap = await getDocs(q);
  
  let filledClassesSet = new Set(); 
  let grandTotalStudents = 0; // Saare students ka jod
  let grandTotalPassed = 0;   // Saare pass hone walon ka jod

  snap.forEach(doc => {
    const d = doc.data();
    if (d.darjah) {
      filledClassesSet.add(d.darjah);
    }
    
    // Yahan hum numbers ko plus kar rahe hain na ke percentage ko
    grandTotalStudents += parseFloat(d.total) || 0;
    grandTotalPassed += parseFloat(d.passed) || 0;
  });

  const uniqueClasses = [...filledClassesSet];

  // Calculation logic: (Total Pass / Total Students) * 100
  let finalGrandPercent = 0;
  if (grandTotalStudents > 0) {
    finalGrandPercent = (grandTotalPassed / grandTotalStudents) * 100;
  }

  const statusDiv = document.getElementById('jamia-status') || createStatusDiv();
  statusDiv.innerHTML = `
    <div class="mb-2 text-xs font-bold text-gray-500 uppercase italic">Filled Classes:</div>
    <div class="flex flex-wrap gap-2">
      ${uniqueClasses.map(c => `
        <span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-xs font-bold border border-teal-200 shadow-sm">
          ${c}
        </span>
      `).join('')}
    </div>
    <div class="mt-4 pt-3 border-t border-dashed border-gray-200 grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-400 uppercase">Total Students (All Classes)</label>
        <div class="text-lg font-bold text-gray-700">${grandTotalStudents}</div>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-400 uppercase">Total Passed (All Classes)</label>
        <div class="text-lg font-bold text-gray-700">${grandTotalPassed}</div>
      </div>
    </div>
    <div class="mt-2">
      <label class="text-xs font-bold text-gray-500 uppercase">Jamia Grand Total (%)</label>
      <div class="text-2xl font-black text-teal-800">${finalGrandPercent.toFixed(2)}%</div>
    </div>
  `;
}

// Ek container banane ke liye agar HTML mein na ho
function createStatusDiv() {
  const div = document.createElement('div');
  div.id = 'jamia-status';
  div.className = 'bg-white rounded-2xl shadow-lg p-6 mb-4 border border-teal-100';
  const form = document.querySelector('form');
  form.parentNode.insertBefore(div, form);
  return div;
}
        
function resetForm() {
  const ids = ['mumtaz-sharf', 'mumtaz', 'jayyid-jidda', 'jayyid', 'maqbool', 'majaz-zimni', 'nakam', 'ghaib', 'total-std', 'pass-std'];
  ids.forEach(id => {
    document.getElementById(id).value = "";
  });
  resultDiv.innerText = "0%";
}
// Jab class change ho, to data load ho jaye
darjahSelect.addEventListener('change', loadData);

        // URL se data aur role nikalna
const isAdmin = params.get('role') === 'admin';
const lockKey = `lock_class_${jamiaName}_${examType}_${examYear}`;

// ===== Lock/Unlock Logic =====
function toggleLock() {
    const isLocked = localStorage.getItem(lockKey) === 'true';
    if (!isLocked) {
        if (confirm('کیا آپ واقعی اس رزلٹ کو لاک کرنا چاہتے ہیں؟')) {
            localStorage.setItem(lockKey, 'true');
            applyLockdown(true);
        }
    } else {
        if (confirm('رزلٹ انلاک کریں؟')) {
            localStorage.removeItem(lockKey);
            applyLockdown(false);
        }
    }
}

function applyLockdown(isLocked) {
    const lockBtn = document.getElementById('lock-btn');
    const saveBtn = document.getElementById('save-btn');
    const inputs = document.querySelectorAll('input, select:not(#darjah-select)');

    if (isLocked) {
        // Lock UI
        inputs.forEach(el => el.classList.add('locked-input'));
        saveBtn.classList.add('hidden');
        if (lockBtn) {
            lockBtn.innerHTML = 'انلاک کریں 🔓';
            lockBtn.classList.replace('bg-red-600', 'bg-orange-500');
        }
    } else {
        // Unlock UI
        inputs.forEach(el => el.classList.remove('locked-input'));
        if (isAdmin) saveBtn.classList.remove('hidden');
        if (lockBtn) {
            lockBtn.innerHTML = 'رزلٹ لاک کریں 🔒';
            lockBtn.classList.replace('bg-orange-500', 'bg-red-600');
        }
    }
}

// ===== Initialization (DOMContentLoaded ke andar) =====
document.addEventListener('DOMContentLoaded', () => {
    // ... aapka purana init code ...

    const lockBtn = document.getElementById('lock-btn');
    const isLocked = localStorage.getItem(lockKey) === 'true';

    // 1. Agar Admin hai to Lock Button dikhao
    if (isAdmin) {
        lockBtn.classList.remove('hidden');
        lockBtn.addEventListener('click', toggleLock);
    }

    // 2. Lock status check karo
    applyLockdown(isLocked);
    
});
        
        
</script>
</body>
</html>
