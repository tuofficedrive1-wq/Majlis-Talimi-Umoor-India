<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Academic Quality Control</h1>
            <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-100 p-4 rounded-2xl">
    <div>
        <label class="block text-xs font-bold text-slate-500 mb-1">Select Class</label>
        <select id="class-select" class="form-select font-bold text-indigo-700"></select>
    </div>
    <div>
        <label class="block text-xs font-bold text-slate-500 mb-1">Present Students</label>
        <input type="number" id="class-present" class="form-select font-bold" value="0">
    </div>
    <div class="flex items-end">
        <button id="add-class-to-list" class="bg-indigo-600 text-white w-full py-2.5 rounded-xl font-bold hover:bg-indigo-700">
            <i class="fas fa-plus mr-2"></i> Add Class to Report
        </button>
    </div>
    <div class="text-center bg-white rounded-xl border border-slate-200 p-2">
        <label class="block text-[10px] font-bold text-slate-400">JAMIA TOTAL %</label>
        <div id="jamia-total-percent" class="text-xl font-black text-indigo-600">0%</div>
    </div>
</div>

<div id="classes-container" class="space-y-6 mt-6">
    </div>

<div class="pt-6 border-t mt-8">
    <button id="final-submit-btn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">
        Save Full Jamia Inspection
    </button>
</div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Present</label>
                    <input type="number" id="present-count" oninput="calculateTotal()" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Avg. Percentage</label>
                    <div id="final-percent" class="text-lg font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check text-indigo-500"></i> Evaluation Questions
                </h3>
                <div class="border border-slate-100 rounded-2xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 text-left">Question Details</th>
                                <th class="p-4 text-center w-32">Sahi Jawab (No.)</th>
                            </tr>
                        </thead>
                        <tbody id="questions-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-between items-center pt-6 border-t border-slate-100">
    <button onclick="window.close()" class="text-slate-400 font-bold hover:text-red-500">Cancel</button>
    
    <div class="flex gap-3">
        <button id="add-subject-btn" type="button" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-amber-600 active:scale-95 transition-all">
            <i class="fas fa-plus mr-2"></i> Add Subject
        </button>

        <button id="save-class-btn" type="button" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
            Submit & Next Class
        </button>
    </div>
</div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    document.getElementById('jamia-title').textContent = jamiaName;

    let currentUser = null;
    let fullStructure = []; 
    let currentClassReports = []; // Temporary storage for subjects

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadJamiaStructure();
            initAppLogic(); // Buttons ko activate karne wala function
        } else {
            window.location.href = "index.html";
        }
    });

    async function loadJamiaStructure() {
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
            const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                populateClasses();
            }
        }
    }

    function populateClasses() {
        const classSelect = document.getElementById('class-select');
        const classes = new Set();
        fullStructure.forEach(teacher => {
            teacher.periods?.forEach(p => classes.add(p.className));
        });
        classSelect.innerHTML = '<option value="">Select Class</option>' + 
            Array.from(classes).map(c => `<option value="${c}">${c}</option>`).join('');
        classSelect.onchange = populateTeachers;
    }

    function populateTeachers() {
        const selectedClass = document.getElementById('class-select').value;
        const teacherSelect = document.getElementById('teacher-select');
        const filteredTeachers = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
        teacherSelect.innerHTML = '<option value="">Select Teacher</option>' + 
            filteredTeachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        teacherSelect.onchange = populateSubjects;
    }

    function populateSubjects() {
        const selectedClass = document.getElementById('class-select').value;
        const selectedTeacherId = document.getElementById('teacher-select').value;
        const subjectSelect = document.getElementById('subject-select');
        const teacher = fullStructure.find(t => t.id === selectedTeacherId);
        const subjects = teacher?.periods?.filter(p => p.className === selectedClass) || [];
        subjectSelect.innerHTML = subjects.map(s => `<option value="${s.bookName}">${s.bookName}</option>`).join('');
        renderQuestions();
    }

    document.getElementById('subject-select').onchange = renderQuestions;

    function renderQuestions() {
        const subject = document.getElementById('subject-select').value.toLowerCase();
        const container = document.getElementById('questions-body');
        let html = '';
        if (subject.includes('english')) {
            ['Reading', 'Writing', 'Translation'].forEach(q => html += createRow(q, false));
        }
        for(let i=1; i<=3; i++) html += createRow('', true);
        container.innerHTML = html;
        window.calculateTotal();
    }

    function createRow(val, isBlank) {
        return `<tr class="q-row border-b border-slate-50">
                <td class="p-4">${isBlank ? `<input type="text" placeholder="Sawwal..." class="q-title-input w-full bg-indigo-50/50 p-2 rounded-lg outline-none">` : `<span class="q-title-fixed font-semibold">${val}</span>`}</td>
                <td class="p-4 text-center"><input type="number" oninput="window.calculateTotal()" class="q-input w-24 text-center font-bold text-indigo-600 bg-slate-50 p-2 rounded-lg outline-none" placeholder="0"></td>
            </tr>`;
    }

    window.calculateTotal = () => {
        const present = parseFloat(document.getElementById('present-count').value) || 0;
        const inputs = document.querySelectorAll('.q-input');
        let total = 0, count = 0;
        inputs.forEach(input => { if(input.value !== "") { total += parseFloat(input.value) || 0; count++; } });
        const avgSahi = count > 0 ? total / count : 0;
        const percent = present > 0 ? ((avgSahi / present) * 100).toFixed(1) : 0;
        const display = document.getElementById('final-percent');
        display.textContent = percent + '%';
        display.className = `text-lg font-black ${percent > 70 ? 'text-emerald-500' : 'text-indigo-600'}`;
    };

    // --- ASLI LOGIC START ---
    function initAppLogic() {
        // 1. ADD SUBJECT BUTTON
        document.getElementById('add-subject-btn').onclick = () => {
            const subject = document.getElementById('subject-select').value;
            const present = document.getElementById('present-count').value;
            if (!subject || present == "0") return alert("Subject aur Present count zaroori hai!");

            const questions = [];
            document.querySelectorAll('.q-row').forEach(row => {
                const title = row.querySelector('.q-title-fixed')?.textContent || row.querySelector('.q-title-input')?.value;
                const score = row.querySelector('.q-input').value;
                if(title && score !== "") questions.push({ title, score });
            });

            currentClassReports.push({
                subject,
                teacher: document.getElementById('teacher-select').options[document.getElementById('teacher-select').selectedIndex].text,
                present,
                percentage: document.getElementById('final-percent').textContent,
                questions
            });

            // UI Reset for next subject
            document.getElementById('present-count').value = 0;
            renderQuestions();
            alert(`${subject} add ho gaya!`);
        };

        // 2. SAVE CLASS BUTTON
        document.getElementById('save-class-btn').onclick = async () => {
            const className = document.getElementById('class-select').value;
            if (currentClassReports.length === 0) return alert("Pehle Add Subject karein!");

            try {
                const reportId = `${jamiaName}_${className}_${Date.now()}`;
                await setDoc(doc(db, "academic_inspections", reportId), {
                    jamia: jamiaName,
                    className,
                    subjects: currentClassReports,
                    timestamp: serverTimestamp(),
                    inspector: currentUser.uid
                });

                alert("Poori class ka data save ho gaya!");
                currentClassReports = []; // Clear temp data
                document.getElementById('class-select').selectedIndex = 0;
                renderQuestions();
            } catch (e) {
                alert("Error saving: " + e.message);
            }
        };
    }

        let jamiaReport = []; // Isme saari classes aur unke subjects honge

// 1. Nayi Class Add Karna
document.getElementById('add-class-to-list').onclick = () => {
    const className = document.getElementById('class-select').value;
    const present = document.getElementById('class-present').value;

    if(!className || present <= 0) return alert("Class aur Present students lazmi hain!");

    // Check agar class pehle se added hai
    if(jamiaReport.some(c => c.className === className)) return alert("Ye class pehle se added hai!");

    const classObj = {
        className: className,
        present: parseInt(present),
        subjects: [],
        classPercent: 0
    };

    jamiaReport.push(classObj);
    renderJamiaReport();
};

// 2. Class ke andar Subject Add Karna
function addSubjectToClass(classIndex) {
    const newSubject = {
        subjectName: "Select Subject",
        teacherName: "",
        score: 0,
        subPercent: 0,
        questions: [] 
    };
    jamiaReport[classIndex].subjects.push(newSubject);
    renderJamiaReport();
}

// 3. UI Render Karna (Class and Subject Cards)
function renderJamiaReport() {
    const container = document.getElementById('classes-container');
    container.innerHTML = '';

    jamiaReport.forEach((cls, cIdx) => {
        let classHtml = `
            <div class="bg-white border-2 border-indigo-100 rounded-3xl p-5 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-indigo-800">${cls.className} <span class="text-sm font-normal text-slate-400">(Present: ${cls.present})</span></h2>
                    <div class="flex gap-2">
                        <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg font-bold">Class: ${cls.classPercent}%</span>
                        <button onclick="deleteClass(${cIdx})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                    </div>
                </div>

                <div class="space-y-3" id="subjects-of-${cIdx}">
                    ${cls.subjects.map((sub, sIdx) => `
                        <div class="flex gap-3 items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <select onchange="updateSubName(${cIdx}, ${sIdx}, this.value)" class="form-select text-sm w-1/3">
                                <option>Select Subject</option>
                                <option value="Math">Math</option>
                                <option value="Urdu">Urdu</option>
                                <option value="English">English</option>
                            </select>
                            <input type="number" placeholder="Avg Score" oninput="updateSubScore(${cIdx}, ${sIdx}, this.value)" class="form-select text-sm w-1/4">
                            <span class="font-bold text-indigo-600 w-20 text-center">${sub.subPercent}%</span>
                            <button onclick="deleteSubject(${cIdx}, ${sIdx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                        </div>
                    `).join('')}
                </div>

                <button onclick="addSubjectToClass(${cIdx})" class="mt-4 text-indigo-600 font-bold text-sm hover:underline">
                    + Add Subject to ${cls.className}
                </button>
            </div>
        `;
        container.innerHTML += classHtml;
    });
    calculateGlobalStats();
}

// 4. Calculations Level by Level
function updateSubScore(cIdx, sIdx, val) {
    const present = jamiaReport[cIdx].present;
    const score = parseFloat(val) || 0;
    
    jamiaReport[cIdx].subjects[sIdx].score = score;
    jamiaReport[cIdx].subjects[sIdx].subPercent = ((score / present) * 100).toFixed(1);
    
    calculateClassPercent(cIdx);
    renderJamiaReport(); // Refresh UI
}

function calculateClassPercent(cIdx) {
    const subs = jamiaReport[cIdx].subjects;
    if(subs.length === 0) return;
    
    const totalPerc = subs.reduce((acc, curr) => acc + parseFloat(curr.subPercent), 0);
    jamiaReport[cIdx].classPercent = (totalPerc / subs.length).toFixed(1);
}

function calculateGlobalStats() {
    if(jamiaReport.length === 0) return;
    const totalJamiaPerc = jamiaReport.reduce((acc, curr) => acc + parseFloat(curr.classPercent), 0);
    const final = (totalJamiaPerc / jamiaReport.length).toFixed(1);
    
    document.getElementById('jamia-total-percent').textContent = final + '%';
}

// Delete Functions
window.deleteClass = (idx) => { jamiaReport.splice(idx, 1); renderJamiaReport(); };
window.deleteSubject = (cIdx, sIdx) => { jamiaReport[cIdx].subjects.splice(sIdx, 1); calculateClassPercent(cIdx); renderJamiaReport(); };
        
</script>
</body>
</html>
