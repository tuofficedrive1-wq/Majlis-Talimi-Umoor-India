<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Academic Quality Control</h1>
            <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="max-w-6xl mx-auto p-4">
    <div class="bg-indigo-900 text-white p-6 rounded-2xl flex justify-between items-center mb-8 shadow-2xl border-b-4 border-yellow-500">
        <div class="flex gap-8">
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest opacity-70">Total Classes</p>
                <p id="total-classes-count" class="text-2xl font-bold">0</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest opacity-70">Total Books</p>
                <p id="total-books-count" class="text-2xl font-bold">0</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-widest text-yellow-400">Jamia Overall Performance</p>
            <div id="jamia-total-percent" class="text-4xl font-black">0%</div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <button id="add-class-btn" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
            <i class="fas fa-plus-circle mr-2"></i> Add New Class
        </button>
        <p class="text-slate-400 text-sm font-medium italic">Click "Add New Class" to begin inspection</p>
    </div>

    <div id="classes-list" class="space-y-10">
        </div>

    <div class="mt-12 pb-10">
        <button id="final-save" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold text-xl shadow-xl hover:bg-emerald-700 transition-all flex justify-center items-center gap-3">
            <i class="fas fa-cloud-upload-alt"></i> Save Final Inspection Report
        </button>
    </div>
</div>
            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Present</label>
                    <input type="number" id="present-count" oninput="calculateTotal()" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Avg. Percentage</label>
                    <div id="final-percent" class="text-lg font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check text-indigo-500"></i> Evaluation Questions
                </h3>
                <div class="border border-slate-100 rounded-2xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 text-left">Question Details</th>
                                <th class="p-4 text-center w-32">Sahi Jawab (No.)</th>
                            </tr>
                        </thead>
                        <tbody id="questions-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-between items-center pt-6 border-t border-slate-100">
    <button onclick="window.close()" class="text-slate-400 font-bold hover:text-red-500">Cancel</button>
    
    <div class="flex gap-3">
        <button id="add-subject-btn" type="button" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-amber-600 active:scale-95 transition-all">
            <i class="fas fa-plus mr-2"></i> Add Subject
        </button>

        <button id="save-class-btn" type="button" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
            Submit & Next Class
        </button>
    </div>
</div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    document.getElementById('jamia-title').textContent = jamiaName;

    let currentUser = null;
    let fullStructure = []; 
    let currentClassReports = []; // Temporary storage for subjects

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadJamiaStructure();
            initAppLogic(); // Buttons ko activate karne wala function
        } else {
            window.location.href = "index.html";
        }
    });

    async function loadJamiaStructure() {
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
            const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                populateClasses();
            }
        }
    }

    function populateClasses() {
        const classSelect = document.getElementById('class-select');
        const classes = new Set();
        fullStructure.forEach(teacher => {
            teacher.periods?.forEach(p => classes.add(p.className));
        });
        classSelect.innerHTML = '<option value="">Select Class</option>' + 
            Array.from(classes).map(c => `<option value="${c}">${c}</option>`).join('');
        classSelect.onchange = populateTeachers;
    }

    function populateTeachers() {
        const selectedClass = document.getElementById('class-select').value;
        const teacherSelect = document.getElementById('teacher-select');
        const filteredTeachers = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
        teacherSelect.innerHTML = '<option value="">Select Teacher</option>' + 
            filteredTeachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        teacherSelect.onchange = populateSubjects;
    }

    function populateSubjects() {
        const selectedClass = document.getElementById('class-select').value;
        const selectedTeacherId = document.getElementById('teacher-select').value;
        const subjectSelect = document.getElementById('subject-select');
        const teacher = fullStructure.find(t => t.id === selectedTeacherId);
        const subjects = teacher?.periods?.filter(p => p.className === selectedClass) || [];
        subjectSelect.innerHTML = subjects.map(s => `<option value="${s.bookName}">${s.bookName}</option>`).join('');
        renderQuestions();
    }

    document.getElementById('subject-select').onchange = renderQuestions;

    function renderQuestions() {
        const subject = document.getElementById('subject-select').value.toLowerCase();
        const container = document.getElementById('questions-body');
        let html = '';
        if (subject.includes('english')) {
            ['Reading', 'Writing', 'Translation'].forEach(q => html += createRow(q, false));
        }
        for(let i=1; i<=3; i++) html += createRow('', true);
        container.innerHTML = html;
        window.calculateTotal();
    }

    function createRow(val, isBlank) {
        return `<tr class="q-row border-b border-slate-50">
                <td class="p-4">${isBlank ? `<input type="text" placeholder="Sawwal..." class="q-title-input w-full bg-indigo-50/50 p-2 rounded-lg outline-none">` : `<span class="q-title-fixed font-semibold">${val}</span>`}</td>
                <td class="p-4 text-center"><input type="number" oninput="window.calculateTotal()" class="q-input w-24 text-center font-bold text-indigo-600 bg-slate-50 p-2 rounded-lg outline-none" placeholder="0"></td>
            </tr>`;
    }

    window.calculateTotal = () => {
        const present = parseFloat(document.getElementById('present-count').value) || 0;
        const inputs = document.querySelectorAll('.q-input');
        let total = 0, count = 0;
        inputs.forEach(input => { if(input.value !== "") { total += parseFloat(input.value) || 0; count++; } });
        const avgSahi = count > 0 ? total / count : 0;
        const percent = present > 0 ? ((avgSahi / present) * 100).toFixed(1) : 0;
        const display = document.getElementById('final-percent');
        display.textContent = percent + '%';
        display.className = `text-lg font-black ${percent > 70 ? 'text-emerald-500' : 'text-indigo-600'}`;
    };

    // --- ASLI LOGIC START ---
    function initAppLogic() {
        // 1. ADD SUBJECT BUTTON
        document.getElementById('add-subject-btn').onclick = () => {
            const subject = document.getElementById('subject-select').value;
            const present = document.getElementById('present-count').value;
            if (!subject || present == "0") return alert("Subject aur Present count zaroori hai!");

            const questions = [];
            document.querySelectorAll('.q-row').forEach(row => {
                const title = row.querySelector('.q-title-fixed')?.textContent || row.querySelector('.q-title-input')?.value;
                const score = row.querySelector('.q-input').value;
                if(title && score !== "") questions.push({ title, score });
            });

            currentClassReports.push({
                subject,
                teacher: document.getElementById('teacher-select').options[document.getElementById('teacher-select').selectedIndex].text,
                present,
                percentage: document.getElementById('final-percent').textContent,
                questions
            });

            // UI Reset for next subject
            document.getElementById('present-count').value = 0;
            renderQuestions();
            alert(`${subject} add ho gaya!`);
        };

        // 2. SAVE CLASS BUTTON
        document.getElementById('save-class-btn').onclick = async () => {
            const className = document.getElementById('class-select').value;
            if (currentClassReports.length === 0) return alert("Pehle Add Subject karein!");

            try {
                const reportId = `${jamiaName}_${className}_${Date.now()}`;
                await setDoc(doc(db, "academic_inspections", reportId), {
                    jamia: jamiaName,
                    className,
                    subjects: currentClassReports,
                    timestamp: serverTimestamp(),
                    inspector: currentUser.uid
                });

                alert("Poori class ka data save ho gaya!");
                currentClassReports = []; // Clear temp data
                document.getElementById('class-select').selectedIndex = 0;
                renderQuestions();
            } catch (e) {
                alert("Error saving: " + e.message);
            }
        };
    }

       let jamiaData = [];

// 1. Add New Class Section
document.getElementById('add-class-btn').onclick = () => {
    const classId = Date.now();
    const classTemplate = `
        <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden" id="class-${classId}">
            <div class="bg-slate-50 p-5 border-b flex justify-between items-center">
                <div class="flex gap-4 items-center">
                    <button onclick="removeClass(${classId})" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200 transition-all">
                        <i class="fas fa-trash-alt mr-1"></i> Remove Class
                    </button>
                    <select class="class-name-select p-2 bg-transparent border-b-2 border-indigo-200 font-bold text-indigo-800 outline-none">
                        <option value="">Select Class</option>
                        <option>Class 1</option><option>Class 2</option><option>Class 3</option>
                    </select>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm">
                    Class Score: <span class="class-avg">0%</span>
                </div>
            </div>

            <div class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 bg-indigo-50/30 p-6 rounded-2xl border border-indigo-50">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Total Students (Enrolled)</label>
                        <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g. 30" oninput="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Present Students (On-site)</label>
                        <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g. 25" oninput="updateCalculations()">
                    </div>
                </div>

                <div class="hidden md:grid grid-cols-12 gap-4 mb-4 px-2 text-[10px] font-black text-slate-400 uppercase">
                    <div class="col-span-1">Action</div>
                    <div class="col-span-3">Teacher / Period</div>
                    <div class="col-span-3">Subject / Book</div>
                    <div class="col-span-3 text-center">Avg. Correct Responses</div>
                    <div class="col-span-2 text-center">Score %</div>
                </div>

                <div class="books-container space-y-4">
                    </div>

                <button onclick="addBook(${classId})" class="mt-6 bg-slate-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-black transition-all">
                    <i class="fas fa-book-open mr-2"></i> Add New Subject
                </button>
            </div>
        </div>
    `;
    document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
    addBook(classId); // Add first subject by default
    updateCalculations();
};

// 2. Add Subject Row to a Class
window.addBook = (classId) => {
    const bookId = Date.now();
    const bookRow = `
        <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all shadow-sm" id="book-${bookId}">
            <div class="col-span-1 flex justify-center">
                <button onclick="removeBook(${bookId})" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-times-circle text-xl"></i></button>
            </div>
            <div class="col-span-3">
                <input type="text" class="w-full p-2 text-sm border-b outline-none" placeholder="Teacher Name">
            </div>
            <div class="col-span-3">
                <input type="text" class="w-full p-2 text-sm border-b outline-none font-medium" placeholder="Subject Name">
            </div>
            <div class="col-span-3">
                <input type="number" class="avg-correct w-full p-2 bg-indigo-50/50 rounded-lg text-center font-bold text-indigo-700 outline-none" placeholder="0" oninput="updateCalculations()">
            </div>
            <div class="col-span-2 text-center">
                <span class="book-percent text-lg font-black text-slate-300">0%</span>
            </div>
        </div>
    `;
    document.querySelector(`#class-${classId} .books-container`).insertAdjacentHTML('beforeend', bookRow);
};

// 3. Calculation Engine
window.updateCalculations = () => {
    let jamiaTotalPerc = 0;
    let totalClasses = document.querySelectorAll('.class-card').length;
    let totalBooksCount = 0;

    document.querySelectorAll('.class-card').forEach(classCard => {
        let present = parseFloat(classCard.querySelector('.present-students').value) || 0;
        let classTotalPerc = 0;
        let booksInClass = classCard.querySelectorAll('.book-row');
        totalBooksCount += booksInClass.length;

        booksInClass.forEach(bookRow => {
            let correct = parseFloat(bookRow.querySelector('.avg-correct').value) || 0;
            let bookPerc = (present > 0 && correct > 0) ? (correct / present) * 100 : 0;
            
            // Limit percentage to 100%
            if(bookPerc > 100) bookPerc = 100;

            const percDisplay = bookRow.querySelector('.book-percent');
            percDisplay.textContent = bookPerc.toFixed(1) + '%';
            percDisplay.className = `book-percent text-lg font-black ${bookPerc > 0 ? 'text-indigo-600' : 'text-slate-300'}`;
            
            classTotalPerc += bookPerc;
        });

        let classAvg = booksInClass.length > 0 ? (classTotalPerc / booksInClass.length) : 0;
        classCard.querySelector('.class-avg').textContent = classAvg.toFixed(1) + '%';
        jamiaTotalPerc += classAvg;
    });

    let jamiaAvg = totalClasses > 0 ? (jamiaTotalPerc / totalClasses) : 0;
    
    // Update Header
    document.getElementById('jamia-total-percent').textContent = jamiaAvg.toFixed(1) + '%';
    document.getElementById('total-classes-count').textContent = totalClasses;
    document.getElementById('total-books-count').textContent = totalBooksCount;
};

// 4. Remove Helpers
window.removeClass = (id) => { if(confirm('Remove this class?')) { document.getElementById(`class-${id}`).remove(); updateCalculations(); } };
window.removeBook = (id) => { document.getElementById(`book-${id}`).remove(); updateCalculations(); };
        
</script>
</body>
</html>
