<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Academic Quality Control</h1>
            <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Select Class</label>
                    <select id="class-select" class="form-select font-bold text-indigo-700">
                        <option value="">Loading Classes...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Select Teacher</label>
                    <select id="teacher-select" class="form-select">
                        <option value="">Select Class First</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Subject</label>
                    <select id="subject-select" class="form-select font-semibold">
                        <option value="General">General/Other</option>
                        <option value="English">English</option>
                        <option value="Math">Math</option>
                        <option value="Urdu">Urdu</option>
                    </select>
                </div>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Present</label>
                    <input type="number" id="present-count" oninput="calculateTotal()" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Avg. Percentage</label>
                    <div id="final-percent" class="text-lg font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check text-indigo-500"></i> Evaluation Questions
                </h3>
                <div class="border border-slate-100 rounded-2xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 text-left">Question Details</th>
                                <th class="p-4 text-center w-32">Sahi Jawab (No.)</th>
                            </tr>
                        </thead>
                        <tbody id="questions-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-between items-center pt-6 border-t border-slate-100">
                <button onclick="window.close()" class="text-slate-400 font-bold hover:text-red-500">Cancel</button>
                <button id="save-btn" class="bg-indigo-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                    Submit Inspection
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase Config (Same as your dashboard)
        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const jamiaName = urlParams.get('jamia');
        document.getElementById('jamia-title').textContent = jamiaName;

        // 1. Data Loading from Monthly Performance logic
        async function loadPerformanceData() {
            // Yahan hum aapke 'classes' aur 'teachers' ka data fetch karenge
            // Demo ke liye static list de raha hoon, aap isse Firestore se connect kar sakte hain
            const classes = ["Ibtidaiya 1", "Ibtidaiya 2", "Saniya", "Salisa"];
            const classDropdown = document.getElementById('class-select');
            classDropdown.innerHTML = '<option value="">Select Class</option>' + 
                classes.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        // 2. Dynamic Questions Logic
        function renderQuestions() {
            const subject = document.getElementById('subject-select').value;
            const container = document.getElementById('questions-body');
            let html = '';

            if (subject === 'English') {
                // 3 Fixed Questions
                const fixed = ['Reading', 'Writing', 'Translation'];
                fixed.forEach((q, i) => {
                    html += createRow(q, false);
                });
                // 3 Blank Questions
                for(let i=1; i<=3; i++) {
                    html += createRow('', true);
                }
            } else {
                // Only 3 Blank Questions for other subjects
                for(let i=1; i<=3; i++) {
                    html += createRow('', true);
                }
            }
            container.innerHTML = html;
        }

        function createRow(val, isBlank) {
            return `
                <tr class="q-row border-b border-slate-50">
                    <td class="p-4">
                        ${isBlank ? 
                            `<input type="text" placeholder="Enter Question Here..." class="w-full bg-indigo-50/50 p-2 rounded-lg border-none outline-none text-slate-700 font-medium">` : 
                            `<span class="font-semibold text-slate-700">${val}</span>`}
                    </td>
                    <td class="p-4">
                        <input type="number" oninput="calculateTotal()" class="q-input w-full text-center font-bold text-indigo-600 bg-slate-50 p-2 rounded-lg border-none outline-none" placeholder="0">
                    </td>
                </tr>`;
        }

        window.calculateTotal = () => {
            const present = parseFloat(document.getElementById('present-count').value) || 0;
            const inputs = document.querySelectorAll('.q-input');
            let total = 0;
            let count = 0;

            inputs.forEach(input => {
                if(input.value !== "") {
                    total += parseFloat(input.value) || 0;
                    count++;
                }
            });

            const avgSahi = count > 0 ? total / count : 0;
            const percent = present > 0 ? ((avgSahi / present) * 100).toFixed(1) : 0;
            
            const display = document.getElementById('final-percent');
            display.textContent = percent + '%';
            display.className = `text-lg font-black ${percent > 70 ? 'text-emerald-500' : 'text-indigo-600'}`;
        };

        // Event Listeners
        document.getElementById('subject-select').onchange = renderQuestions;
        
        // Init
        loadPerformanceData();
        renderQuestions();

    </script>
</body>
</html>
