<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; border-radius: 8px; }
        .q-row:hover { background-color: #f8fafc; }

        /* Unified button system - ek hi family, sirf color se fark */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.875rem;
            white-space: nowrap;
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.15);
            transition: transform 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .btn-success { background: #059669; color: #fff; }
        .btn-success:hover { background: #047857; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger-ghost {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 0.9rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.72rem;
            background: #fee2e2;
            color: #dc2626;
            white-space: nowrap;
            transition: background-color 0.15s ease;
        }
        .btn-danger-ghost:hover { background: #fecaca; }
        .icon-remove {
            width: 2.25rem;
            height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #cbd5e1;
            transition: all 0.15s ease;
        }
        .icon-remove:hover { color: #ef4444; background: #fef2f2; }
        button:focus-visible, select:focus-visible, textarea:focus-visible, input:focus-visible {
            outline: 2px solid #4f46e5;
            outline-offset: 2px;
        }
        .class-remark {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            resize: vertical;
            font-family: inherit;
            font-size: 0.875rem;
            background: #fff;
            transition: 0.3s;
        }
        .class-remark:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="p-3 sm:p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-slate-200">
    <div class="bg-indigo-600 p-5 sm:p-6 text-white text-center">
        <h1 class="text-xl sm:text-2xl font-bold">Academic Quality Control</h1>
        <p id="jamia-title" class="opacity-80 font-medium text-sm sm:text-base mt-1">Jamia Inspection</p>
    </div>

    <div class="p-4 sm:p-6">
        <div class="bg-indigo-900 text-white p-5 sm:p-6 rounded-2xl flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 sm:gap-0 mb-6 sm:mb-8 shadow-2xl border-b-4 border-yellow-500">
            <div class="flex justify-center sm:justify-start gap-8">
                <div class="text-center">
                    <p class="text-[10px] uppercase tracking-widest opacity-70">Total Classes</p>
                    <p id="total-classes-count" class="text-2xl font-bold">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase tracking-widest opacity-70">Total Books</p>
                    <p id="total-books-count" class="text-2xl font-bold">0</p>
                </div>
            </div>
            <div class="text-center sm:text-right">
                <p class="text-xs font-bold uppercase tracking-widest text-yellow-400">Jamia Overall Performance</p>
                <div id="jamia-total-percent" class="text-3xl sm:text-4xl font-black">0%</div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
            <button id="add-class-btn" class="btn btn-primary w-full sm:w-auto">
                <i class="fas fa-plus-circle"></i> Add New Class
            </button>
            <p class="text-slate-400 text-xs sm:text-sm font-medium italic text-center sm:text-left">Click "Add New Class" to begin</p>
        </div>

        <div id="classes-list" class="space-y-6 sm:space-y-10"></div>

        <div class="mt-8 sm:mt-10 pb-4 flex justify-center"> 
            <button id="final-save-btn" class="btn btn-success w-full sm:w-auto">
                <i class="fas fa-cloud-upload-alt"></i> Save Final Report
            </button>
        </div>
    </div>
</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    const urlMonth = urlParams.get('month');
   document.getElementById('jamia-title').innerHTML = `${jamiaName} <br> <span class="text-yellow-300 font-bold text-[13px] border-t border-indigo-500 pt-1 mt-1 inline-block tracking-wide"><i class="far fa-calendar-alt"></i> Month: ${getMonthName(getCurrentMonthKey())}</span>`;

    let currentUser = null;
    let fullStructure = []; 

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadJamiaStructure();
            await loadExistingReport();
        } else {
            window.location.href = "index.html";
        }
    });
        function getMonthName(monthKey) {
        if (!monthKey) return "";
        const [year, month] = monthKey.split('-');
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        return `${monthNames[parseInt(month) - 1]} ${year}`;
    }
// Current month nikalne ka helper function
function getCurrentMonthKey() {
        if (urlMonth) return urlMonth; // Agar URL me month hai to usay use karein
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }
        function getAcademicYear() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const year = now.getFullYear();
        return month >= 4 ? `${year}-${year + 1}` : `${year - 1}-${year}`;
    }
        
async function loadJamiaStructure() {
        const activeYear = getAcademicYear();
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            const userData = userSnap.data();
            const academicData = userData.academicYears?.[activeYear]?.karkardagiStructure || [];
            
            const jamiaData = academicData.find(j => j.jamiaName.trim() === jamiaName.trim());
            
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                console.log("Structure Loaded Successfully for:", activeYear);
            }
        }
    }

    // --- Dynamic UI Logic ---

    document.getElementById('add-class-btn').onclick = () => {
    const classId = Date.now();
    // Unique classes nikalna
    const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
    const classOptions = classes.map(c => `<option value="${c}">${c}</option>`).join('');

    const classTemplate = `
        <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-8" id="class-${classId}">
            <div class="bg-slate-50 p-4 sm:p-5 border-b flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                <div class="flex flex-wrap gap-3 items-center">
                    <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="btn-danger-ghost"><i class="fas fa-trash"></i> Remove Class</button>
                    <select class="class-select p-2 font-bold text-indigo-800 outline-none bg-transparent border-b-2 border-indigo-200 flex-1 min-w-[140px]" onchange="updateTeachers(this, ${classId})">
                        <option value="">Select Class</option>
                        ${classOptions}
                    </select>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm text-sm text-center sm:text-left">Class Score: <span class="class-avg">0%</span></div>
            </div>
            <div class="p-4 sm:p-8">
                <div class="grid grid-cols-2 gap-4 sm:gap-8 mb-6 sm:mb-8 bg-indigo-50/30 p-4 sm:p-6 rounded-2xl border border-indigo-50">
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Total Students</label><input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold outline-none" placeholder="e.g. 30" oninput="updateCalculations()"></div>
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Present Students</label><input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold outline-none" placeholder="e.g. 25" oninput="updateCalculations()"></div>
                </div>
                <div class="books-container space-y-6"></div>
                <div class="mt-6 sm:mt-8 flex justify-start">
                    <button onclick="addBookRow(${classId})" type="button" class="btn btn-warning w-full sm:w-auto">
                        <i class="fas fa-plus"></i> Add Subject
                    </button>
                </div>
                <div class="mt-6 sm:mt-8">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2"><i class="fas fa-comment-dots mr-1"></i> Class Remarks</label>
                    <textarea class="class-remark" rows="3" placeholder="Add any remarks about this class (optional)..."></textarea>
                </div>
            </div>
        </div>`;
    
    document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
};

    window.updateTeachers = (selectElem, classId) => {
    const card = document.getElementById(`class-${classId}`);
    card.dataset.selectedClass = selectElem.value;
    
    // Sirf container ko clear karein, baki functions safe rahenge
    const container = card.querySelector('.books-container');
    if (container) {
        container.innerHTML = ''; 
    }
};

    window.addBookRow = (classId) => {
        const card = document.getElementById(`class-${classId}`);
        const selectedClass = card.dataset.selectedClass;
        if(!selectedClass) return alert("Please select a class first!");

        const bookId = Date.now();
        const teachersInClass = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
        const teacherOptions = teachersInClass.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

        const bookRow = `
            <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100" id="book-${bookId}">
                <div class="col-span-1 text-center"><button onclick="this.closest('.book-row').remove(); updateCalculations();" class="icon-remove">×</button></div>
                <div class="col-span-4">
                    <select class="teacher-select w-full p-2 border-b outline-none text-sm" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                        <option value="">Select Teacher</option>${teacherOptions}
                    </select>
                </div>
                <div class="col-span-4">
                    <select class="book-select w-full p-2 border-b outline-none text-sm font-medium">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="col-span-3 text-center">
                    <span class="md:hidden block text-[9px] font-bold text-slate-400 uppercase mb-0.5">Score</span>
                    <div class="text-lg font-black text-slate-300 book-percent">0%</div>
                </div>
            </div>`;
        
        card.querySelector('.books-container').insertAdjacentHTML('beforeend', bookRow);
    };

    window.updateBooks = (teacherSelect, bookRowId, className) => {
    const teacherId = teacherSelect.value;
    const teacher = fullStructure.find(t => t.id === teacherId);
    const books = teacher?.periods?.filter(p => p.className === className) || [];
    const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
    
    bookSelect.innerHTML = '<option value="">Select Subject</option>' + 
        books.map(b => `<option value="${b.bookName}">${b.bookName}</option>`).join('');

    // Jab subject change ho, to questions dikhao
    bookSelect.onchange = () => {
        const selectedSubject = bookSelect.value;
        if(selectedSubject) {
            showQuestionsArea(bookRowId, selectedSubject);
        }
    };
};

// Naya function questions display karne ke liye
function showQuestionsArea(bookRowId, subjectName, savedEvaluations = null) {
    const bookRow = document.getElementById(`book-${bookRowId}`);
    
    const existingQ = document.getElementById(`q-area-${bookRowId}`);
    if(existingQ) existingQ.remove();

    const subjectLower = subjectName.toLowerCase();
    let qHtml = `<div id="q-area-${bookRowId}" class="col-span-12 bg-slate-50 p-4 rounded-xl mt-2 border border-dashed border-indigo-200">
                    <p class="text-[10px] font-bold text-indigo-500 mb-2 uppercase">Questions for ${subjectName}:</p>
                    <div class="grid grid-cols-1 gap-2">`;

    // Agar database se saved questions mil gaye hain
    if (savedEvaluations && savedEvaluations.length > 0) {
        savedEvaluations.forEach(ev => {
            const isPredefined = ['Reading', 'Writing', 'Translation'].includes(ev.text);
            qHtml += createQuestionInput(ev.text, !isPredefined, ev.score);
        });
    } else {
        // Naya subject select karne par (Default blank questions)
        if (subjectLower.includes('english')) {
            ['Reading', 'Writing', 'Translation'].forEach(q => {
                qHtml += createQuestionInput(q, false, '');
            });
        }
        for(let i=1; i<=3; i++) {
            qHtml += createQuestionInput('', true, '');
        }
    }

    qHtml += `</div></div>`;
    bookRow.insertAdjacentHTML('beforeend', qHtml);
}

function createQuestionInput(val = '', isBlank, scoreVal = '') {
    // Agar question mein double quotes (") hon to usay escape karein
    const safeVal = val ? val.replace(/"/g, '&quot;') : '';
    
    return `
        <div class="q-row flex items-center gap-4 bg-white p-2 rounded-lg shadow-sm">
            <div class="flex-1">
                ${isBlank ? `<input type="text" placeholder="Custom Question..." class="w-full text-xs outline-none border-b italic" value="${safeVal}">` : `<span class="text-xs font-bold text-slate-600">${val}</span>`}
            </div>
            <input type="number" class="q-score-input w-20 p-1 bg-indigo-50 rounded text-center text-xs font-bold" placeholder="Score" value="${scoreVal}" oninput="updateCalculations()">
        </div>`;
}

   window.updateCalculations = () => {
    let jamiaTotalPerc = 0;
    const classes = document.querySelectorAll('.class-card');
    let totalBooks = 0;

    classes.forEach(card => {
        const present = parseFloat(card.querySelector('.present-students').value) || 0;
        let classSum = 0;
        const books = card.querySelectorAll('.book-row');
        totalBooks += books.length;

        books.forEach(row => {
            let scoreSum = 0;
            let scoreCount = 0;
            
            const questionInputs = row.querySelectorAll('.q-score-input');
            
            questionInputs.forEach(qInput => {
                // Sirf tab add karein jab value khali na ho
                if (qInput.value.trim() !== "") {
                    scoreSum += parseFloat(qInput.value) || 0;
                    scoreCount++;
                }
            });

            // Agar koi bhi sawal fill nahi hai, toh percentage 0 rahegi
            let avgCorrectFromQuestions = scoreCount > 0 ? (scoreSum / scoreCount) : 0;
            
            let perc = present > 0 ? (avgCorrectFromQuestions / present) * 100 : 0;
            if (perc > 100) perc = 100;

            const display = row.querySelector('.book-percent');
            if (display) {
                display.textContent = perc.toFixed(1) + '%';
                display.className = `text-lg font-black ${perc > 0 ? 'text-indigo-600' : 'text-slate-300'} book-percent`;
            }
            
            classSum += perc;
        });

        const classAvg = books.length > 0 ? classSum / books.length : 0;
        const classDisplay = card.querySelector('.class-avg');
        if (classDisplay) {
            classDisplay.textContent = Math.min(classAvg, 100).toFixed(1) + '%';
        }
        jamiaTotalPerc += classAvg;
    });

    const jamiaAvg = classes.length > 0 ? jamiaTotalPerc / classes.length : 0;
    
    const jamiaDisplay = document.getElementById('jamia-total-percent');
    if (jamiaDisplay) {
        jamiaDisplay.textContent = Math.min(jamiaAvg, 100).toFixed(1) + '%';
    }
    
    document.getElementById('total-classes-count').textContent = classes.length;
    document.getElementById('total-books-count').textContent = totalBooks;
};
 document.getElementById('final-save-btn').onclick = async () => {
    const classes = document.querySelectorAll('.class-card');
    if (classes.length === 0) return alert("Please add at least one class!");

    const now = new Date();
    const monthKey = getCurrentMonthKey();
    const reportId = `REP_${jamiaName.replace(/\s+/g, '_')}_${monthKey}`;

    const finalReport = {
        jamiaName: jamiaName,
        inspectorId: currentUser.uid,
        inspectionDate: serverTimestamp(),
        month: monthKey,
        overallPercentage: document.getElementById('jamia-total-percent').textContent,
        totalClasses: document.getElementById('total-classes-count').textContent,
        totalBooks: document.getElementById('total-books-count').textContent,
        classes: [] 
    };

    classes.forEach(card => {
        const classData = {
            className: card.querySelector('.class-select').value,
            totalStudents: card.querySelector('.total-students').value,
            presentStudents: card.querySelector('.present-students').value,
            classScore: card.querySelector('.class-avg').textContent,
            remarks: card.querySelector('.class-remark').value,
            subjects: []
        };
       card.querySelectorAll('.book-row').forEach(row => {
            const questions = [];
            row.querySelectorAll('.q-score-input').forEach(scoreInput => {
                const parentDiv = scoreInput.closest('.flex');
                const textInput = parentDiv.querySelector('input[type="text"]');
                const spanText = parentDiv.querySelector('span');
                
                let qText = "";
                if (textInput) qText = textInput.value;
                else if (spanText) qText = spanText.textContent;

                questions.push({
                    text: qText,
                    score: scoreInput.value
                });
            });

            classData.subjects.push({
                teacherId: row.querySelector('.teacher-select').value,
                subjectName: row.querySelector('.book-select').value,
                subjectScore: row.querySelector('.book-percent').textContent,
                evaluations: questions
            });
        });
        finalReport.classes.push(classData);
    });

    try {
        // 1. Detailed Inspection Document Save Karein
        await setDoc(doc(db, "academic_inspections", reportId), finalReport);

        // 2. DASHBOARD SUMMARY UPDATE LOGIC (Sirf Draft/Pending ke liye)
        const dashReportId = `${currentUser.uid}_${monthKey}`;
        const dashRef = doc(db, "inspector_reports", dashReportId);
        const dashSnap = await getDoc(dashRef);
        
        let currentJaiza = dashSnap.exists() ? (dashSnap.data().jaiza || []) : [];
        currentJaiza = currentJaiza.filter(j => j.name !== jamiaName);
        
        const scoreVal = finalReport.overallPercentage.replace('%', '');
        const dateVal = now.toISOString().split('T')[0];

        currentJaiza.push({
            name: jamiaName,
            score: scoreVal,
            type: "Inspection",
            date: dateVal
        });

        // Dashboard document update karein
        await setDoc(dashRef, { jaiza: currentJaiza, updatedAt: serverTimestamp(), month: monthKey }, { merge: true });
        
        // Note: Admin (inspection_reports) wali entry yahan se hata di gayi hai 
        // taake form Dashboard mein automatically submit na ho jaye.

        alert("Report saved! Dashboard me pending list me check karein.");
    } catch (error) {
        console.error("Error:", error);
        alert("Save failed!");
    }
};

async function loadExistingReport() {
        const monthKey = getCurrentMonthKey();
        const reportId = `REP_${jamiaName.replace(/\s+/g, '_')}_${monthKey}`;
        
        try {
            let reportRef = doc(db, "academic_inspections", reportId);
            let reportSnap = await getDoc(reportRef);

            if (reportSnap.exists()) {
                const savedData = reportSnap.data();
                console.log("Is mahine ka data mil gaya:", savedData);

                document.getElementById('classes-list').innerHTML = '';
                
                savedData.classes.forEach(cData => {
                    renderSavedClass(cData);
                });

                updateCalculations();
            } else {
                console.log("Is mahine ka form abhi fill nahi hua hai. Form blank rahega.");
                // Yahan form bilkul blank aayega taake naye mahine ki entry ki ja sake
            }
        } catch (error) {
            console.error("Data load karne me galti hui:", error);
        }
    }

function renderSavedClass(cData) {
    const classId = Date.now() + Math.random(); // Unique ID
    const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
    const classOptions = classes.map(c => 
        `<option value="${c}" ${c === cData.className ? 'selected' : ''}>${c}</option>`
    ).join('');

    const classTemplate = `
        <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-8" id="class-${classId}" data-selected-class="${cData.className}">
            <div class="bg-slate-50 p-4 sm:p-5 border-b flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
                <div class="flex flex-wrap gap-3 items-center">
                    <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="btn-danger-ghost"><i class="fas fa-trash"></i> Remove Class</button>
                    <select class="class-select p-2 font-bold text-indigo-800 outline-none bg-transparent border-b-2 border-indigo-200 flex-1 min-w-[140px]" onchange="updateTeachers(this, ${classId})">
                        <option value="">Select Class</option>
                        ${classOptions}
                    </select>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm text-sm text-center sm:text-left">Class Score: <span class="class-avg">${cData.classScore}</span></div>
            </div>
            <div class="p-4 sm:p-8">
                <div class="grid grid-cols-2 gap-4 sm:gap-8 mb-6 sm:mb-8 bg-indigo-50/30 p-4 sm:p-6 rounded-2xl border border-indigo-50">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Total Students</label>
                        <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold outline-none" value="${cData.totalStudents}" oninput="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Present Students</label>
                        <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold outline-none" value="${cData.presentStudents}" oninput="updateCalculations()">
                    </div>
                </div>
                <div class="books-container space-y-6"></div>
                <div class="mt-6 sm:mt-8 flex justify-start">
                    <button onclick="addBookRow(${classId})" type="button" class="btn btn-warning w-full sm:w-auto">
                        <i class="fas fa-plus"></i> Add Subject
                    </button>
                </div>
                <div class="mt-6 sm:mt-8">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2"><i class="fas fa-comment-dots mr-1"></i> Class Remarks</label>
                    <textarea class="class-remark" rows="3" placeholder="Add any remarks about this class (optional)...">${cData.remarks || ''}</textarea>
                </div>
            </div>
        </div>`;

    document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
    
    // Books/Subjects load karna
    const container = document.getElementById(`class-${classId}`).querySelector('.books-container');
    cData.subjects.forEach(sData => {
        renderSavedBook(classId, sData, container);
    });
}

function renderSavedBook(classId, sData, container) {
    const bookId = Date.now() + Math.random();
    const card = document.getElementById(`class-${classId}`);
    const selectedClass = card.dataset.selectedClass;

    const teachersInClass = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
    const teacherOptions = teachersInClass.map(t => 
        `<option value="${t.id}" ${t.id === sData.teacherId ? 'selected' : ''}>${t.name}</option>`
    ).join('');

    const teacher = fullStructure.find(t => t.id === sData.teacherId);
    const books = teacher?.periods?.filter(p => p.className === selectedClass) || [];
    const bookOptions = books.map(b => 
        `<option value="${b.bookName}" ${b.bookName === sData.subjectName ? 'selected' : ''}>${b.bookName}</option>`
    ).join('');

    const bookRow = `
        <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100" id="book-${bookId}">
            <div class="col-span-1 text-center"><button onclick="this.closest('.book-row').remove(); updateCalculations();" class="icon-remove">×</button></div>
            <div class="col-span-4">
                <select class="teacher-select w-full p-2 border-b outline-none text-sm" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                    <option value="">Select Teacher</option>${teacherOptions}
                </select>
            </div>
            <div class="col-span-4">
                <select class="book-select w-full p-2 border-b outline-none text-sm font-medium">
                    <option value="">Select Subject</option>${bookOptions}
                </select>
            </div>
            <div class="col-span-3 text-center">
                <span class="md:hidden block text-[9px] font-bold text-slate-400 uppercase mb-0.5">Score</span>
                <div class="text-lg font-black text-indigo-600 book-percent">${sData.subjectScore}</div>
            </div>
        </div>`;
    
    container.insertAdjacentHTML('beforeend', bookRow);
    // Questions render karna
    showQuestionsArea(bookId, sData.subjectName, sData.evaluations);
    
    const qInputs = document.getElementById(`book-${bookId}`).querySelectorAll('.q-score-input');
    sData.evaluations.forEach((evalData, index) => {
        if(qInputs[index]) qInputs[index].value = evalData.score;
    });
}
        
</script>
</body>
</html>
