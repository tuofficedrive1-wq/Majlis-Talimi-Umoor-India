<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Academic Quality Control</h1>
            <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Select Class</label>
                    <select id="class-select" class="form-select font-bold text-indigo-700">
                        <option value="">Loading Classes...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Select Teacher</label>
                    <select id="teacher-select" class="form-select">
                        <option value="">Select Class First</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Subject</label>
                    <select id="subject-select" class="form-select font-semibold">
                        <option value="General">General/Other</option>
                        <option value="English">English</option>
                        <option value="Math">Math</option>
                        <option value="Urdu">Urdu</option>
                    </select>
                </div>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Present</label>
                    <input type="number" id="present-count" oninput="calculateTotal()" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Avg. Percentage</label>
                    <div id="final-percent" class="text-lg font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check text-indigo-500"></i> Evaluation Questions
                </h3>
                <div class="border border-slate-100 rounded-2xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 text-left">Question Details</th>
                                <th class="p-4 text-center w-32">Sahi Jawab (No.)</th>
                            </tr>
                        </thead>
                        <tbody id="questions-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-between items-center pt-6 border-t border-slate-100">
                <button onclick="window.close()" class="text-slate-400 font-bold hover:text-red-500">Cancel</button>
                <button id="save-btn" class="bg-indigo-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                    Submit Inspection
                </button>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    document.getElementById('jamia-title').textContent = jamiaName;

    let currentUser = null;
    let fullStructure = []; // Firestore se aaya hua data

    // 1. Auth & Data Loading
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadJamiaStructure();
        } else {
            window.location.href = "index.html";
        }
    });

    async function loadJamiaStructure() {
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
            // monthly-performance.js ke mutabiq path
            const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
            const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
            
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                populateClasses();
            } else {
                alert("Is Jamia ka koi structure nahi mila.");
            }
        }
    }

    // 2. Populate Class Dropdown
    function populateClasses() {
        const classSelect = document.getElementById('class-select');
        const classes = new Set();
        
        fullStructure.forEach(teacher => {
            teacher.periods?.forEach(p => classes.add(p.className));
        });

        classSelect.innerHTML = '<option value="">Select Class</option>' + 
            Array.from(classes).map(c => `<option value="${c}">${c}</option>`).join('');
            
        classSelect.onchange = populateTeachers;
    }

    // 3. Populate Teacher Dropdown based on Class
    function populateTeachers() {
        const selectedClass = document.getElementById('class-select').value;
        const teacherSelect = document.getElementById('teacher-select');
        
        const filteredTeachers = fullStructure.filter(t => 
            t.periods?.some(p => p.className === selectedClass)
        );

        teacherSelect.innerHTML = '<option value="">Select Teacher</option>' + 
            filteredTeachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            
        teacherSelect.onchange = populateSubjects;
    }

    // 4. Populate Subject Dropdown based on Class & Teacher
    function populateSubjects() {
        const selectedClass = document.getElementById('class-select').value;
        const selectedTeacherId = document.getElementById('teacher-select').value;
        const subjectSelect = document.getElementById('subject-select');
        
        const teacher = fullStructure.find(t => t.id === selectedTeacherId);
        const subjects = teacher?.periods?.filter(p => p.className === selectedClass) || [];

        subjectSelect.innerHTML = subjects.map(s => `<option value="${s.bookName}">${s.bookName}</option>`).join('');
        
        // Subject change hone par questions refresh karein
        renderQuestions();
    }

    document.getElementById('subject-select').onchange = renderQuestions;

    // 5. Dynamic Questions Logic
    function renderQuestions() {
        const subject = document.getElementById('subject-select').value.toLowerCase();
        const container = document.getElementById('questions-body');
        let html = '';

        // English check logic
        if (subject.includes('english')) {
            const fixed = ['Reading', 'Writing', 'Translation'];
            fixed.forEach(q => html += createRow(q, false));
            for(let i=1; i<=3; i++) html += createRow('', true); // 3 blank
        } else {
            for(let i=1; i<=3; i++) html += createRow('', true); // Only 3 blank for others
        }
        container.innerHTML = html;
        calculateTotal();
    }

    function createRow(val, isBlank) {
        return `
            <tr class="q-row border-b border-slate-50">
                <td class="p-4">
                    ${isBlank ? 
                        `<input type="text" placeholder="Sawwal likhein..." class="q-title-input w-full bg-indigo-50/50 p-2 rounded-lg outline-none text-slate-700 font-medium">` : 
                        `<span class="q-title-fixed font-semibold text-slate-700">${val}</span>`}
                </td>
                <td class="p-4 text-center">
                    <input type="number" oninput="calculateTotal()" class="q-input w-24 text-center font-bold text-indigo-600 bg-slate-50 p-2 rounded-lg outline-none" placeholder="0">
                </td>
            </tr>`;
    }

    window.calculateTotal = () => {
        const present = parseFloat(document.getElementById('present-count').value) || 0;
        const inputs = document.querySelectorAll('.q-input');
        let total = 0;
        let count = 0;

        inputs.forEach(input => {
            if(input.value !== "") {
                total += parseFloat(input.value) || 0;
                count++;
            }
        });

        const avgSahi = count > 0 ? total / count : 0;
        const percent = present > 0 ? ((avgSahi / present) * 100).toFixed(1) : 0;
        
        const display = document.getElementById('final-percent');
        display.textContent = percent + '%';
        display.className = `text-lg font-black ${percent > 70 ? 'text-emerald-500' : 'text-indigo-600'}`;
    };

    // 6. Save Data to Firestore
    document.getElementById('save-btn').onclick = async () => {
        const selectedClass = document.getElementById('class-select').value;
        const selectedSubject = document.getElementById('subject-select').value;
        if (!selectedClass || !selectedSubject) return alert("Class aur Subject select karna zaroori hai.");

        const reportId = `${jamiaName}_${Date.now()}`;
        // Yahan aap apna data object bana kar Firestore ke 'academic_inspections' collection mein save kar sakte hain.
        alert("Report ready for: " + selectedSubject);
    };

</script>
</body>
</html>
