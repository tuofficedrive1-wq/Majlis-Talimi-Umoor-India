<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
    <div class="bg-indigo-600 p-6 text-white text-center">
        <h1 class="text-2xl font-bold">Academic Quality Control</h1>
        <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
    </div>

    <div class="p-6">
        <div class="bg-indigo-900 text-white p-6 rounded-2xl flex justify-between items-center mb-8 shadow-2xl border-b-4 border-yellow-500">
            <div class="flex gap-8">
                <div class="text-center">
                    <p class="text-[10px] uppercase tracking-widest opacity-70">Total Classes</p>
                    <p id="total-classes-count" class="text-2xl font-bold">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase tracking-widest opacity-70">Total Books</p>
                    <p id="total-books-count" class="text-2xl font-bold">0</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold uppercase tracking-widest text-yellow-400">Jamia Overall Performance</p>
                <div id="jamia-total-percent" class="text-4xl font-black">0%</div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <button id="add-class-btn" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
                <i class="fas fa-plus-circle mr-2"></i> Add New Class
            </button>
            <p class="text-slate-400 text-sm font-medium italic">Click "Add New Class" to begin</p>
        </div>

        <div id="classes-list" class="space-y-10"></div>

        <div class="mt-10 pb-4 flex justify-center"> 
            <button id="final-save-btn" class="bg-emerald-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> Save Final Report
            </button>
        </div>
    </div>
</div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    document.getElementById('jamia-title').textContent = jamiaName;

    let currentUser = null;
    let fullStructure = []; 

    onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        await loadJamiaStructure();
        await loadExistingReport(); // Yeh line ensure karegi ke data load ho
    } else {
        window.location.href = "index.html";
    }
});

    async function loadJamiaStructure() {
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
            const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                console.log("Structure Loaded");
            }
        }
    }

    // --- Dynamic UI Logic ---

    document.getElementById('add-class-btn').onclick = () => {
    const classId = Date.now();
    
    // Extract unique classes
    const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
    const classOptions = classes.map(c => `<option value="${c}">${c}</option>`).join('');

    const classTemplate = `
        <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-8" id="class-${classId}">
            <div class="bg-slate-50 p-5 border-b flex justify-between items-center">
                <div class="flex gap-4 items-center">
                    <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200">Remove Class</button>
                    <select class="class-select p-2 font-bold text-indigo-800 outline-none bg-transparent border-b-2 border-indigo-200" onchange="updateTeachers(this, ${classId})">
                        <option value="">Select Class</option>
                        ${classOptions}
                    </select>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm">Class Score: <span class="class-avg">0%</span></div>
            </div>

            <div class="p-8">
                <div class="grid grid-cols-2 gap-8 mb-8 bg-indigo-50/30 p-6 rounded-2xl border border-indigo-50">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Total Students</label>
                        <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold outline-none" placeholder="e.g. 30" oninput="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Present Students</label>
                        <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold outline-none" placeholder="e.g. 25" oninput="updateCalculations()">
                    </div>
                </div>

                <div class="books-container space-y-6"></div>

                <div class="mt-8 flex justify-start">
                    <button onclick="addBookRow(${classId})" type="button" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-amber-600 active:scale-95 transition-all flex items-center gap-2">
                        <i class="fas fa-plus"></i> Add Subject
                    </button>
                </div>
            </div>
        </div>`;
    
    document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
    updateCalculations();
};

    window.updateTeachers = (selectElem, classId) => {
        const selectedClass = selectElem.value;
        const card = document.getElementById(`class-${classId}`);
        card.dataset.selectedClass = selectedClass;
        // Reset books if class changes
        card.querySelector('.books-container').innerHTML = '';
        addBookRow(classId);
    };

    window.addBookRow = (classId) => {
        const card = document.getElementById(`class-${classId}`);
        const selectedClass = card.dataset.selectedClass;
        if(!selectedClass) return alert("Please select a class first!");

        const bookId = Date.now();
        const teachersInClass = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
        const teacherOptions = teachersInClass.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

        const bookRow = `
            <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100" id="book-${bookId}">
                <div class="col-span-1 text-center"><button onclick="this.closest('.book-row').remove(); updateCalculations();" class="text-slate-300 hover:text-red-500">×</button></div>
                <div class="col-span-3">
                    <select class="teacher-select w-full p-2 border-b outline-none text-sm" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                        <option value="">Select Teacher</option>${teacherOptions}
                    </select>
                </div>
                <div class="col-span-3">
                    <select class="book-select w-full p-2 border-b outline-none text-sm font-medium">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                                <div class="col-span-2 text-center text-lg font-black text-slate-300 book-percent">0%</div>
            </div>`;
        
        card.querySelector('.books-container').insertAdjacentHTML('beforeend', bookRow);
    };

    window.updateBooks = (teacherSelect, bookRowId, className) => {
    const teacherId = teacherSelect.value;
    const teacher = fullStructure.find(t => t.id === teacherId);
    const books = teacher?.periods?.filter(p => p.className === className) || [];
    const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
    
    bookSelect.innerHTML = '<option value="">Select Subject</option>' + 
        books.map(b => `<option value="${b.bookName}">${b.bookName}</option>`).join('');

    // Jab subject change ho, to questions dikhao
    bookSelect.onchange = () => {
        const selectedSubject = bookSelect.value;
        if(selectedSubject) {
            showQuestionsArea(bookRowId, selectedSubject);
        }
    };
};

// Naya function questions display karne ke liye
function showQuestionsArea(bookRowId, subjectName) {
    // Agar aap chahte hain ke har subject ke niche uske sawal khulain:
    const bookRow = document.getElementById(`book-${bookRowId}`);
    
    // Pehle se agar koi questions khule hain to unhe hatayein
    const existingQ = document.getElementById(`q-area-${bookRowId}`);
    if(existingQ) existingQ.remove();

    const subjectLower = subjectName.toLowerCase();
    let qHtml = `<div id="q-area-${bookRowId}" class="col-span-12 bg-slate-50 p-4 rounded-xl mt-2 border border-dashed border-indigo-200">
                    <p class="text-[10px] font-bold text-indigo-500 mb-2 uppercase">Questions for ${subjectName}:</p>
                    <div class="grid grid-cols-1 gap-2">`;

    // English logic
    if (subjectLower.includes('english')) {
        ['Reading', 'Writing', 'Translation'].forEach(q => {
            qHtml += createQuestionInput(q, false);
        });
    }
    
    // 3 Blank questions
    for(let i=1; i<=3; i++) {
        qHtml += createQuestionInput('', true);
    }

    qHtml += `</div></div>`;
    bookRow.insertAdjacentHTML('beforeend', qHtml);
}

function createQuestionInput(val, isBlank) {
    return `
        <div class="flex items-center gap-4 bg-white p-2 rounded-lg shadow-sm">
            <div class="flex-1">
                ${isBlank ? `<input type="text" placeholder="Custom Question..." class="w-full text-xs outline-none border-b italic">` : `<span class="text-xs font-bold text-slate-600">${val}</span>`}
            </div>
            <input type="number" class="q-score-input w-20 p-1 bg-indigo-50 rounded text-center text-xs font-bold" placeholder="Score" oninput="updateCalculations()">
        </div>`;
}

    window.updateCalculations = () => {
    let jamiaTotalPerc = 0;
    const classes = document.querySelectorAll('.class-card');
    let totalBooks = 0;

    classes.forEach(card => {
        const present = parseFloat(card.querySelector('.present-students').value) || 0;
        let classSum = 0;
        const books = card.querySelectorAll('.book-row');
        totalBooks += books.length;

        books.forEach(row => {
            // --- NAYA LOGIC: Questions ka score nikalna ---
            let scoreSum = 0;
            let scoreCount = 0;
            
            // Row ke andar jitne bhi question inputs hain unhe dhoondna
            const questionInputs = row.querySelectorAll('.q-score-input');
            
            questionInputs.forEach(qInput => {
                if (qInput.value !== "") {
                    scoreSum += parseFloat(qInput.value) || 0;
                    scoreCount++;
                }
            });

            // Agar questions fill hain to unka average, warna 0
            // Note: Hum manually 'avg-correct' box ko bypass kar rahe hain kyunke ab evaluation questions se data aayega
            let avgCorrectFromQuestions = scoreCount > 0 ? (scoreSum / scoreCount) : 0;
            
            // Percentage Calculation (Avg Score / Present Students * 100)
            let perc = present > 0 ? (avgCorrectFromQuestions / present) * 100 : 0;
            
            // Limit to 100% max
            if (perc > 100) perc = 100;

            const display = row.querySelector('.book-percent');
            if (display) {
                display.textContent = perc.toFixed(1) + '%';
                display.className = `col-span-2 text-center text-lg font-black ${perc > 0 ? 'text-indigo-600' : 'text-slate-300'} book-percent`;
            }
            
            classSum += perc;
        });

        const classAvg = books.length > 0 ? classSum / books.length : 0;
        const classDisplay = card.querySelector('.class-avg');
        if (classDisplay) {
            classDisplay.textContent = Math.min(classAvg, 100).toFixed(1) + '%';
        }
        jamiaTotalPerc += classAvg;
    });

    const jamiaAvg = classes.length > 0 ? jamiaTotalPerc / classes.length : 0;
    
    // Header Stats Update
    const jamiaDisplay = document.getElementById('jamia-total-percent');
    if (jamiaDisplay) {
        jamiaDisplay.textContent = Math.min(jamiaAvg, 100).toFixed(1) + '%';
    }
    
    document.getElementById('total-classes-count').textContent = classes.length;
    document.getElementById('total-books-count').textContent = totalBooks;
};
       document.getElementById('final-save-btn').onclick = async () => {
    const classes = document.querySelectorAll('.class-card');
    if (classes.length === 0) return alert("Please add at least one class!");

    const reportId = `REP_${jamiaName.replace(/\s+/g, '_')}`;

    const finalReport = {
        jamiaName: jamiaName,
        inspectorId: currentUser.uid,
        inspectionDate: serverTimestamp(),
        overallPercentage: document.getElementById('jamia-total-percent').textContent,
        totalClasses: document.getElementById('total-classes-count').textContent,
        totalBooks: document.getElementById('total-books-count').textContent,
        classes: [] 
    };

    // ... (Aapka purana classes.forEach wala logic yahan rahega) ...
    classes.forEach(card => {
        const classData = {
            className: card.querySelector('.class-select').value,
            totalStudents: card.querySelector('.total-students').value,
            presentStudents: card.querySelector('.present-students').value,
            classScore: card.querySelector('.class-avg').textContent,
            subjects: []
        };
        card.querySelectorAll('.book-row').forEach(row => {
            const questions = [];
            row.querySelectorAll('.q-score-input').forEach(qInput => {
                questions.push({ score: qInput.value || 0 });
            });
            classData.subjects.push({
                teacherId: row.querySelector('.teacher-select').value,
                subjectName: row.querySelector('.book-select').value,
                subjectScore: row.querySelector('.book-percent').textContent,
                evaluations: questions
            });
        });
        finalReport.classes.push(classData);
    });

    try {
        // 1. Detailed Inspection Document Save Karein
        await setDoc(doc(db, "academic_inspections", reportId), finalReport);

        // 2. DASHBOARD SUMMARY UPDATE LOGIC (Naya Part)
        // Current month nikalna (e.g., "2026-04")
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const dashReportId = `${currentUser.uid}_${monthKey}`;
        
        const dashRef = doc(db, "inspector_reports", dashReportId);
        const dashSnap = await getDoc(dashRef);
        
        let currentJaiza = dashSnap.exists() ? (dashSnap.data().jaiza || []) : [];

        // Purani entry agar hai to use hatayein aur nayi updated entry add karein
        currentJaiza = currentJaiza.filter(j => j.name !== jamiaName);
        currentJaiza.push({
            name: jamiaName,
            score: finalReport.overallPercentage.replace('%', ''), // Sirf number (e.g., 85.5)
            type: "Inspection",
            date: now.toISOString().split('T')[0] // Aaj ki date (YYYY-MM-DD)
        });

        // Dashboard document update karein
        await setDoc(dashRef, { jaiza: currentJaiza }, { merge: true });
        
        alert("Report saved and Dashboard updated!");
    } catch (error) {
        console.error("Error:", error);
        alert("Save failed!");
    }
};

        async function loadExistingReport() {
    // Jamia name se unique ID banana
    const reportId = `REP_${jamiaName.replace(/\s+/g, '_')}`;
    const reportRef = doc(db, "academic_inspections", reportId);
    
    try {
        const reportSnap = await getDoc(reportRef);
        if (reportSnap.exists()) {
            const savedData = reportSnap.data();
            console.log("Purana data mil gaya:", savedData);

            // UI clear karke saved data bharna
            document.getElementById('classes-list').innerHTML = '';
            
            savedData.classes.forEach(cData => {
                renderSavedClass(cData);
            });

            updateCalculations();
        }
    } catch (error) {
        console.error("Data load karne me galti hui:", error);
    }
}

function renderSavedClass(cData) {
    const classId = Date.now() + Math.random(); // Unique ID
    const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
    const classOptions = classes.map(c => 
        `<option value="${c}" ${c === cData.className ? 'selected' : ''}>${c}</option>`
    ).join('');

    const classTemplate = `
        <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-8" id="class-${classId}" data-selected-class="${cData.className}">
            <div class="bg-slate-50 p-5 border-b flex justify-between items-center">
                <div class="flex gap-4 items-center">
                    <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200">Remove Class</button>
                    <select class="class-select p-2 font-bold text-indigo-800 outline-none bg-transparent border-b-2 border-indigo-200" onchange="updateTeachers(this, ${classId})">
                        <option value="">Select Class</option>
                        ${classOptions}
                    </select>
                </div>
                <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm">Class Score: <span class="class-avg">${cData.classScore}</span></div>
            </div>
            <div class="p-8">
                <div class="grid grid-cols-2 gap-8 mb-8 bg-indigo-50/30 p-6 rounded-2xl border border-indigo-50">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Total Students</label>
                        <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold outline-none" value="${cData.totalStudents}" oninput="updateCalculations()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Present Students</label>
                        <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold outline-none" value="${cData.presentStudents}" oninput="updateCalculations()">
                    </div>
                </div>
                <div class="books-container space-y-6"></div>
                <div class="mt-8 flex justify-start">
                    <button onclick="addBookRow(${classId})" type="button" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-amber-600 active:scale-95 transition-all flex items-center gap-2">
                        <i class="fas fa-plus"></i> Add Subject
                    </button>
                </div>
            </div>
        </div>`;

    document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
    
    // Books/Subjects load karna
    const container = document.getElementById(`class-${classId}`).querySelector('.books-container');
    cData.subjects.forEach(sData => {
        renderSavedBook(classId, sData, container);
    });
}

function renderSavedBook(classId, sData, container) {
    const bookId = Date.now() + Math.random();
    const card = document.getElementById(`class-${classId}`);
    const selectedClass = card.dataset.selectedClass;

    const teachersInClass = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
    const teacherOptions = teachersInClass.map(t => 
        `<option value="${t.id}" ${t.id === sData.teacherId ? 'selected' : ''}>${t.name}</option>`
    ).join('');

    const teacher = fullStructure.find(t => t.id === sData.teacherId);
    const books = teacher?.periods?.filter(p => p.className === selectedClass) || [];
    const bookOptions = books.map(b => 
        `<option value="${b.bookName}" ${b.bookName === sData.subjectName ? 'selected' : ''}>${b.bookName}</option>`
    ).join('');

    const bookRow = `
        <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100" id="book-${bookId}">
            <div class="col-span-1 text-center"><button onclick="this.closest('.book-row').remove(); updateCalculations();" class="text-slate-300 hover:text-red-500">×</button></div>
            <div class="col-span-3">
                <select class="teacher-select w-full p-2 border-b outline-none text-sm" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                    <option value="">Select Teacher</option>${teacherOptions}
                </select>
            </div>
            <div class="col-span-3">
                <select class="book-select w-full p-2 border-b outline-none text-sm font-medium">
                    <option value="">Select Subject</option>${bookOptions}
                </select>
            </div>
            <div class="col-span-2 text-center text-lg font-black text-indigo-600 book-percent">${sData.subjectScore}</div>
        </div>`;
    
    container.insertAdjacentHTML('beforeend', bookRow);
    
    // Questions render karna
    showQuestionsArea(bookId, sData.subjectName);
    const qInputs = document.getElementById(`book-${bookId}`).querySelectorAll('.q-score-input');
    sData.evaluations.forEach((evalData, index) => {
        if(qInputs[index]) qInputs[index].value = evalData.score;
    });
}
        
</script>
</body>
</html>
