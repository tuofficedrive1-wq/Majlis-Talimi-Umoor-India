<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Inspection | Mobile App Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; color: #1e293b; user-select: none; }
        
        /* Fixed Mobile Header */
        .app-header { background: #1e1b4b; border-bottom: 3px solid #f59e0b; }
        
        /* Premium Card Design (Compact) */
        .app-card { background: white; border-radius: 1.5rem; border: 1px solid rgba(226, 232, 240, 0.7); shadow: 0 4px 6px -1px rgba(0,0,0,0.03); }
        
        /* Mobile Spacing Fixes */
        @media (max-width: 640px) {
            .class-card { padding: 1.25rem !important; }
            .book-row { padding: 1rem !important; }
        }
        
        /* Inputs - App Style */
        .app-input { border: 1px solid #e2e8f0; border-radius: 1rem; font-weight: 600; outline: none; transition: border-color 0.2s; }
        .app-input:focus { border-color: #4f46e5; ring: 2px solid rgba(79, 70, 229, 0.1); }
        
        /* Hide scrollbars (optional, clean look) */
        ::-webkit-scrollbar { display: none; }
        
        /* Ripple/Scale Effect on Click */
        .btn-press:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body class="pb-28 pt-20 overflow-x-hidden">

    <div class="fixed top-0 left-0 right-0 z-50 app-header shadow-xl text-white px-5 py-3">
        <div class="flex flex-row justify-between items-center gap-3">
            <div>
                <p id="jamia-title" class="text-sm font-black truncate max-w-[200px] text-white/90">Jamia Assessment</p>
                <p class="text-[9px] uppercase tracking-widest text-indigo-300">Active Quality Inspection</p>
            </div>
            <div class="text-right border-l-2 border-white/10 pl-4">
                <p class="text-[9px] font-bold text-amber-400 uppercase tracking-widest">Global %</p>
                <div id="jamia-total-percent" class="text-2xl font-extrabold text-white">0%</div>
            </div>
        </div>
    </div>

    <div id="classes-list" class="max-w-xl mx-auto px-4 space-y-6">
        </div>

    <div class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-lg p-4 border-t border-slate-200">
        <div class="max-w-xl mx-auto flex flex-row justify-between items-center gap-4">
            <button id="final-save-btn" class="flex-1 btn-press bg-emerald-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700 flex items-center justify-center gap-2">
                <i class="fas fa-check-double text-lg"></i>
                <span>SYNC Cloud</span>
            </button>
            <button id="add-class-btn" class="btn-press bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 w-auto">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0", authDomain: "data-f15ab.firebaseapp.com", projectId: "data-f15ab", storageBucket: "data-f15ab.firebasestorage.app"};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const jamiaName = urlParams.get('jamia') || "Demo Jamia";
        document.getElementById('jamia-title').textContent = jamiaName;

        let currentUser = null;
        let fullStructure = [];

        // --- INITIALIZATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                await loadJamiaStructure();
                await loadFromFirebase(); 
            } else { 
                window.location.href = "index.html"; 
            }
        });

        async function loadJamiaStructure() {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                fullStructure = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure?.find(j => j.jamiaName === jamiaName)?.teachers || [];
            }
        }

        // --- CORE UI FUNCTIONS ---
        window.addClassCard = (savedData = null) => {
            const classId = savedData ? savedData.id : Date.now();
            const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
            const classOptions = classes.map(c => `<option value="${c}" ${savedData && savedData.className === c ? 'selected' : ''}>${c}</option>`).join('');

            const template = `
                <div class="class-card app-card class-card overflow-hidden" id="class-${classId}">
                    <div class="bg-slate-50 p-4 flex justify-between items-center rounded-t-[1.4rem] border-b border-slate-100">
                        <div class="flex items-center gap-3">
                            <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="text-red-400 hover:text-red-600 transition-colors"><i class="fas fa-trash-alt text-sm"></i></button>
                            <select class="class-select bg-transparent text-lg font-black text-indigo-900 outline-none border-b-2 border-transparent focus:border-indigo-400" onchange="updateTeachers(this, ${classId})">
                                <option value="">Select Class</option>${classOptions}
                            </select>
                        </div>
                        <div class="text-emerald-600 font-extrabold text-sm"><span class="class-avg">0%</span></div>
                    </div>
                    <div class="p-5 space-y-6">
                        <div class="grid grid-cols-2 gap-4 bg-indigo-50/40 p-4 rounded-xl">
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Enrolled</label>
                            <input type="number" class="total-students app-input w-full p-3 font-extrabold text-lg text-indigo-700" placeholder="0" value="${savedData ? savedData.totalStudents : ''}" oninput="updateCalculations()"></div>
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Present</label>
                            <input type="number" class="present-students app-input w-full p-3 font-extrabold text-lg text-emerald-700" placeholder="0" value="${savedData ? savedData.presentStudents : ''}" oninput="updateCalculations()"></div>
                        </div>
                        <div class="books-container space-y-4"></div>
                        <div class="flex justify-center border-t border-dashed border-slate-200 pt-5">
                            <button onclick="addBookRow(${classId})" class="btn-press bg-amber-50 text-amber-800 px-8 py-3.5 rounded-2xl font-semibold text-sm border border-amber-100 flex items-center gap-2 hover:bg-amber-100">
                                <i class="fas fa-book-medical"></i> Add Subject
                            </button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('classes-list').insertAdjacentHTML('beforeend', template);
            
            if(savedData && savedData.subjects) {
                savedData.subjects.forEach(s => addBookRow(classId, s));
            }
        };

        window.addBookRow = (classId, savedSubject = null) => {
            const card = document.getElementById(`class-${classId}`);
            const selectedClass = savedSubject ? savedSubject.className : card.querySelector('.class-select').value;
            if(!selectedClass) return alert("Select a Class first");

            const bookId = savedSubject ? savedSubject.id : Date.now();
            const teachers = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
            const teacherOptions = teachers.map(t => `<option value="${t.id}" ${savedSubject && savedSubject.teacherId === t.id ? 'selected' : ''}>${t.name}</option>`).join('');

            const row = `
                <div class="book-row bg-white border border-slate-100 p-4 rounded-xl shadow-sm relative hover:border-indigo-200 transition-all" id="book-${bookId}">
                    <button onclick="this.closest('.book-row').remove(); updateCalculations();" class="absolute -top-1 -left-1 bg-white text-red-500 shadow-sm border rounded-full w-7 h-7 flex items-center justify-center hover:bg-red-50 transition-colors text-xs">×</button>
                    <div class="grid grid-cols-12 gap-3 items-center">
                        <div class="col-span-12 sm:col-span-5">
                            <select class="teacher-select w-full p-2 border-b-2 border-slate-100 outline-none font-semibold text-sm focus:border-indigo-400" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                                <option value="">Teacher</option>${teacherOptions}
                            </select>
                        </div>
                        <div class="col-span-12 sm:col-span-5">
                            <select class="book-select w-full p-2 border-b-2 border-slate-100 outline-none font-bold text-indigo-900 focus:border-indigo-400">
                                <option value="">Subject</option>
                            </select>
                        </div>
                        <div class="col-span-12 sm:col-span-2 flex justify-end items-center">
                            <span class="book-percent text-xl font-black text-indigo-600">0%</span>
                        </div>
                    </div>
                    <div class="q-area-container mt-3 space-y-2.5"></div>
                </div>`;
            card.querySelector('.books-container').insertAdjacentHTML('beforeend', row);
            
            // Re-trigger updateBooks to fill subject dropdown
            const tSel = document.querySelector(`#book-${bookId} .teacher-select`);
            updateBooks(tSel, bookId, selectedClass, savedSubject ? savedSubject.bookName : null, savedSubject ? savedSubject.evaluations : null);
        };

        window.updateBooks = (teacherSelect, bookRowId, className, savedBookName = null, savedEvals = null) => {
            const teacher = fullStructure.find(t => t.id === teacherSelect.value);
            const books = teacher?.periods?.filter(p => p.className === className) || [];
            const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
            bookSelect.innerHTML = '<option value="">Subject</option>' + books.map(b => `<option value="${b.bookName}" ${savedBookName === b.bookName ? 'selected' : ''}>${b.bookName}</option>`).join('');
            
            const renderEvals = () => {
                const container = document.querySelector(`#book-${bookRowId} .q-area-container`);
                container.innerHTML = '<p class="text-[9px] font-black text-slate-400 mb-1.5 uppercase tracking-wider">Assessment</p>';
                const isEng = bookSelect.value.toLowerCase().includes('english');
                if(isEng) ['Reading', 'Writing', 'Translation'].forEach((q, idx) => container.innerHTML += createQ(q, false, savedEvals ? savedEvals[idx]?.score : ''));
                for(let i=0; i<3; i++) container.innerHTML += createQ('', true, savedEvals ? savedEvals[isEng ? i+3 : i]?.score : '');
                updateCalculations();
            };

            bookSelect.onchange = renderEvals;
            if(savedBookName) renderEvals();
        };

        const createQ = (val, isBlank, savedScore = '') => `
            <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-transparent hover:border-indigo-100 transition-all">
                <div class="flex-1">${isBlank ? `<input type="text" placeholder="Criteria..." class="w-full text-xs bg-transparent outline-none border-b border-indigo-100 italic font-medium">` : `<span class="text-xs font-semibold text-slate-600">${val}</span>`}</div>
                <input type="number" class="q-score-input app-input w-16 p-2 bg-white rounded-xl text-center text-xs font-black text-indigo-700 outline-none" placeholder="0" value="${savedScore}" oninput="updateCalculations()">
            </div>`;

        window.updateCalculations = () => {
            let jamiaSum = 0; const classes = document.querySelectorAll('.class-card'); let tB = 0;
            classes.forEach(card => {
                const pres = parseFloat(card.querySelector('.present-students').value) || 0;
                let cSum = 0; const books = card.querySelectorAll('.book-row'); tB += books.length;
                books.forEach(row => {
                    let sSum = 0, sCnt = 0; row.querySelectorAll('.q-score-input').forEach(i => { if(i.value !== "") { sSum += parseFloat(i.value); sCnt++; } });
                    let bPerc = (sCnt > 0 && pres > 0) ? Math.min(((sSum/sCnt)/pres)*100, 100) : 0;
                    row.querySelector('.book-percent').textContent = bPerc.toFixed(0) + '%';
                    cSum += bPerc;
                });
                let cAvg = books.length > 0 ? cSum / books.length : 0;
                card.querySelector('.class-avg').textContent = cAvg.toFixed(0) + '%';
                jamiaSum += cAvg;
            });
            const jAvg = classes.length > 0 ? jamiaSum / classes.length : 0;
            document.getElementById('jamia-total-percent').textContent = jAvg.toFixed(0) + '%';
        };

        // --- FIREBASE DATA PERSISTENCE ---

        function getFormData() {
            const classes = document.querySelectorAll('.class-card');
            return Array.from(classes).map(card => ({
                id: card.id.split('-')[1],
                className: card.querySelector('.class-select').value,
                totalStudents: card.querySelector('.total-students').value,
                presentStudents: card.querySelector('.present-students').value,
                subjects: Array.from(card.querySelectorAll('.book-row')).map(row => ({
                    id: row.id.split('-')[1],
                    teacherId: row.querySelector('.teacher-select').value,
                    bookName: row.querySelector('.book-select').value,
                    evaluations: Array.from(row.querySelectorAll('.q-score-input')).map(q => ({ score: q.value }))
                }))
            }));
        }

        async function saveToFirebase() {
            if (!currentUser) return alert("Please login first!");
            const docRef = doc(db, "academic_inspections", `LATEST_${jamiaName}`);
            await setDoc(docRef, {jamiaName: jamiaName, inspectorId: currentUser.uid, lastUpdated: serverTimestamp(), overallPercentage: document.getElementById('jamia-total-percent').textContent, inspectionData: getFormData()});
            alert("Report Synced with Cloud!");
        }

        async function loadFromFirebase() {
            const docSnap = await getDoc(doc(db, "academic_inspections", `LATEST_${jamiaName}`));
            if (docSnap.exists()) {
                document.getElementById('classes-list').innerHTML = ''; // Pehle clear karein
                docSnap.data().inspectionData.forEach(c => window.addClassCard(c));
                window.updateCalculations();
            }
        }

        document.getElementById('add-class-btn').onclick = () => addClassCard();
        document.getElementById('final-save-btn').onclick = saveToFirebase;

        window.updateTeachers = (selectElem, classId) => {
            const card = document.getElementById(`class-${classId}`);
            card.querySelector('.books-container').innerHTML = '';
            addBookRow(classId);
        };
    </script>
</body>
</html>
