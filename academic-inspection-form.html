<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .input-field { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #4f46e5; ring: 2px ring-indigo-100; }
        table { border-collapse: separate; border-spacing: 0; }
        th { background-color: #eff6ff; color: #1e40af; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-3xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Academic Inspection Form</h1>
                <p id="jamia-display-name" class="opacity-90 font-medium">Loading Jamia...</p>
            </div>
            <i class="fas fa-file-signature text-4xl opacity-20"></i>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-6 bg-slate-50 border-b border-slate-100">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Subject</label>
                <input type="text" value="English" id="subject" class="input-field font-semibold text-slate-700" readonly>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Date</label>
                <input type="date" id="inspection-date" class="input-field font-semibold text-slate-700">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Total Enrolled</label>
                <input type="number" id="total-enrolled" class="input-field font-semibold text-slate-700" placeholder="e.g. 25">
            </div>
        </div>

        <div class="overflow-x-auto p-6">
            <table class="w-full text-sm text-left border border-slate-200 rounded-xl overflow-hidden">
                <thead>
                    <tr class="text-center">
                        <th class="p-4 border-b border-r border-slate-200">Class</th>
                        <th class="p-4 border-b border-r border-slate-200">Present Students</th>
                        <th class="p-4 border-b border-r border-slate-200">Question Category</th>
                        <th class="p-4 border-b border-r border-slate-200">Sahi Jawab Dene Wale</th>
                        <th class="p-4 border-b border-r border-slate-200">Average %</th>
                        <th class="p-4 border-b border-slate-200">Kefiyat (Remarks)</th>
                    </tr>
                </thead>
                <tbody id="form-body">
                    <tr class="border-b border-slate-100">
                        <td rowspan="3" class="p-4 border-r border-slate-200 font-bold text-indigo-700 text-center bg-slate-50">Ibtidaiya</td>
                        <td rowspan="3" class="p-4 border-r border-slate-200 text-center">
                            <input type="number" id="present-students" oninput="calculateResults()" class="input-field w-20 font-bold" value="20">
                        </td>
                        <td class="p-4 border-r border-slate-200 font-medium">Reading</td>
                        <td class="p-4 border-r border-slate-200">
                            <input type="number" class="score-input input-field" oninput="calculateResults()" placeholder="0">
                        </td>
                        <td rowspan="3" class="p-4 border-r border-slate-200 text-center">
                            <div id="avg-percent" class="text-xl font-black text-emerald-600">0%</div>
                        </td>
                        <td rowspan="3" class="p-4 text-center">
                            <textarea id="kefiyat" class="input-field h-24 text-left p-2" placeholder="Teacher performance, students response etc..."></textarea>
                        </td>
                    </tr>
                    <tr class="border-b border-slate-100">
                        <td class="p-4 border-r border-slate-200 font-medium">Writing</td>
                        <td class="p-4 border-r border-slate-200">
                            <input type="number" class="score-input input-field" oninput="calculateResults()" placeholder="0">
                        </td>
                    </tr>
                    <tr>
                        <td class="p-4 border-r border-slate-200 font-medium">Translate</td>
                        <td class="p-4 border-r border-slate-200">
                            <input type="number" class="score-input input-field" oninput="calculateResults()" placeholder="0">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-200 flex flex-col md:flex-row gap-4 justify-between items-center">
            <p class="text-slate-500 text-xs italic">* Calculation: (Sahi Jawab Average / Present Students) × 100</p>
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="window.close()" class="flex-1 md:flex-none px-6 py-3 border border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-all">Cancel</button>
                <button id="submit-btn" class="flex-1 md:flex-none px-10 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">
                    SAVE REPORT
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        // URL se Jamia ka naam nikalna
        const urlParams = new URLSearchParams(window.location.search);
        const jamiaName = urlParams.get('jamia') || 'Unknown Jamia';
        document.getElementById('jamia-display-name').textContent = jamiaName;

        // Current Date Set Karna
        document.getElementById('inspection-date').valueAsDate = new Date();

        // Calculation Logic
        window.calculateResults = () => {
            const present = parseFloat(document.getElementById('present-students').value) || 0;
            const scores = document.querySelectorAll('.score-input');
            let totalScore = 0;
            
            scores.forEach(input => {
                totalScore += parseFloat(input.value) || 0;
            });

            const averageSahi = totalScore / scores.length;
            const percentage = present > 0 ? ((averageSahi / present) * 100).toFixed(1) : 0;

            document.getElementById('avg-percent').textContent = percentage + '%';
            
            // Color changing logic based on performance
            const display = document.getElementById('avg-percent');
            if(percentage >= 80) display.className = "text-xl font-black text-emerald-600";
            else if(percentage >= 50) display.className = "text-xl font-black text-amber-500";
            else display.className = "text-xl font-black text-red-500";
        };

        // Submit Button (Firebase integration ke liye ready)
        document.getElementById('submit-btn').onclick = async () => {
            alert("Data for " + jamiaName + " is ready to be saved to Firebase!");
            // Yahan aap apna Firestore update logic add kar sakte hain
        };
    </script>
</body>
</html>
