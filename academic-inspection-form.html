<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Quality Control Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f2f5; color: #1a1a1a; }
        .glass-header { background: #1e1b4b; position: relative; overflow: hidden; }
        .glass-header::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); pointer-events: none; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.7); }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:active { transform: scale(0.97); }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-5xl mx-auto mt-8 px-4">
        <div class="glass-header rounded-[2.5rem] p-8 text-white shadow-2xl border-b-8 border-amber-400">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-extrabold tracking-tight">Quality Inspection</h1>
                    <p id="jamia-title" class="text-indigo-200 font-semibold mt-1">Academic Quality Control</p>
                </div>
                <div class="flex items-center gap-10 bg-white/5 p-6 rounded-3xl backdrop-blur-md">
                    <div class="text-center">
                        <p class="text-[11px] font-bold uppercase tracking-widest opacity-60">Classes</p>
                        <p id="total-classes-count" class="text-3xl font-black text-amber-400">0</p>
                    </div>
                    <div class="h-12 w-px bg-white/10"></div>
                    <div class="text-center">
                        <p class="text-[11px] font-bold uppercase tracking-widest opacity-60">Subjects</p>
                        <p id="total-books-count" class="text-3xl font-black text-amber-400">0</p>
                    </div>
                    <div class="h-12 w-px bg-white/10"></div>
                    <div class="text-center min-w-[100px]">
                        <p class="text-[11px] font-bold uppercase tracking-widest text-indigo-300">Jamia %</p>
                        <div id="jamia-total-percent" class="text-4xl font-black text-white">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mt-10 px-4 flex justify-between items-center">
        <button id="add-class-btn" class="btn-hover bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-indigo-200 hover:bg-indigo-700 flex items-center gap-3">
            <i class="fas fa-plus-circle text-lg"></i>
            <span>Add New Class</span>
        </button>
        <div class="hidden sm:flex items-center gap-2 text-slate-400 font-medium">
            <i class="fas fa-info-circle"></i>
            <span class="text-sm italic">Changes are saved locally in your browser</span>
        </div>
    </div>

    <div id="classes-list" class="max-w-5xl mx-auto mt-8 px-4 space-y-12">
        </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-200 p-5 z-50">
        <div class="max-w-5xl mx-auto flex justify-center">
            <button id="final-save-btn" class="btn-hover bg-emerald-600 text-white px-16 py-4 rounded-2xl font-black text-lg shadow-2xl hover:bg-emerald-700 flex items-center gap-3 tracking-wider">
                <i class="fas fa-cloud-arrow-up"></i>
                <span>SAVE & LOCK REPORT</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // Firebase Config (Keep yours)
        const firebaseConfig = { apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0", authDomain: "data-f15ab.firebaseapp.com", projectId: "data-f15ab", storageBucket: "data-f15ab.firebasestorage.app" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const jamiaName = urlParams.get('jamia') || "Demo Jamia";
        document.getElementById('jamia-title').textContent = jamiaName;

        let currentUser = null;
        let fullStructure = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                await loadJamiaStructure();
                loadSavedData(); // Load data from LocalStorage
            } else { window.location.href = "index.html"; }
        });

        async function loadJamiaStructure() {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                fullStructure = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure?.find(j => j.jamiaName === jamiaName)?.teachers || [];
            }
        }

        // --- CORE UI FUNCTIONS ---
        window.addClassCard = (savedData = null) => {
            const classId = savedData ? savedData.id : Date.now();
            const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
            const classOptions = classes.map(c => `<option value="${c}" ${savedData && savedData.className === c ? 'selected' : ''}>${c}</option>`).join('');

            const template = `
<div class="bg-white rounded-2xl shadow p-4 space-y-4" id="class-${classId}">

    <div class="flex justify-between items-center">
        <select class="class-select font-bold text-sm border-b outline-none"
        onchange="updateTeachers(this, ${classId})">
            <option value="">Select Class</option>${classOptions}
        </select>

        <span class="text-indigo-600 font-bold text-sm">
            ${savedData ? 'Loaded' : ''} <span class="class-avg">0%</span>
        </span>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <input type="number" placeholder="Total"
        class="total-students p-2 rounded-lg border text-sm"
        value="${savedData ? savedData.totalStudents : ''}"
        oninput="updateCalculations()">

        <input type="number" placeholder="Present"
        class="present-students p-2 rounded-lg border text-sm"
        value="${savedData ? savedData.presentStudents : ''}"
        oninput="updateCalculations()">
    </div>

    <div class="books-container space-y-3"></div>

    <button onclick="addBookRow(${classId})"
    class="w-full bg-amber-100 text-amber-700 py-2 rounded-lg text-sm font-bold">
        + Add Subject
    </button>

</div>`;
            document.getElementById('classes-list').insertAdjacentHTML('beforeend', template);
            
            if(savedData && savedData.subjects) {
                savedData.subjects.forEach(s => addBookRow(classId, s));
            }
        };

        window.addBookRow = (classId, savedSubject = null) => {
            const card = document.getElementById(`class-${classId}`);
            const selectedClass = savedSubject ? savedSubject.className : card.querySelector('.class-select').value;
            if(!selectedClass) return alert("Select a Class first");

            const bookId = savedSubject ? savedSubject.id : Date.now();
            const teachers = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
            const teacherOptions = teachers.map(t => `<option value="${t.id}" ${savedSubject && savedSubject.teacherId === t.id ? 'selected' : ''}>${t.name}</option>`).join('');

            const row = `
<div class="bg-slate-50 rounded-xl p-3 space-y-3" id="book-${bookId}">

    <div class="flex gap-2">
        <select class="teacher-select w-1/2 text-xs border rounded p-2"
        onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
            <option value="">Teacher</option>${teacherOptions}
        </select>

        <select class="book-select w-1/2 text-xs border rounded p-2">
            <option value="">Subject</option>
        </select>
    </div>

    <div class="text-right text-indigo-600 font-bold text-sm book-percent">
        0%
    </div>

    <div class="q-area-container space-y-2"></div>

</div>`;
            card.querySelector('.books-container').insertAdjacentHTML('beforeend', row);
            
            // Re-trigger updateBooks to fill subject dropdown
            const tSel = document.querySelector(`#book-${bookId} .teacher-select`);
            updateBooks(tSel, bookId, selectedClass, savedSubject ? savedSubject.bookName : null, savedSubject ? savedSubject.evaluations : null);
        };

        window.updateBooks = (teacherSelect, bookRowId, className, savedBookName = null, savedEvals = null) => {
            const teacher = fullStructure.find(t => t.id === teacherSelect.value);
            const books = teacher?.periods?.filter(p => p.className === className) || [];
            const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
            bookSelect.innerHTML = '<option value="">Subject</option>' + books.map(b => `<option value="${b.bookName}" ${savedBookName === b.bookName ? 'selected' : ''}>${b.bookName}</option>`).join('');
            
            const renderEvals = () => {
                const container = document.querySelector(`#book-${bookRowId} .q-area-container`);
                container.innerHTML = '<p class="text-[10px] font-black text-slate-400 mb-2 tracking-widest">DETAILED ASSESSMENT</p>';
                const isEng = bookSelect.value.toLowerCase().includes('english');
                if(isEng) ['Reading', 'Writing', 'Translation'].forEach((q, idx) => container.innerHTML += createQ(q, false, savedEvals ? savedEvals[idx]?.score : ''));
                for(let i=0; i<3; i++) container.innerHTML += createQ('', true, savedEvals ? savedEvals[isEng ? i+3 : i]?.score : '');
                updateCalculations();
            };

            bookSelect.onchange = renderEvals;
            if(savedBookName) renderEvals();
        };

        const createQ = (val, isBlank, savedScore = '') => `
            <div class="flex items-center gap-4 bg-slate-50/30 p-3 rounded-2xl border border-transparent hover:border-indigo-100 transition-all">
                <div class="flex-1">${isBlank ? `<input type="text" placeholder="Custom Criteria..." class="w-full text-xs bg-transparent outline-none border-b border-indigo-100 italic font-medium">` : `<span class="text-xs font-bold text-slate-700">${val}</span>`}</div>
                <input type="number" class="q-score-input w-20 p-2 bg-white border border-indigo-100 rounded-xl text-center text-sm font-black text-indigo-700 outline-none" value="${savedScore}" oninput="updateCalculations()">
            </div>`;

        window.updateCalculations = () => {
            let jamiaSum = 0; const classes = document.querySelectorAll('.class-card'); let tB = 0;
            classes.forEach(card => {
                const pres = parseFloat(card.querySelector('.present-students').value) || 0;
                let cSum = 0; const books = card.querySelectorAll('.book-row'); tB += books.length;
                books.forEach(row => {
                    let sSum = 0, sCnt = 0; row.querySelectorAll('.q-score-input').forEach(i => { if(i.value !== "") { sSum += parseFloat(i.value); sCnt++; } });
                    let bPerc = (sCnt > 0 && pres > 0) ? Math.min(((sSum/sCnt)/pres)*100, 100) : 0;
                    row.querySelector('.book-percent').textContent = bPerc.toFixed(1) + '%';
                    cSum += bPerc;
                });
                let cAvg = books.length > 0 ? cSum / books.length : 0;
                card.querySelector('.class-avg').textContent = cAvg.toFixed(1) + '%';
                jamiaSum += cAvg;
            });
            const jAvg = classes.length > 0 ? jamiaSum / classes.length : 0;
            document.getElementById('jamia-total-percent').textContent = jAvg.toFixed(1) + '%';
            document.getElementById('total-classes-count').textContent = classes.length;
            document.getElementById('total-books-count').textContent = tB;
        };

        // --- LOCAL STORAGE LOGIC ---
        function saveToLocal() {
            const data = Array.from(document.querySelectorAll('.class-card')).map(card => ({
                id: card.id.split('-')[1],
                className: card.querySelector('.class-select').value,
                totalStudents: card.querySelector('.total-students').value,
                presentStudents: card.querySelector('.present-students').value,
                subjects: Array.from(card.querySelectorAll('.book-row')).map(row => ({
                    id: row.id.split('-')[1],
                    teacherId: row.querySelector('.teacher-select').value,
                    bookName: row.querySelector('.book-select').value,
                    evaluations: Array.from(row.querySelectorAll('.q-score-input')).map(q => ({ score: q.value }))
                }))
            }));
            localStorage.setItem(`inspection_${jamiaName}`, JSON.stringify(data));
        }

        function loadSavedData() {
            const saved = localStorage.getItem(`inspection_${jamiaName}`);
            if(saved) {
                const data = JSON.parse(saved);
                data.forEach(c => addClassCard(c));
                updateCalculations();
            }
        }

        document.getElementById('add-class-btn').onclick = () => addClassCard();

        document.getElementById('final-save-btn').onclick = async () => {
            saveToLocal(); // Always save to local first
            const classes = document.querySelectorAll('.class-card');
            if(classes.length === 0) return alert("Report is empty!");

            const finalReport = {
                jamiaName, inspectorId: currentUser.uid, inspectionDate: serverTimestamp(),
                overallPercentage: document.getElementById('jamia-total-percent').textContent,
                data: JSON.parse(localStorage.getItem(`inspection_${jamiaName}`))
            };

            try {
                await setDoc(doc(db, "academic_inspections", `REP_${jamiaName}_${Date.now()}`), finalReport);
                alert("Report successfully synced with cloud!");
            } catch (e) { alert("Error: " + e.message); }
        };

        window.updateTeachers = (selectElem, classId) => {
            const card = document.getElementById(`class-${classId}`);
            card.querySelector('.books-container').innerHTML = '';
            addBookRow(classId);
        };
        // --- FIREBASE DATA PERSISTENCE ---

// 1. Function: Pure Form ka Data Object banana
function getFormData() {
    const classes = document.querySelectorAll('.class-card');
    return Array.from(classes).map(card => ({
        id: card.id.split('-')[1],
        className: card.querySelector('.class-select').value,
        totalStudents: card.querySelector('.total-students').value,
        presentStudents: card.querySelector('.present-students').value,
        subjects: Array.from(card.querySelectorAll('.book-row')).map(row => ({
            id: row.id.split('-')[1],
            teacherId: row.querySelector('.teacher-select').value,
            bookName: row.querySelector('.book-select').value,
            evaluations: Array.from(row.querySelectorAll('.q-score-input')).map(q => ({ score: q.value }))
        }))
    }));
}

// 2. Function: Firebase mein Save karna (Overwrite/Update)
async function saveToFirebase() {
    if (!currentUser) return alert("Please login first!");
    
    const finalReport = {
        jamiaName: jamiaName,
        inspectorId: currentUser.uid,
        lastUpdated: serverTimestamp(),
        overallPercentage: document.getElementById('jamia-total-percent').textContent,
        totalClasses: document.getElementById('total-classes-count').textContent,
        totalBooks: document.getElementById('total-books-count').textContent,
        inspectionData: getFormData() // Poora nested structure
    };

    try {
        // Hum ek hi document 'Active_Inspection' use kar rahe hain taake reload par wahi dikhe
        const docRef = doc(db, "academic_inspections", `LATEST_${jamiaName}`);
        await setDoc(docRef, finalReport);
        alert("Data successfully synced with Firebase!");
    } catch (e) {
        console.error("Firebase Save Error:", e);
        alert("Error saving to Firebase: " + e.message);
    }
}

// 3. Function: Firebase se Data Load karna
async function loadFromFirebase() {
    try {
        const docRef = doc(db, "academic_inspections", `LATEST_${jamiaName}`);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const remoteData = docSnap.data().inspectionData;
            document.getElementById('classes-list').innerHTML = ''; // Pehle clear karein
            
            // Loop chala kar UI dobara construct karna
            remoteData.forEach(classData => {
                window.addClassCard(classData);
            });
            
            window.updateCalculations();
            console.log("Data loaded from Firebase");
        } else {
            console.log("No previous data found in Firebase for this Jamia.");
        }
    } catch (e) {
        console.error("Firebase Load Error:", e);
    }
}

// --- INITIALIZATION ---
onAuthStateChanged(auth, async (user) => {
    if (user) { 
        currentUser = user; 
        await loadJamiaStructure();
        await loadFromFirebase(); // Page load hote hi Firebase se data uthana
    } else { 
        window.location.href = "index.html"; 
    }
});

// Button Click Event
document.getElementById('final-save-btn').onclick = saveToFirebase;
    </script>
</body>
</html>
