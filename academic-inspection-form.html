<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Inspection Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .form-select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; outline: none; transition: 0.3s; }
        .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .q-row { transition: all 0.2s; }
        .q-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Academic Quality Control</h1>
            <p id="jamia-title" class="opacity-80 font-medium">Jamia Inspection</p>
        </div>

        <div class="p-6 space-y-6">
            <div class="max-w-6xl mx-auto p-4">
    <div class="bg-indigo-900 text-white p-6 rounded-2xl flex justify-between items-center mb-8 shadow-2xl border-b-4 border-yellow-500">
        <div class="flex gap-8">
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest opacity-70">Total Classes</p>
                <p id="total-classes-count" class="text-2xl font-bold">0</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest opacity-70">Total Books</p>
                <p id="total-books-count" class="text-2xl font-bold">0</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs font-bold uppercase tracking-widest text-yellow-400">Jamia Overall Performance</p>
            <div id="jamia-total-percent" class="text-4xl font-black">0%</div>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <button id="add-class-btn" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
            <i class="fas fa-plus-circle mr-2"></i> Add New Class
        </button>
        <p class="text-slate-400 text-sm font-medium italic">Click "Add New Class" to begin inspection</p>
    </div>

    <div id="classes-list" class="space-y-10">
        </div>

    <div class="mt-12 pb-10">
        <button id="final-save" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold text-xl shadow-xl hover:bg-emerald-700 transition-all flex justify-center items-center gap-3">
            <i class="fas fa-cloud-upload-alt"></i> Save Final Inspection Report
        </button>
    </div>
</div>
            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Present</label>
                    <input type="number" id="present-count" oninput="calculateTotal()" class="w-full bg-transparent font-bold text-lg outline-none" value="0">
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center">
                    <label class="block text-[10px] text-slate-400 font-bold uppercase">Avg. Percentage</label>
                    <div id="final-percent" class="text-lg font-black text-indigo-600">0%</div>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check text-indigo-500"></i> Evaluation Questions
                </h3>
                <div class="border border-slate-100 rounded-2xl overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 text-left">Question Details</th>
                                <th class="p-4 text-center w-32">Sahi Jawab (No.)</th>
                            </tr>
                        </thead>
                        <tbody id="questions-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-between items-center pt-6 border-t border-slate-100">
    <button onclick="window.close()" class="text-slate-400 font-bold hover:text-red-500">Cancel</button>
    
    <div class="flex gap-3">
        <button id="add-subject-btn" type="button" class="bg-amber-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-amber-600 active:scale-95 transition-all">
            <i class="fas fa-plus mr-2"></i> Add Subject
        </button>

        <button id="save-class-btn" type="button" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
            Submit & Next Class
        </button>
    </div>
</div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
        authDomain: "data-f15ab.firebaseapp.com",
        projectId: "data-f15ab",
        storageBucket: "data-f15ab.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const jamiaName = urlParams.get('jamia');
    document.getElementById('jamia-title').textContent = jamiaName;

    let currentUser = null;
    let fullStructure = []; 

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadJamiaStructure();
        } else {
            window.location.href = "index.html";
        }
    });

    async function loadJamiaStructure() {
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
            const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
            if (jamiaData) {
                fullStructure = jamiaData.teachers;
                console.log("Structure Loaded");
            }
        }
    }

    // --- Dynamic UI Logic ---

    document.getElementById('add-class-btn').onclick = () => {
        const classId = Date.now();
        
        // Extract unique classes from fullStructure
        const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
        const classOptions = classes.map(c => `<option value="${c}">${c}</option>`).join('');

        const classTemplate = `
            <div class="class-card bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-6" id="class-${classId}">
                <div class="bg-slate-50 p-5 border-b flex justify-between items-center">
                    <div class="flex gap-4 items-center">
                        <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-200">Remove</button>
                        <select class="class-select p-2 font-bold text-indigo-800 outline-none bg-transparent border-b-2 border-indigo-200" onchange="updateTeachers(this, ${classId})">
                            <option value="">Select Class</option>
                            ${classOptions}
                        </select>
                    </div>
                    <div class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold">Class Score: <span class="class-avg">0%</span></div>
                </div>
                <div class="p-8">
                    <div class="grid grid-cols-2 gap-8 mb-8 bg-indigo-50/30 p-6 rounded-2xl">
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase">Total Students</label>
                        <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold" oninput="updateCalculations()"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase">Present Students</label>
                        <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold" oninput="updateCalculations()"></div>
                    </div>
                    <div class="books-container space-y-4"></div>
                    <button onclick="addBookRow(${classId})" class="mt-6 bg-slate-800 text-white px-6 py-2.5 rounded-xl text-sm font-bold">+ Add Subject</button>
                </div>
            </div>`;
        
        document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
        updateCalculations();
    };

    window.updateTeachers = (selectElem, classId) => {
        const selectedClass = selectElem.value;
        const card = document.getElementById(`class-${classId}`);
        card.dataset.selectedClass = selectedClass;
        // Reset books if class changes
        card.querySelector('.books-container').innerHTML = '';
        addBookRow(classId);
    };

    window.addBookRow = (classId) => {
        const card = document.getElementById(`class-${classId}`);
        const selectedClass = card.dataset.selectedClass;
        if(!selectedClass) return alert("Please select a class first!");

        const bookId = Date.now();
        const teachersInClass = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
        const teacherOptions = teachersInClass.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

        const bookRow = `
            <div class="book-row grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100" id="book-${bookId}">
                <div class="col-span-1 text-center"><button onclick="this.closest('.book-row').remove(); updateCalculations();" class="text-slate-300 hover:text-red-500">×</button></div>
                <div class="col-span-3">
                    <select class="teacher-select w-full p-2 border-b outline-none text-sm" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                        <option value="">Select Teacher</option>${teacherOptions}
                    </select>
                </div>
                <div class="col-span-3">
                    <select class="book-select w-full p-2 border-b outline-none text-sm font-medium">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="col-span-3">
                    <input type="number" class="avg-correct w-full p-2 bg-indigo-50/50 rounded-lg text-center font-bold text-indigo-700" placeholder="Avg Correct" oninput="updateCalculations()">
                </div>
                <div class="col-span-2 text-center text-lg font-black text-slate-300 book-percent">0%</div>
            </div>`;
        
        card.querySelector('.books-container').insertAdjacentHTML('beforeend', bookRow);
    };

    window.updateBooks = (teacherSelect, bookRowId, className) => {
        const teacherId = teacherSelect.value;
        const teacher = fullStructure.find(t => t.id === teacherId);
        const books = teacher?.periods?.filter(p => p.className === className) || [];
        const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
        bookSelect.innerHTML = '<option value="">Select Subject</option>' + 
            books.map(b => `<option value="${b.bookName}">${b.bookName}</option>`).join('');
    };

    window.updateCalculations = () => {
        let jamiaTotalPerc = 0;
        const classes = document.querySelectorAll('.class-card');
        let totalBooks = 0;

        classes.forEach(card => {
            const present = parseFloat(card.querySelector('.present-students').value) || 0;
            let classSum = 0;
            const books = card.querySelectorAll('.book-row');
            totalBooks += books.length;

            books.forEach(row => {
                const correct = parseFloat(row.querySelector('.avg-correct').value) || 0;
                const perc = present > 0 ? (correct / present) * 100 : 0;
                const display = row.querySelector('.book-percent');
                display.textContent = Math.min(perc, 100).toFixed(1) + '%';
                display.className = `col-span-2 text-center text-lg font-black ${perc > 0 ? 'text-indigo-600' : 'text-slate-300'} book-percent`;
                classSum += perc;
            });

            const classAvg = books.length > 0 ? classSum / books.length : 0;
            card.querySelector('.class-avg').textContent = Math.min(classAvg, 100).toFixed(1) + '%';
            jamiaTotalPerc += classAvg;
        });

        const jamiaAvg = classes.length > 0 ? jamiaTotalPerc / classes.length : 0;
        document.getElementById('jamia-total-percent').textContent = Math.min(jamiaAvg, 100).toFixed(1) + '%';
        document.getElementById('total-classes-count').textContent = classes.length;
        document.getElementById('total-books-count').textContent = totalBooks;
    };
</script>
</body>
</html>
