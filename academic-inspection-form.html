<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Quality Control | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e1b4b;
            --accent: #f59e0b;
            --success: #059669;
        }
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .btn-premium { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:active { transform: scale(0.96); }
        .class-card { border: 1px solid rgba(226, 232, 240, 0.8); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-5xl mx-auto mt-6 px-4">
        <div class="glass-header text-white p-6 md:p-8 rounded-[2rem] shadow-2xl mb-8 relative overflow-hidden border-b-4 border-amber-500">
            <div class="relative z-10 flex flex-col md:row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h1 class="text-2xl font-bold tracking-tight">Academic Quality Control</h1>
                    <p id="jamia-title" class="text-indigo-200 font-medium">Jamia Inspection</p>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full md:w-auto text-center border-t border-white/10 pt-6 md:pt-0 md:border-0">
                    <div>
                        <p class="text-[10px] uppercase opacity-60">Classes</p>
                        <p id="total-classes-count" class="text-xl font-bold text-amber-400">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase opacity-60">Subjects</p>
                        <p id="total-books-count" class="text-xl font-bold text-amber-400">0</p>
                    </div>
                    <div class="col-span-2 border-l border-white/10 pl-6">
                        <p class="text-[10px] uppercase font-bold text-indigo-300">Overall Performance</p>
                        <div id="jamia-total-percent" class="text-4xl font-black">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto mb-8 px-4 flex justify-between items-center">
        <button id="add-class-btn" class="btn-premium bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 flex items-center gap-2">
            <i class="fas fa-plus-circle text-lg"></i> Add New Class
        </button>
        <p class="hidden md:block text-slate-400 text-sm italic">Add sections to start your assessment</p>
    </div>

    <div id="classes-list" class="max-w-5xl mx-auto px-4 space-y-10">
        </div>

    <div class="max-w-5xl mx-auto mt-16 mb-20 px-4">
        <div class="max-w-md mx-auto bg-white p-2 rounded-3xl shadow-2xl border border-slate-100">
            <button id="final-save-btn" class="w-full btn-premium bg-emerald-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-emerald-700 flex items-center justify-center gap-3 uppercase tracking-wider">
                <i class="fas fa-cloud-upload-alt text-xl"></i> Save Final Report
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const jamiaName = urlParams.get('jamia') || "Demo Jamia";
        document.getElementById('jamia-title').textContent = jamiaName;

        let currentUser = null;
        let fullStructure = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadJamiaStructure();
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadJamiaStructure() {
            const userRef = doc(db, "users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const academicData = userSnap.data().academicYears?.["2025-2026"]?.karkardagiStructure || [];
                const jamiaData = academicData.find(j => j.jamiaName === jamiaName);
                if (jamiaData) fullStructure = jamiaData.teachers;
            }
        }

        // Add Class Logic
        document.getElementById('add-class-btn').onclick = () => {
            const classId = Date.now();
            const classes = [...new Set(fullStructure.flatMap(t => t.periods?.map(p => p.className) || []))];
            const classOptions = classes.map(c => `<option value="${c}">${c}</option>`).join('');

            const classTemplate = `
                <div class="class-card bg-white rounded-[2rem] shadow-sm overflow-hidden" id="class-${classId}">
                    <div class="bg-slate-50 p-6 border-b flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <button onclick="document.getElementById('class-${classId}').remove(); updateCalculations();" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>
                            <select class="class-select p-2 font-bold text-indigo-900 bg-transparent border-b-2 border-indigo-200 outline-none" onchange="updateTeachers(this, ${classId})">
                                <option value="">Select Class</option>
                                ${classOptions}
                            </select>
                        </div>
                        <div class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold shadow-md">Class: <span class="class-avg">0%</span></div>
                    </div>
                    <div class="p-6 md:p-8">
                        <div class="grid grid-cols-2 gap-4 md:gap-8 mb-8 bg-indigo-50/30 p-6 rounded-2xl border border-indigo-50">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Total Enrolled</label>
                                <input type="number" class="total-students w-full p-3 bg-white border rounded-xl font-bold text-lg outline-none focus:ring-2 focus:ring-indigo-400" placeholder="0" oninput="updateCalculations()">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Present Now</label>
                                <input type="number" class="present-students w-full p-3 bg-white border rounded-xl font-bold text-lg outline-none focus:ring-2 focus:ring-indigo-400" placeholder="0" oninput="updateCalculations()">
                            </div>
                        </div>
                        <div class="books-container space-y-6"></div>
                        <div class="mt-8 flex justify-center border-t border-dashed pt-6">
                            <button onclick="addBookRow(${classId})" class="bg-amber-100 text-amber-700 px-10 py-3 rounded-xl font-bold hover:bg-amber-200 border border-amber-200 flex items-center gap-2">
                                <i class="fas fa-book-medical"></i> Add Subject Assessment
                            </button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('classes-list').insertAdjacentHTML('beforeend', classTemplate);
        };

        window.updateTeachers = (selectElem, classId) => {
            const card = document.getElementById(`class-${classId}`);
            card.dataset.selectedClass = selectElem.value;
            card.querySelector('.books-container').innerHTML = '';
            addBookRow(classId);
        };

        window.addBookRow = (classId) => {
            const card = document.getElementById(`class-${classId}`);
            const selectedClass = card.dataset.selectedClass;
            if(!selectedClass) return alert("Select a Class first");

            const bookId = Date.now();
            const teachers = fullStructure.filter(t => t.periods?.some(p => p.className === selectedClass));
            const teacherOptions = teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

            const bookRow = `
                <div class="book-row bg-white border border-slate-100 p-4 rounded-2xl shadow-sm relative" id="book-${bookId}">
                    <button onclick="this.closest('.book-row').remove(); updateCalculations();" class="absolute -top-2 -left-2 bg-white text-red-500 shadow-sm border rounded-full w-6 h-6 flex items-center justify-center hover:bg-red-50">×</button>
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
                        <div class="md:col-span-4">
                            <select class="teacher-select w-full p-2 text-sm border-b outline-none font-medium" onchange="updateBooks(this, ${bookId}, '${selectedClass}')">
                                <option value="">Select Teacher</option>
                                ${teacherOptions}
                            </select>
                        </div>
                        <div class="md:col-span-5">
                            <select class="book-select w-full p-2 text-sm border-b outline-none font-bold text-indigo-900">
                                <option value="">Select Subject</option>
                            </select>
                        </div>
                        <div class="md:col-span-3 flex justify-between items-center bg-indigo-50/50 p-2 rounded-xl">
                            <span class="text-[10px] font-bold text-indigo-400 md:hidden">SCORE</span>
                            <span class="book-percent text-xl font-black text-indigo-600">0%</span>
                        </div>
                    </div>
                    <div class="q-area-container mt-4 space-y-2"></div>
                </div>`;
            card.querySelector('.books-container').insertAdjacentHTML('beforeend', bookRow);
        };

        window.updateBooks = (teacherSelect, bookRowId, className) => {
            const teacher = fullStructure.find(t => t.id === teacherSelect.value);
            const books = teacher?.periods?.filter(p => p.className === className) || [];
            const bookSelect = document.querySelector(`#book-${bookRowId} .book-select`);
            bookSelect.innerHTML = '<option value="">Subject</option>' + books.map(b => `<option value="${b.bookName}">${b.bookName}</option>`).join('');
            
            bookSelect.onchange = () => {
                const container = document.querySelector(`#book-${bookRowId} .q-area-container`);
                container.innerHTML = '<p class="text-[10px] font-bold text-slate-400 mb-2">EVALUATION QUESTIONS</p>';
                const isEnglish = bookSelect.value.toLowerCase().includes('english');
                if(isEnglish) ['Reading', 'Writing', 'Translation'].forEach(q => container.innerHTML += createQ(q, false));
                for(let i=0; i<3; i++) container.innerHTML += createQ('', true);
                updateCalculations();
            };
        };

        const createQ = (val, isBlank) => `
            <div class="flex items-center gap-3 bg-slate-50/50 p-2 rounded-lg border border-transparent hover:border-indigo-100 transition-all">
                <div class="flex-1">
                    ${isBlank ? `<input type="text" placeholder="Custom..." class="w-full text-[11px] bg-transparent outline-none border-b border-indigo-100 italic">` : `<span class="text-[11px] font-semibold text-slate-600">${val}</span>`}
                </div>
                <input type="number" class="q-score-input w-16 p-1 bg-white border border-indigo-100 rounded text-center text-[11px] font-bold text-indigo-700" placeholder="0" oninput="updateCalculations()">
            </div>`;

        window.updateCalculations = () => {
            let jamiaTotal = 0;
            const classes = document.querySelectorAll('.class-card');
            let tBooks = 0;

            classes.forEach(card => {
                const present = parseFloat(card.querySelector('.present-students').value) || 0;
                let cSum = 0;
                const books = card.querySelectorAll('.book-row');
                tBooks += books.length;

                books.forEach(row => {
                    let sSum = 0, sCount = 0;
                    row.querySelectorAll('.q-score-input').forEach(i => { if(i.value !== "") { sSum += parseFloat(i.value); sCount++; } });
                    let avgS = sCount > 0 ? sSum / sCount : 0;
                    let bPerc = present > 0 ? Math.min((avgS / present) * 100, 100) : 0;
                    row.querySelector('.book-percent').textContent = bPerc.toFixed(1) + '%';
                    cSum += bPerc;
                });

                let cAvg = books.length > 0 ? cSum / books.length : 0;
                card.querySelector('.class-avg').textContent = cAvg.toFixed(1) + '%';
                jamiaTotal += cAvg;
            });

            const jAvg = classes.length > 0 ? jamiaTotal / classes.length : 0;
            document.getElementById('jamia-total-percent').textContent = jAvg.toFixed(1) + '%';
            document.getElementById('total-classes-count').textContent = classes.length;
            document.getElementById('total-books-count').textContent = tBooks;
        };

        document.getElementById('final-save-btn').onclick = async () => {
            const classes = document.querySelectorAll('.class-card');
            if(classes.length === 0) return alert("Add a class first");

            const finalData = {
                jamiaName,
                inspectorId: currentUser.uid,
                inspectionDate: serverTimestamp(),
                overallPercentage: document.getElementById('jamia-total-percent').textContent,
                data: Array.from(classes).map(card => ({
                    className: card.querySelector('.class-select').value,
                    present: card.querySelector('.present-students').value,
                    subjects: Array.from(card.querySelectorAll('.book-row')).map(row => ({
                        subject: row.querySelector('.book-select').value,
                        teacher: row.querySelector('.teacher-select').selectedOptions[0].text,
                        score: row.querySelector('.book-percent').textContent
                    }))
                }))
            };

            try {
                await setDoc(doc(db, "academic_inspections", `REP_${Date.now()}`), finalData);
                alert("Inspection Saved Successfully!");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
