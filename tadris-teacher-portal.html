        .dir-ltr { direction: ltr; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loading-screen" class="text-center">
        <div class="loader mx-auto mb-3"></div>

    <div id="login-section" class="hidden bg-white w-full max-w-md p-6 rounded-2xl shadow-xl text-center">
        <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-microphone-alt text-3xl text-emerald-600"></i>
        </div>
        
        <h1 id="main-title" class="text-2xl font-bold text-gray-800 mb-1">تدریس ریکارڈنگ پورٹل</h1>

        <p id="admin-name-display" class="text-gray-500 text-sm font-semibold mb-1">...</p> 

        <p id="jamia-display-login" class="text-emerald-600 font-semibold mb-6 text-sm">جامعہ: لوڈنگ...</p>

        <div class="space-y-4">
            <div class="text-start">
                <label id="label-code" class="block text-gray-700 font-bold mb-1 mx-1">اپنا اجیر کوڈ درج کریں:</label>
                <input type="text" id="teacher-code-input" placeholder="مثلاً: 12345" 
                    class="w-full p-3 border border-gray-300 rounded-xl text-center text-xl tracking-widest focus:ring-2 focus:ring-emerald-500 outline-none dir-ltr">
            </div>

            <button onclick="verifyTeacherCode()" id="verify-btn" 
                class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg flex justify-center items-center gap-2">
                <span id="btn-verify-text">لاگ ان کریں</span>
                <i class="fas fa-sign-in-alt"></i>

            <p id="login-error" class="hidden text-red-600 bg-red-50 p-2 rounded border border-red-100 text-sm mt-2"></p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden w-full max-w-lg">
        
        <div class="bg-emerald-800 text-white p-5 rounded-t-2xl shadow-lg relative overflow-hidden">
            <div class="flex justify-between items-start z-10 relative">
                <div class="text-start">
                    <h2 id="disp-teacher-name" class="text-xl font-bold">استاد کا نام</h2>
                    <p id="disp-jamia-name" class="text-sm text-emerald-200 opacity-90 mt-1">جامعہ کا نام</p>
                </div>
                <button id="btn-logout" onclick="location.reload()" class="bg-emerald-900/50 hover:bg-red-500/80 text-white px-3 py-1 rounded text-xs border border-emerald-600 transition">
                    خروج
                </button>
            </div>
            <i class="fas fa-microphone-lines absolute -bottom-4 -left-4 text-emerald-700/50 text-8xl z-0" id="header-icon"></i>
        </div>

        <div class="bg-white p-6 rounded-b-2xl shadow-xl space-y-5 text-start">

            <div>
                <label id="label-class" class="block text-gray-600 font-bold mb-2 mx-1">کلاس اور کتاب منتخب کریں:</label>
                <div class="relative">
                    <select id="class-select" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-emerald-500 outline-none appearance-none">
                        <option value="">-- منتخب کریں --</option>
                    </select>
                    <div id="dropdown-icon" class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-3 text-gray-500">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div>
                <label id="label-date" class="block text-gray-600 font-bold mb-2 mx-1">تاریخ:</label>
                <input type="date" id="rec-date" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 text-start focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>

            <div class="bg-gradient-to-br from-red-50 to-white border border-red-100 rounded-xl p-5 text-center shadow-inner">
                <p id="live-rec-text" class="text-red-800 font-bold mb-3 flex items-center justify-center gap-2">
                    <i class="fas fa-circle text-red-600 text-xs animate-pulse"></i> لائیو ریکارڈنگ
                </p>
                
                <div id="record-controls" class="space-y-3">
                    <button onclick="startRecording()" id="btn-start" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-red-700 transition flex items-center justify-center gap-2">
                        <i class="fas fa-microphone"></i> <span id="btn-start-text">ریکارڈنگ شروع کریں</span>
                    </button>
                    
                    <button onclick="togglePause()" id="btn-pause" class="hidden w-full bg-yellow-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-yellow-600 transition flex items-center justify-center gap-2">
                        <i id="pause-icon" class="fas fa-pause"></i> <span id="pause-text">وقفہ (Pause)</span>
                    </button>
                
                    <button onclick="stopRecording()" id="btn-stop" class="hidden w-full bg-gray-800 text-white py-3 rounded-xl font-bold shadow-md hover:bg-black transition flex items-center justify-center gap-2 animate-pulse">
                        <i class="fas fa-stop"></i> <span id="btn-stop-text">روک دیں</span> (<span id="timer" class="dir-ltr">00:00</span>)
                    </button>
                </div>

                <div id="preview-area" class="hidden mt-4 bg-white p-3 rounded-lg border border-gray-200">

                    <audio id="audio-preview" controls class="w-full h-10 mb-2"></audio>
                    <button onclick="resetRecording()" class="text-red-500 text-sm hover:underline flex items-center justify-center gap-1 mx-auto">
                        <i class="fas fa-trash-alt"></i> <span id="btn-reset-text">ڈیلیٹ کریں اور دوبارہ ریکارڈ کریں</span>
                    </button>
                </div>
            </div>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-gray-200"></div>
                <span id="or-text" class="flex-shrink-0 mx-4 text-gray-400 text-xs">یا (OR)</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4">
                 <label id="label-upload" class="block text-blue-800 font-bold mb-2 text-sm mx-1">
                    <i class="fas fa-file-audio mx-1"></i> فائل اپلوڈ کریں (اگر ریکارڈنگ موجود ہے)
                 </label>
                 <input type="file" id="file-upload-input" accept="audio/*" class="w-full text-sm text-gray-500 file:mx-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700"/>
            </div>

            <!-- NEW: Image Upload Area (Hidden by Default) -->
            <div id="image-upload-container" class="hidden bg-purple-50 border border-purple-100 rounded-xl p-4 mt-4 text-start">
                 <label id="label-image-upload" class="block text-purple-800 font-bold mb-2 text-sm mx-1">
                    <i class="fas fa-image mx-1"></i> Bord ki Image Upload Karen
                 </label>
                 <input type="file" id="image-upload-input" accept="image/*" class="w-full text-sm text-gray-500 file:mx-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700"/>
            </div>

            <button onclick="uploadAndSave()" id="btn-save" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-emerald-700 shadow-xl transition flex items-center justify-center gap-2 mt-4">
                <span id="btn-save-text">محفوظ کریں (Save)</span>
                <i class="fas fa-cloud-upload-alt"></i>
            </button>
            <p id="status-msg" class="text-center text-sm font-semibold min-h-[20px]"></p>

        </div>
        
        <div class="text-center mt-6 text-gray-400 text-xs dir-ltr">
            Majlis Talimi Umoor India
        </div>
    </div>

    <script>
        // --- 0. LANGUAGE TRANSLATION LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang');
        let T = {}; // Translation dictionary

        if (lang === 'en') {
            // Apply LTR and English Fonts
            document.getElementById('html-root').setAttribute('dir', 'ltr');
            document.getElementById('html-root').setAttribute('lang', 'en');
            document.body.style.fontFamily = "'Poppins', sans-serif";
            document.getElementById('dropdown-icon').classList.replace('left-0', 'right-0');
            document.getElementById('header-icon').classList.replace('-left-4', '-right-4');

            // Show Image Upload Option only in English mode
            document.getElementById('image-upload-container').classList.remove('hidden');

            // Translate Static UI Elements
            document.getElementById('page-title').innerText = "Tadris Recording Portal";
            document.getElementById('loading-text').innerText = "Data load ho raha hai...";
            document.getElementById('main-title').innerText = "Tadris Recording Portal";
            document.getElementById('label-code').innerText = "Apna Ajeer Code (Login Code) darj karein:";
            document.getElementById('teacher-code-input').placeholder = "e.g. 12345";
            document.getElementById('btn-verify-text').innerText = "Login Karein";
            document.getElementById('btn-logout').innerText = "Logout";
            document.getElementById('label-class').innerText = "Class aur Kitab select karein:";
            document.getElementById('label-date').innerText = "Date:";
            document.getElementById('live-rec-text').innerHTML = '<i class="fas fa-circle text-red-600 text-xs animate-pulse"></i> Live Recording';
            document.getElementById('btn-start-text').innerText = "Recording Shuru Karein";
            document.getElementById('pause-text').innerText = "Waqfa (Pause)";
            document.getElementById('btn-stop-text').innerText = "Rok Dein";
            document.getElementById('preview-label').innerText = "Preview:";
            document.getElementById('btn-reset-text').innerText = "Delete aur dobara record karein";
            document.getElementById('or-text').innerText = "YA (OR)";
            document.getElementById('label-upload').innerHTML = '<i class="fas fa-file-audio mr-1"></i> File Upload Karein (Agar recording hai)';
            document.getElementById('btn-save-text').innerText = "Save Karein";

            // Translate Dynamic Text Variables
            T = {
                adminPrefix: "Zere Nigrani: ",
                jamiaPrefix: "Jamia: ",
                errMissingParams: "Link durust nahi hai. (Jamia ya Year ki details missing hain)",
                errNoAdmin: "Admin user nahi mila.",
                errNoData: "Is saal ka talimi data maujood nahi hai.",
                errNoJamia: "Is jamia ka record nahi mila.",
                errFetch: "Data load nahi hua, page refresh karein.",
                errWrongCode: "Code galat hai! Barahe karam sahi Ajeer Code darj karein.",
                verifyLoading: '<i class="fas fa-spinner fa-spin"></i> Login ho raha hai...',
                noClassDefault: "Koi class assign nahi ki gayi",
                selectDefault: "-- Select Karein --",
                micBlock: "Microphone block hai! Upar lock 🔒 icon par click karke permission dein.",
                pauseLabel: "Waqfa (Pause)",
                resumeLabel: "Dobara shuru karein (Resume)",
                delConfirm: "Aapne file select ki hai. Kya aap pehli recording delete karna chahte hain?",
                alertFields: "Barahe karam class aur date select karein.",
                alertFiles: "Pehle recording karein ya file select karein.",
                statusProcess: "File process ho rahi hai...",
                statusUpload: "Upload ho raha hai:",
                statusSuccess: "✅ Kamyabi se save ho gaya!",
                dbErr: "Database Error.",
                errGeneral: "Kuch galat ho gaya: "
            };
        } else {
            // Keep Default Urdu Variables
            T = {
                adminPrefix: "زیر نگرانی: ",
                jamiaPrefix: "جامعہ: ",
                errMissingParams: "لنک درست نہیں ہے۔ (جامعہ یا سال کی معلومات غائب ہیں)",
                errNoAdmin: "ایڈمن یوزر نہیں ملا۔",
                errNoData: "اس سال کا تعلیمی ڈیٹا موجود نہیں ہے۔",
                errNoJamia: "اس جامعہ کا ریکارڈ نہیں ملا۔",
                errFetch: "ڈیٹا لوڈ نہیں ہوا، پیج ریفریش کریں۔",
                errWrongCode: "کوڈ غلط ہے! براہ کرم درست اجیر کوڈ درج کریں۔",
                verifyLoading: '<i class="fas fa-spinner fa-spin"></i> تصدیق ہو رہی ہے...',
                noClassDefault: "کوئی کلاس تفویض نہیں",
                selectDefault: "-- منتخب کریں --",
                micBlock: "مائیکروفون بلاک ہے! اوپر تالے 🔒 کے نشان پر کلک کر کے اجازت دیں۔",
                pauseLabel: "وقفہ (Pause)",
                resumeLabel: "دوبارہ شروع کریں (Resume)",
                delConfirm: "آپ نے فائل منتخب کی ہے۔ کیا آپ ریکارڈنگ ڈیلیٹ کرنا چاہتے ہیں؟",
                alertFields: "براء کرم کلاس اور تاریخ منتخب کریں۔",
                alertFiles: "پہلے ریکارڈنگ کریں یا فائل منتخب کریں۔",
                statusProcess: "فائل پروسیس ہو رہی ہے...",
                statusUpload: "اپلوڈ ہو رہا ہے:",
                statusSuccess: "✅ کامیابی سے محفوظ ہو گیا!",
                dbErr: "ڈیٹا بیس ایرر۔",
                errGeneral: "کچھ غلط ہو گیا: "
            };
        }

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.firebasestorage.app",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // --- GLOBAL STATE ---
        let globalUserId = null;
        let globalZimmedarName = "";
        let jamiaData = null;
        let selectedTeacher = null;
        let reportYear = null;
        let monthIndex = null;
        let activeYearGlobal = null;
        let wakeLock = null;
        
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedBlob = null;
        let timerInterval = null;
        let seconds = 0;

        // --- 1. INITIALIZE ---
        document.addEventListener('DOMContentLoaded', async () => {
            await auth.signInAnonymously().catch(e => console.error("Auth Error:", e));

            const jamiaId = urlParams.get('jamiaId');
            const userId = urlParams.get('userId');
            const activeYear = urlParams.get('activeYear');

            globalUserId = userId;

            if (!jamiaId || !userId || !activeYear) {
                showError(T.errMissingParams);
                return;
            }

            activeYearGlobal = activeYear;

            const today = new Date();
            reportYear = today.getFullYear();
            monthIndex = today.getMonth();

            document.getElementById('rec-date').valueAsDate = today;

            const jamiaNameDecoded = decodeURIComponent(jamiaId);
            document.getElementById('jamia-display-login').innerText = T.jamiaPrefix + jamiaNameDecoded;
            
            loadJamiaData(userId, activeYear, jamiaNameDecoded);
        });

        // --- 2. LOAD DATA ---
        async function loadJamiaData(userId, year, jamiaName) {
            try {
                const userRef = db.collection('users').doc(userId);
                const userSnap = await userRef.get();

                if (!userSnap.exists) throw new Error(T.errNoAdmin);

                const userData = userSnap.data();
                
                const adminName = userData.name || "Unknown User";
                globalZimmedarName = adminName;
                document.getElementById('admin-name-display').innerText = T.adminPrefix + adminName;

                const yearData = userData.academicYears?.[year];

                if (!yearData || !yearData.karkardagiStructure) {
                    throw new Error(T.errNoData);
                }

                const structure = yearData.karkardagiStructure;
                const foundJamia = structure.find(j => j.jamiaName === jamiaName);

                if (!foundJamia) throw new Error(T.errNoJamia);

                jamiaData = foundJamia; 
                
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');

            } catch (err) {
                showError(err.message);
            }
        }

        // --- 3. VERIFY CODE ---
        function verifyTeacherCode() {
            const codeInput = document.getElementById('teacher-code-input');
            const code = codeInput.value.trim();
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('verify-btn');

            errorMsg.classList.add('hidden');

            if (!jamiaData || !jamiaData.teachers) {
                errorMsg.innerText = T.errFetch;
                errorMsg.classList.remove('hidden');
                return;
            }

            const teacher = jamiaData.teachers.find(t => String(t.loginCode) === code);

            if (teacher) {
                selectedTeacher = teacher;
                
                btn.innerHTML = T.verifyLoading;
                
                setTimeout(() => {
                    loadDashboard();
                }, 800);

            } else {
                errorMsg.innerText = T.errWrongCode;
                errorMsg.classList.remove('hidden');
                codeInput.classList.add('border-red-500');
            }
        }

        // --- 4. LOAD DASHBOARD ---
        function loadDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');

            document.getElementById('disp-teacher-name').innerText = selectedTeacher.name;
            document.getElementById('disp-jamia-name').innerText = jamiaData.jamiaName;

            const select = document.getElementById('class-select');
            select.innerHTML = `<option value="">${T.selectDefault}</option>`;

            if (selectedTeacher.periods && selectedTeacher.periods.length > 0) {
                selectedTeacher.periods.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = `${p.className}|${p.bookName}`;
                    opt.innerText = `${p.className} - ${p.bookName}`;
                    select.appendChild(opt);
                });
            } else {
                const opt = document.createElement('option');
                opt.innerText = T.noClassDefault;
                select.appendChild(opt);
            }
        }

        let isPaused = false;
            
        async function startRecording() {
            const status = document.getElementById('status-msg');
            status.innerText = "";
            status.classList.add('hidden');

            document.getElementById('file-upload-input').value = "";

            try {
                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
                }

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    document.getElementById('audio-preview').src = URL.createObjectURL(recordedBlob);
                    document.getElementById('preview-area').classList.remove('hidden');
                    document.getElementById('record-controls').classList.add('hidden');
                    stream.getTracks().forEach(t => t.stop());
                    if (wakeLock) wakeLock.release().then(() => wakeLock = null);
                };

                mediaRecorder.start();

                document.getElementById('btn-start').classList.add('hidden');
                document.getElementById('btn-pause').classList.remove('hidden');
                document.getElementById('btn-stop').classList.remove('hidden');
                document.getElementById('btn-stop').classList.add('animate-pulse');

                seconds = 0;
                clearInterval(timerInterval);
                startTimer(); 

            } catch (err) {
                status.classList.remove('hidden');
                status.className = "text-center text-sm p-3 bg-yellow-100 text-yellow-800 rounded-lg border border-yellow-300 mt-4";
                status.innerHTML = T.micBlock;
            }
        }
            
        function togglePause() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.pause();
                isPaused = true;
                clearInterval(timerInterval);
                document.getElementById('pause-icon').className = "fas fa-play";
                document.getElementById('pause-text').innerText = T.resumeLabel;
                document.getElementById('btn-stop').classList.remove('animate-pulse');
            } else if (mediaRecorder && mediaRecorder.state === "paused") {
                mediaRecorder.resume();
                isPaused = false;
                startTimer();
                document.getElementById('pause-icon').className = "fas fa-pause";
                document.getElementById('pause-text').innerText = T.pauseLabel;
                document.getElementById('btn-stop').classList.add('animate-pulse');
            }
        }
            
        function startTimer() {
            const timerEl = document.getElementById('timer');
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60).toString().padStart(2,'0');
                const s = (seconds % 60).toString().padStart(2,'0');
                timerEl.innerText = `${m}:${s}`;
            }, 1000);
        }
            
        function stopRecording() {
            if(mediaRecorder) mediaRecorder.stop();
            clearInterval(timerInterval);
            seconds = 0;
            isPaused = false;
        }
            
        function resetRecording() {
            recordedBlob = null;
            seconds = 0;
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('preview-area').classList.add('hidden');
            document.getElementById('record-controls').classList.remove('hidden');
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-pause').classList.add('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
            
            document.getElementById('pause-icon').className = "fas fa-pause";
            document.getElementById('pause-text').innerText = T.pauseLabel;
        }

        document.getElementById('file-upload-input').addEventListener('change', function() {
            if (this.files.length > 0 && recordedBlob) {
                if(confirm(T.delConfirm)) {
                    resetRecording();
                } else {
                    this.value = "";
                }
            }
        });

        async function uploadAndSave() {
            const classVal = document.getElementById('class-select').value;
            const dateVal = document.getElementById('rec-date').value;
            const fileInput = document.getElementById('file-upload-input');
            const uploadedFile = fileInput.files[0];
            
            // Image input values
            const imageInput = document.getElementById('image-upload-input');
            const uploadedImage = imageInput ? imageInput.files[0] : null;

            if (!classVal || !dateVal) return alert(T.alertFields);
            if (!recordedBlob && !uploadedFile) return alert(T.alertFiles);

            const btn = document.getElementById('btn-save');
            const status = document.getElementById('status-msg');
            
            btn.disabled = true;
            status.classList.remove('hidden');
            status.innerText = T.statusProcess;

            let finalDuration = "--:--";
            
            if (recordedBlob) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                finalDuration = `${mins}:${secs.toString().padStart(2, '0')}`;
            } else if (uploadedFile) {
                finalDuration = await getFileDuration(uploadedFile);
            }

            const finalFile = uploadedFile || recordedBlob;
            const extension = uploadedFile ? uploadedFile.name.split('.').pop() : 'webm';
            const fileName = `Rec_${Date.now()}.${extension}`;

            try {
                let imageUrl = null;
                
                // Upload Image First (Agar select ki gayi ho)
                if (uploadedImage) {
                    status.innerText = "Bord Image upload ho rahi hai...";
                    const imageExt = uploadedImage.name.split('.').pop();
                    const imageName = `Img_${Date.now()}.${imageExt}`;
                    const imageRef = firebase.storage().ref().child(`recordings/images/${imageName}`);
                    await imageRef.put(uploadedImage);
                    imageUrl = await imageRef.getDownloadURL();
                }

                const storageRef = firebase.storage().ref().child(`recordings/teachers/${fileName}`);
                const uploadTask = storageRef.put(finalFile);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        status.innerText = `${T.statusUpload} ${progress}%`;
                    }, 
                    (error) => {
                        alert("Error: " + error.message);
                        btn.disabled = false;
                    }, 
                    async () => {
                        const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                        const [className, bookName] = classVal.split('|');
                        
                        await saveToFirestore(downloadURL, fileName, className, bookName, dateVal, btn, status, finalDuration, imageUrl);
                    }
                );
            } catch (err) {
                alert(T.errGeneral + err.message);
                btn.disabled = false;
            }
        }

        async function saveToFirestore(url, fileName, className, bookName, dateVal, btn, status, finalDuration, imageUrl) {
            const d = new Date(dateVal);
            const mNum = d.getMonth();
            const yNum = d.getFullYear();
            const reportDocId = `${globalUserId}_${yNum}_${mNum}`;

            const newEntry = {
                id: Date.now().toString(),
                jamiaName: jamiaData.jamiaName,
                zimmedarName: globalZimmedarName,
                teacherName: selectedTeacher.name,
                className, kitabName: bookName,
                date: dateVal, url, fileName,
                duration: finalDuration,
                uploadedBy: "TeacherPortal",
                createdAt: new Date().toISOString()
            };

            // Agar image mojood ho to Entry me usay add karein
            if (imageUrl) {
                newEntry.imageUrl = imageUrl;
            }

            try {
                const ref = db.collection('monthly_reports').doc(reportDocId);
                const snap = await ref.get();
                if (snap.exists) {
                    await ref.update({ "tadrisRecording.data": firebase.firestore.FieldValue.arrayUnion(newEntry) });
                } else {
                    await ref.set({
                        userId: globalUserId, monthNum: mNum, year: yNum,
                        academicYear: activeYearGlobal,
                        monthKey: `${yNum}-${String(mNum+1).padStart(2,'0')}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        tadrisRecording: { status: "Pending", data: [newEntry] }
                    });
                }
                status.className = "text-center text-sm font-bold text-green-600";
                status.innerText = T.statusSuccess;
                setTimeout(() => location.reload(), 2000);
            } catch (e) { alert(T.dbErr); btn.disabled = false; }
        }

        function showError(msg) {
            document.getElementById('loading-screen').innerHTML = 
                `<p class="text-red-600 font-bold bg-red-50 p-4 rounded-lg border border-red-200">${msg}</p>`;
        }

        function getFileDuration(file) {
            return new Promise((resolve) => {
                const audio = new Audio();
                audio.src = URL.createObjectURL(file);
                audio.addEventListener('loadedmetadata', () => {
                    const mins = Math.floor(audio.duration / 60);
                    const secs = Math.floor(audio.duration % 60);
                    resolve(`${mins}:${secs.toString().padStart(2, '0')}`);
                });
                audio.addEventListener('error', () => resolve("--:--"));
            });
        }
    </script>
