<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Inspector Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .stat-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #6366f1; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Profile image upload icon overlay */
        .profile-upload-btn { opacity: 0; transition: opacity 0.2s ease; }
        .profile-container:hover .profile-upload-btn { opacity: 1; }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="loader" class="fixed inset-0 bg-slate-900/50 flex justify-center items-center z-[100] hidden">
        <div class="loader"></div>
    </div>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i class="fas fa-university text-xl"></i></div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Academic Inspector Dashboard</h1>
            </div>
            <button id="logout-btn" class="text-slate-500 hover:text-red-600 font-semibold transition flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">

        <div id="summary-section">
            
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-8 flex flex-col lg:flex-row items-center justify-between gap-8">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="relative group profile-container w-28 h-28 rounded-2xl overflow-hidden border-4 border-white shadow-lg cursor-pointer">
                        <img id="profile-photo" src="https://placehold.co/150x150?text=Upload" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/50 flex items-center justify-center profile-upload-btn">
                            <i class="fas fa-camera text-white text-3xl"></i>
                        </div>
                        <input type="file" id="profile-upload-input" class="hidden" accept="image/*">
                    </div>
                    <div class="text-center md:text-left">
                        <h2 class="text-2xl font-bold text-slate-800">Assalamu Alaikum, <span id="inspector-name" class="text-indigo-600">Inspector</span></h2>
                        <p class="text-slate-500 font-medium">Jamiaat Oversight & Academic Quality Control</p>
                        <div class="flex flex-wrap justify-center md:justify-start gap-4 mt-4">
                            <span class="bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-full text-xs font-bold border border-indigo-100">
                                <i class="fas fa-mosque mr-2"></i> Institutes: <span id="stat-jamia-count">0</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 flex flex-col sm:flex-row items-end gap-4 w-full lg:w-auto">
                    <div class="w-full sm:w-auto">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Reporting Month</label>
                        <input type="month" id="report-month" class="w-full p-2.5 border border-slate-300 rounded-xl text-sm bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <button onclick="window.openReports()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                        Fill Records <i class="fas fa-edit"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <div class="stat-card bg-white p-6 rounded-3xl">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Inspection Done</p>
                    <p id="prog-jaiza-percent" class="text-4xl font-black text-emerald-600 mt-2">0%</p>
                </div>
                </div>

            <div id="chart-download-container" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm mb-10">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-10 border-b pb-6">
                    <div class="flex items-center gap-4">
                        <div class="bg-emerald-50 text-emerald-600 p-4 rounded-full text-2xl border border-emerald-100">
                            <i class="fas fa-chart-pie"></i>
                        </div>
                        <div>
                            <h4 class="font-black text-2xl text-slate-800">Monthly Progress Overview</h4>
                            <p class="text-slate-500 text-sm">Visual summary of inspection and task completion.</p>
                        </div>
                    </div>
                    <button id="download-chart-btn" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 px-6 py-3 rounded-full font-bold text-sm transition flex items-center gap-2 whitespace-nowrap">
                        <i class="fas fa-download"></i> DOWNLOAD CHART
                    </button>
                </div>
                
                <div style="height: 400px; position: relative;">
                    <canvas id="mainInspectorChart"></canvas>
                </div>
            </div>

        </div>

        <div id="reports-section" class="hidden">
            </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        // Profile image upload ke liye storage import karein
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); // Storage initialization

        let currentUser = null;
        let assignedJamiaat = [];
        let globalChart = null; // Chart instance to reuse

        // AUTH CHECK
        onAuthStateChanged(auth, async user => {
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;
            await initDashboard();
        });

        // INIT DASHBOARD
        async function initDashboard() {
            showLoader(true);
            const monthInput = document.getElementById('report-month');
            if(!monthInput.value) {
                const now = new Date();
                monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            }

            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                assignedJamiaat = data.jamiaatList || [];
                document.getElementById('inspector-name').textContent = data.name || "Inspector";
                document.getElementById('stat-jamia-count').textContent = assignedJamiaat.length;
                
                // Agar pahle se photo URL hai, to use show karein
                if (data.photoURL) {
                    document.getElementById('profile-photo').src = data.photoURL;
                }
            }

            await loadStats();
            showLoader(false);
        }

        // LOAD STATS & PROGRESS
        async function loadStats() {
            const month = document.getElementById('report-month').value;
            const total = assignedJamiaat.length;

            try {
                // Fetch Inspection data directly from 'jaiza_forms'
                const qJaiza = query(
                    collection(db, "jaiza_forms"),
                    where("createdBy", "==", currentUser.uid),
                    where("month", "==", month)
                );
                const snapJaiza = await getDocs(qJaiza);
                
                // Unique Jamiaat count nikalna
                const doneJaiza = [...new Set(snapJaiza.docs.map(d => d.data().jamiaName))].length;

                // UI Update for Inspection Card
                const percentJaiza = total > 0 ? Math.round((doneJaiza / total) * 100) : 0;
                document.getElementById(`prog-jaiza-percent`).textContent = `${percentJaiza}%`;

                // Chart Refresh (Passing all necessary data)
                renderPieChart(doneJaiza, total - doneJaiza);

            } catch (error) {
                console.error("Error loading dashboard stats:", error);
            }
        }

        // ====== CHART FUNCTION (Exactly like image, Doughnut style) ======
        function renderPieChart(completed, pending) {
            const ctx = document.getElementById('mainInspectorChart').getContext('2d');
            
            // Purane chart instance ko destroy karein taake naya render ho sake
            if(globalChart) { globalChart.destroy(); }

            globalChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Pending Tasks', 'Completed Inspections'],
                    datasets: [{
                        data: [pending, completed],
                        backgroundColor: [
                            '#e2e8f0', // Pending: Light Slate
                            '#10b981'  // Completed: Emerald Green (exactly like image)
                        ],
                        hoverOffset: 15,
                        borderWidth: 8,
                        borderColor: '#ffffff', // Spacing like image
                        borderRadius: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%', // Thin doughnut like image
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                padding: 30,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 14, weight: 'bold', family: 'Poppins' },
                                color: '#334155'
                            }
                        },
                        // Datalabels for center text
                        datalabels: {
                            display: false // We will use a custom plugin for center text instead
                        }
                    },
                    // Animation like image
                    animation: {
                        animateScale: true,
                        animateRotate: true
                    }
                },
                // Custom plugin for center text
                plugins: [{
                    id: 'centerText',
                    afterDraw: (chart) => {
                        const { ctx, chartArea: { top, width, height } } = chart;
                        ctx.save();
                        
                        // Main large percent text
                        const total = pending + completed;
                        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                        const text = percent + '%';
                        
                        ctx.font = 'bolder 60px Poppins'; // Large text
                        ctx.fillStyle = '#1e293b'; // Slate 800
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(text, width / 2, (height / 2) + top - 10);
                        
                        // "COMPLETED" sub-text
                        ctx.font = 'bold 14px Poppins';
                        ctx.fillStyle = '#10b981'; // Emerald
                        ctx.fillText('COMPLETED', width / 2, (height / 2) + top + 35);
                        
                        ctx.restore();
                    }
                }]
            });
        }

        // ====== INTERACTIVE ACTIONS ======

        // 1. Download Chart function
        document.getElementById('download-chart-btn').onclick = function() {
            showLoader(true);
            const chartContainer = document.getElementById('mainInspectorChart');
            
            html2canvas(chartContainer, {
                backgroundColor: '#ffffff',
                scale: 2 // Higher quality
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `monthly-progress-${document.getElementById('report-month').value}.png`;
                link.href = canvas.toDataURL();
                link.click();
                showLoader(false);
            }).catch(err => {
                console.error(err);
                alert("Error downloading chart.");
                showLoader(false);
            });
        };

        // 2. Profile Photo Upload function
        // Clicking the profile container triggers the hidden input
        document.querySelector('.profile-container').onclick = () => document.getElementById('profile-upload-input').click();

        document.getElementById('profile-upload-input').onchange = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Optional: check file size/type
            if (file.size > 2 * 1024 * 1024) { // 2MB limit
                alert("Image is too large. Please upload an image smaller than 2MB.");
                return;
            }

            showLoader(true);
            try {
                // Upload image to Firebase Storage
                const storageRef = ref(storage, `profile_photos/${currentUser.uid}.png`);
                await uploadBytes(storageRef, file);

                // Get Download URL
                const downloadURL = await getDownloadURL(storageRef);

                // Save URL to User Doc in Firestore
                await setDoc(doc(db, "users", currentUser.uid), { photoURL: downloadURL }, { merge: true });

                // Update UI image instantly
                document.getElementById('profile-photo').src = downloadURL;
                alert("Profile photo updated successfully!");

            } catch (error) {
                console.error("Upload Error:", error);
                alert("Error uploading photo. Please try again.");
            } finally {
                showLoader(false);
            }
        };

        // 3. Setup Reports link
        window.openReports = () => {
            document.getElementById('summary-section').classList.add('hidden');
            document.getElementById('reports-section').classList.remove('hidden');
            if (typeof window.renderInspectionList === 'function') {
                window.renderInspectionList();
            }
        };

        window.backToSummary = () => {
            document.getElementById('reports-section').classList.add('hidden');
            document.getElementById('summary-section').classList.remove('hidden');
        };

        const showLoader = (s) => document.getElementById('loader').classList.toggle('hidden', !s);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

    </script>
</body>
</html>
