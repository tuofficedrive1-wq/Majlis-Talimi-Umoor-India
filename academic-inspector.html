<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Inspector Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .tab-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="loader" class="fixed inset-0 bg-gray-900/50 flex justify-center items-center z-[100] hidden">
        <div class="loader"></div>
    </div>

    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-700">Academic Inspector Panel</h1>
        <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold transition">Logout</button>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <div id="summary-section">
            <div class="bg-white rounded-2xl shadow-sm border p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <img id="profile-photo" src="https://placehold.co/100x100" class="w-20 h-20 rounded-full border-4 border-indigo-50 shadow-sm object-cover">
                    <div>
                        <h2 class="text-xl font-bold">Assalamu Alaikum, <span id="inspector-name" class="text-indigo-600">Inspector</span></h2>
                        <p class="text-sm text-gray-500">Academic Management System</p>
                    </div>
                </div>
                
                <div class="bg-slate-50 p-4 rounded-xl border flex flex-col sm:flex-row items-end gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Reporting Month</label>
                        <input type="month" id="report-month" class="p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button onclick="window.openReports()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition">
                        Fill Reports <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-4 rounded-xl border border-indigo-100 shadow-sm">
                    <p class="text-xs font-bold text-gray-400 uppercase">Total Jamiaat</p>
                    <p id="stat-jamia-count" class="text-2xl font-bold text-indigo-700">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-emerald-100 shadow-sm">
                    <p class="text-xs font-bold text-gray-400 uppercase">Inspections Done</p>
                    <p id="stat-inspected" class="text-2xl font-bold text-emerald-600">0</p>
                </div>
                </div>
        </div>

        <div id="reports-section" class="hidden">
            <button onclick="window.backToSummary()" class="mb-6 text-indigo-600 hover:text-indigo-800 font-semibold">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </button>

            <div class="flex overflow-x-auto gap-2 mb-6 border-b pb-2">
                <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-bold border" data-tab="inspection">Inspection</button>
                <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold border bg-white" data-tab="recording">Recording</button>
                <button class="tab-btn px-4 py-2 rounded-lg text-sm font-bold border bg-white" data-tab="test">Monthly Test</button>
            </div>

            <div id="tab-inspection" class="tab-content space-y-4">
                <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 mb-4">
                    <p class="text-sm text-indigo-800 font-medium">Please select the visit date and enter the overall score for each institute.</p>
                </div>
                <div id="inspection-list-container" class="space-y-3">
                    </div>
                <button id="save-all-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6">
                    <i class="fas fa-save mr-2"></i> SUBMIT ALL INSPECTIONS
                </button>
            </div>

            <div id="tab-recording" class="tab-content hidden"><p class="p-10 text-center text-gray-400">Recording data coming soon...</p></div>
            <div id="tab-test" class="tab-content hidden"><p class="p-10 text-center text-gray-400">Monthly Test data coming soon...</p></div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let assignedJamiaat = [];

        // Auth Listener
        onAuthStateChanged(auth, async user => {
            if (!user) { window.location.href = "index.html"; return; }
            currentUser = user;
            await loadInspectorData();
        });

        // Initialize Month Input
        const now = new Date();
        document.getElementById('report-month').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        // Load Initial Data
        async function loadInspectorData() {
            showLoader(true);
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                assignedJamiaat = data.jamiaatList || [];
                document.getElementById('inspector-name').textContent = data.name || "Inspector";
                document.getElementById('stat-jamia-count').textContent = assignedJamiaat.length;
                if (data.photoURL) document.getElementById('profile-photo').src = data.photoURL;
            }
            showLoader(false);
        }

        // Render Inspection List (Exactly like index.html style)
        window.renderInspectionList = function() {
            const container = document.getElementById('inspection-list-container');
            const month = document.getElementById('report-month').value;
            
            if (assignedJamiaat.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-gray-400">No Jamiaat assigned to you.</p>';
                return;
            }

            container.innerHTML = assignedJamiaat.map(jamia => `
                <div class="inspection-row bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row items-center gap-4 hover:border-indigo-300 transition-all">
                    <div class="w-full md:w-1/4">
                        <span class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Institute</span>
                        <p class="font-bold text-slate-700">${jamia}</p>
                    </div>
                    <div class="w-full md:w-1/4">
                        <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Visit Date</label>
                        <input type="date" class="insp-date w-full p-2 bg-slate-50 border rounded-lg text-sm">
                    </div>
                    <div class="w-full md:w-1/4">
                        <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Status</label>
                        <select class="insp-type w-full p-2 bg-slate-50 border rounded-lg text-sm font-semibold">
                            <option value="Inspection">Inspection Done</option>
                            <option value="Visit Only">Visit Only</option>
                            <option value="Not Conducted">Not Conducted</option>
                        </select>
                    </div>
                    <div class="w-full md:w-1/4 flex items-end gap-2">
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">Score %</label>
                            <input type="number" placeholder="0" class="insp-score w-full p-2 bg-slate-50 border rounded-lg text-sm font-bold text-indigo-600">
                        </div>
                        <a href="jaiza-form.html?jamia=${encodeURIComponent(jamia)}&month=${month}&lang=en" 
                           class="bg-indigo-50 text-indigo-600 border border-indigo-200 px-3 py-2 rounded-lg text-xs font-bold hover:bg-indigo-100 transition">
                           Open Form
                        </a>
                    </div>
                    <input type="hidden" class="insp-jamia-name" value="${jamia}">
                </div>
            `).join('');
        };

        // Handle Bulk Save
        document.getElementById('save-all-btn').onclick = async () => {
            const rows = document.querySelectorAll('.inspection-row');
            const month = document.getElementById('report-month').value;
            const dataToSave = [];

            rows.forEach(row => {
                const date = row.querySelector('.insp-date').value;
                const status = row.querySelector('.insp-type').value;
                if (date || status === 'Not Conducted') {
                    dataToSave.push({
                        jamiaName: row.querySelector('.insp-jamia-name').value,
                        inspectionDate: date,
                        status: status,
                        score: row.querySelector('.insp-score').value,
                        month: month,
                        createdBy: currentUser.uid,
                        createdAt: serverTimestamp()
                    });
                }
            });

            if (dataToSave.length === 0) {
                alert("Please fill at least one inspection date.");
                return;
            }

            showLoader(true);
            try {
                for (const entry of dataToSave) {
                    await addDoc(collection(db, "jaiza_forms"), entry);
                }
                alert("All records saved successfully!");
                window.backToSummary();
            } catch (error) {
                console.error(error);
                alert("Error saving records.");
            } finally {
                showLoader(false);
            }
        };

        // Navigation Functions
        window.openReports = () => {
            document.getElementById('summary-section').classList.add('hidden');
            document.getElementById('reports-section').classList.remove('hidden');
            window.renderInspectionList();
        };

        window.backToSummary = () => {
            document.getElementById('reports-section').classList.add('hidden');
            document.getElementById('summary-section').classList.remove('hidden');
        };

        // Tab Switching Logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
            };
        });

        const showLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

    </script>
</body>
</html>
