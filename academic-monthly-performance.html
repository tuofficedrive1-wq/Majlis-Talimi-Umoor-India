<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Monthly Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Mobile App Feel CSS */
        body {
            background-color: #f4f7fb;
            -webkit-tap-highlight-color: transparent;
        }
        .app-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        .input-field {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <div class="gradient-bg text-white p-6 rounded-b-3xl shadow-lg mb-6 relative z-10">
        <h1 class="text-2xl font-extrabold tracking-wide text-center">
            <i class="fas fa-graduation-cap mr-2"></i>Performance App
        </h1>
        
        <div id="app-info-badges" class="hidden grid grid-cols-2 gap-3 mt-6">
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-3 text-center">
                <p class="text-xs text-white/80 uppercase font-semibold mb-1">Jamia</p>
                <p id="display-jamia" class="font-bold text-sm truncate">--</p>
            </div>
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-3 text-center">
                <p class="text-xs text-white/80 uppercase font-semibold mb-1">Month</p>
                <p id="display-month" class="font-bold text-sm truncate">--</p>
            </div>
        </div>
    </div>

    <div class="px-4 max-w-md mx-auto">
        <div id="login-container" class="app-card p-6 border-t-4 border-indigo-500">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h2 class="text-xl font-bold">Secure Verification</h2>
                <p class="text-slate-500 text-sm mt-1">Apni 5-digit Jamia ID enter karein</p>
            </div>
            
            <div class="space-y-5">
                <input type="text" id="login-id" maxlength="5" pattern="\d*" inputmode="numeric" placeholder="Enter ID (e.g., 12345)" class="w-full p-4 text-center font-bold text-2xl tracking-[0.2em] rounded-2xl input-field outline-none">
                <button id="btn-verify" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
                    Verify & Proceed <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <div id="main-form-container" class="hidden space-y-6">
            <form id="performance-form">
                <input type="hidden" id="hidden-jamia-id">
                <input type="hidden" id="hidden-jamia-name">
                <input type="hidden" id="hidden-report-month"> <div class="app-card p-5">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mr-2"><i class="fas fa-user"></i></span>
                        Teacher Detail
                    </h3>
                    <input type="text" id="teacher-name" placeholder="Full Teacher Name" class="w-full p-4 rounded-xl input-field outline-none font-medium" required>
                </div>

                <div class="app-card p-5 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-slate-700 flex items-center">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-2"><i class="fas fa-book-open"></i></span>
                            Periods (Tafsil)
                        </h3>
                    </div>
                    
                    <div id="period-container" class="space-y-4">
                        <div class="period-row bg-slate-50 p-4 rounded-2xl border border-slate-100 relative">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <input type="text" placeholder="Class" class="input-class p-3 rounded-xl input-field text-sm outline-none" required>
                                <input type="text" placeholder="Subject" class="input-subject p-3 rounded-xl input-field text-sm outline-none" required>
                            </div>
                            <div class="flex items-center gap-2 bg-white p-2 rounded-xl border border-slate-200">
                                <span class="text-xs font-bold text-slate-400 ml-2">PAGES:</span>
                                <input type="number" placeholder="From" class="input-page-from w-full p-2 text-center text-sm outline-none font-medium bg-transparent" required>
                                <span class="text-slate-300">-</span>
                                <input type="number" placeholder="To" class="input-page-to w-full p-2 text-center text-sm outline-none font-medium bg-transparent" required>
                            </div>
                            <button type="button" class="btn-remove-row absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full shadow-md hidden flex items-center justify-center active:bg-red-600">
                                <i class="fas fa-times text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <button type="button" id="btn-add-period" class="w-full mt-4 border-2 border-dashed border-indigo-300 text-indigo-600 font-bold py-3 rounded-xl bg-indigo-50 hover:bg-indigo-100 transition flex justify-center items-center">
                        <i class="fas fa-plus-circle mr-2"></i> Add New Period
                    </button>
                </div>

                <button type="submit" class="w-full mt-8 gradient-bg text-white font-bold py-4 rounded-2xl shadow-xl shadow-purple-200 text-lg active:scale-95 transition-transform flex justify-center items-center">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Save Performance
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.appspot.com",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
            measurementId: "G-1PHNJQWNPZ",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL Params Logic
        const urlParams = new URLSearchParams(window.location.search);
        const urlJamiaName = urlParams.get('jamiaName') || 'Unknown Jamia';
        
        // Month URL se aayega (e.g., ?jamiaName=Test&month=March)
        const urlMonth = urlParams.get('month'); 

        // DOM Elements
        const loginContainer = document.getElementById('login-container');
        const mainFormContainer = document.getElementById('main-form-container');
        const loginIdInput = document.getElementById('login-id');
        const btnVerify = document.getElementById('btn-verify');
        const appInfoBadges = document.getElementById('app-info-badges');
        const displayJamia = document.getElementById('display-jamia');
        const displayMonth = document.getElementById('display-month');
        const periodContainer = document.getElementById('period-container');
        const btnAddPeriod = document.getElementById('btn-add-period');
        const performanceForm = document.getElementById('performance-form');
        const hiddenReportMonth = document.getElementById('hidden-report-month');

        // Initial setup for Month
        if(urlMonth) {
            hiddenReportMonth.value = urlMonth;
            displayMonth.innerText = urlMonth;
        } else {
            displayMonth.innerHTML = "<span class='text-red-300'>Not Found</span>";
        }

        // Verification
        btnVerify.addEventListener('click', () => {
            const enteredId = loginIdInput.value.trim();
            
            if(!urlMonth) {
                alert('URL mein month specify nahi hai. Kripya sahi link use karein.');
                return;
            }

            if(enteredId.length === 5 && !isNaN(enteredId)) {
                loginContainer.classList.add('hidden');
                mainFormContainer.classList.remove('hidden');
                appInfoBadges.classList.remove('hidden');
                
                document.getElementById('hidden-jamia-id').value = enteredId;
                document.getElementById('hidden-jamia-name').value = urlJamiaName;
                displayJamia.innerText = `${urlJamiaName} (${enteredId})`;
            } else {
                alert('Kripya ek sahi 5-digit ID enter karein!');
            }
        });

        // Add Period Row Dynamically
        btnAddPeriod.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = "period-row bg-slate-50 p-4 rounded-2xl border border-slate-100 relative mt-4 slide-in";
            newRow.innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" placeholder="Class" class="input-class p-3 rounded-xl input-field text-sm outline-none" required>
                    <input type="text" placeholder="Subject" class="input-subject p-3 rounded-xl input-field text-sm outline-none" required>
                </div>
                <div class="flex items-center gap-2 bg-white p-2 rounded-xl border border-slate-200">
                    <span class="text-xs font-bold text-slate-400 ml-2">PAGES:</span>
                    <input type="number" placeholder="From" class="input-page-from w-full p-2 text-center text-sm outline-none font-medium bg-transparent" required>
                    <span class="text-slate-300">-</span>
                    <input type="number" placeholder="To" class="input-page-to w-full p-2 text-center text-sm outline-none font-medium bg-transparent" required>
                </div>
                <button type="button" class="btn-remove-row absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full shadow-md flex items-center justify-center active:bg-red-600 transition-transform">
                    <i class="fas fa-times text-sm"></i>
                </button>
            `;
            periodContainer.appendChild(newRow);
            toggleRemoveButtons();
        });

        periodContainer.addEventListener('click', (e) => {
            if(e.target.closest('.btn-remove-row')) {
                e.target.closest('.period-row').remove();
                toggleRemoveButtons();
            }
        });

        function toggleRemoveButtons() {
            const rows = periodContainer.querySelectorAll('.period-row');
            rows.forEach((row) => {
                const deleteBtn = row.querySelector('.btn-remove-row');
                if(rows.length === 1) {
                    deleteBtn.classList.add('hidden');
                } else {
                    deleteBtn.classList.remove('hidden');
                }
            });
        }

        // Form Submit
        performanceForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = performanceForm.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Saving...';
            submitBtn.disabled = true;

            const jamiaId = document.getElementById('hidden-jamia-id').value;
            const teacherName = document.getElementById('teacher-name').value.trim();
            const selectedFullMonth = hiddenReportMonth.value;
            
            // Convert to 3 letter lowercase (jan, feb, mar)
            const dbMonthFormat = selectedFullMonth.substring(0, 3).toLowerCase(); 
            
            const periodsDetailMap = {};
            const rows = periodContainer.querySelectorAll('.period-row');
            
            rows.forEach((row, index) => {
                const periodKey = `period_${index + 1}`;
                periodsDetailMap[periodKey] = {
                    class: row.querySelector('.input-class').value.trim(),
                    subject: row.querySelector('.input-subject').value.trim(),
                    page_from: parseInt(row.querySelector('.input-page-from').value) || 0,
                    page_to: parseInt(row.querySelector('.input-page-to').value) || 0
                };
            });

            try {
                const docRef = doc(db, "academic_performance", jamiaId);
                const docSnap = await getDoc(docRef);
                let existingData = docSnap.exists() ? docSnap.data() : {};

                const newTeacherData = {
                    name: teacherName,
                    designation: "Teacher",
                    periods_detail: periodsDetailMap
                };

                let monthData = existingData[dbMonthFormat] || { teachers: [] };
                let updatedTeachers = (monthData.teachers || []).filter(t => t.name.toLowerCase() !== teacherName.toLowerCase());
                updatedTeachers.push(newTeacherData);

                existingData[dbMonthFormat] = {
                    teachers: updatedTeachers,
                    updated_at: new Date().toISOString()
                };

                await setDoc(docRef, existingData, { merge: true });
                
                alert('🎉 Performance Data Kamyabi se Save Ho Gaya!');
                
                // Form reset but keep month and ID
                document.getElementById('teacher-name').value = '';
                periodContainer.innerHTML = '';
                btnAddPeriod.click(); // Add one empty row back

            } catch (error) {
                console.error("Error saving to Firestore: ", error);
                alert("Data save karne me error aayi. Please check console.");
            } finally {
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
