<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Monthly Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div id="login-container" class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6 mt-12">

    <h2 class="text-2xl font-bold text-indigo-600 mb-4 text-center">
        <i class="fas fa-user-lock mr-2"></i>
        Teacher Login
    </h2>

    <p class="text-slate-500 text-sm mb-6 text-center">
        Apna 5 digit Teacher Code enter karein
    </p>

    <div class="space-y-4">

        <input 
            type="text"
            id="teacher-code"
            maxlength="5"
            placeholder="Teacher Code"
            class="w-full p-3 border rounded-xl text-center font-bold text-xl tracking-widest outline-indigo-500"
        >

        <button 
            id="btn-login"
            class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-indigo-700 transition"
        >
            LOGIN
        </button>

    </div>

</div>

    <div id="main-form-container" class="max-w-4xl mx-auto bg-white rounded-3xl shadow-lg p-6 hidden">
        <div class="border-b pb-4 mb-6 bg-indigo-50 p-4 rounded-2xl">
            <h2 class="text-2xl font-bold text-indigo-600 mb-2"><i class="fas fa-graduation-cap mr-2"></i>Monthly Performance</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-sm font-bold text-slate-700 mt-3">
                <p id="display-jamia"><span class="text-indigo-600">Jamia:</span> Loading...</p>
                <p id="display-month"><span class="text-indigo-600">Month:</span> Loading...</p>
                <p id="display-teacher"><span class="text-indigo-600">Teacher:</span> Loading...</p>
            </div>
        </div>

        <form id="performance-form" class="space-y-8">
            <input type="hidden" id="hidden-jamia-id">
            <input type="hidden" id="hidden-jamia-name">

            <div class="border-b pb-6">
                <h3 class="font-bold text-lg mb-4 text-slate-700"><i class="fas fa-user-tie mr-2"></i> Teacher Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                   <input 
    type="text" 
    id="teacher-name"
    readonly placeholder="Teacher Name" class="p-3 border rounded-xl outline-indigo-500" required>
                    <select id="report-month" class="p-3 border rounded-xl outline-indigo-500" required>
                        <option value="">Select Month</option>
                        <option value="January">January</option>
                        <option value="February">February</option>
                        <option value="March">March</option>
                        <option value="April">April</option>
                        <option value="May">May</option>
                        <option value="June">June</option>
                        <option value="July">July</option>
                        <option value="August">August</option>
                        <option value="September">September</option>
                        <option value="October">October</option>
                        <option value="November">November</option>
                        <option value="December">December</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg text-slate-700"><i class="fas fa-clock mr-2"></i> Periods Detail (Tafsil)</h3>
                    <button 
                        type="button" 
                        id="btn-add-period"
                        class="hidden bg-emerald-500 text-white px-3 py-1.5 rounded-xl text-sm font-bold hover:bg-emerald-600">
                        <i class="fas fa-plus mr-1"></i> Add Period
                    </button>
                </div>
                
                <div id="period-container" class="space-y-3">
                    <div class="period-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-xl border relative">
                        <input type="text" placeholder="Class" class="input-class p-2.5 border rounded-lg text-sm" required>
                        <input type="text" placeholder="Subject" class="input-subject p-2.5 border rounded-lg text-sm" required>
                        <div class="flex gap-1 items-center col-span-1 md:col-span-2">
                            <input type="number" placeholder="Page From" class="input-page-from w-full p-2.5 border rounded-lg text-sm" required>
                            <span class="text-slate-400 text-xs">to</span>
                            <input type="number" placeholder="Page To" class="input-page-to w-full p-2.5 border rounded-lg text-sm" required>
                            <button type="button" class="btn-remove-row text-red-500 px-2 hover:text-red-700 hidden"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition">
                SAVE PERFORMANCE DATA
            </button>
        </form>
    </div>

    <script type="module">
        
                // Firebase modules import karein (Version 10+ CDN standard)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getFirestore, 
    doc, 
    setDoc, 
    getDoc 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import { 
    getAuth, 
    signInAnonymously 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// TODO: Yahan apni actual Firebase Project Configuration daalein
const firebaseConfig = {
    apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
  authDomain: "data-f15ab.firebaseapp.com",
  projectId: "data-f15ab",
  storageBucket: "data-f15ab.appspot.com",
  messagingSenderId: "449137002393",
  appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
  measurementId: "G-1PHNJQWNPZ",
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

signInAnonymously(auth)
.then(() => {
    console.log("Anonymous Login Success");
})
.catch((error) => {
    console.error("Auth Error:", error);
});

// URL parameters get karne ke liye
const urlParams = new URLSearchParams(window.location.search);
const urlJamiaName = urlParams.get('jamiaName') || 'Jamia';
const userId = urlParams.get('userId');
const activeYear = urlParams.get('activeYear');

// DOM Elements
const loginContainer = document.getElementById('login-container');
const mainFormContainer = document.getElementById('main-form-container');
const loginIdInput = document.getElementById('login-id');
const teacherCodeInput = document.getElementById('teacher-code');
const btnLogin = document.getElementById('btn-login');

let currentTeacher = null;
let currentJamia = null;

const displayJamia = document.getElementById('display-jamia');
const displayMonth = document.getElementById('display-month');
const displayTeacher = document.getElementById('display-teacher');

const teacherNameInput = document.getElementById('teacher-name');
const reportMonthSelect = document.getElementById('report-month');
const periodContainer = document.getElementById('period-container');
const btnAddPeriod = document.getElementById('btn-add-period');
const performanceForm = document.getElementById('performance-form');

// Verification Logic
btnLogin.addEventListener('click', async () => {

    const code = teacherCodeInput.value.trim();

    if(code.length !== 5) {
        alert("5 digit teacher code enter karein");
        return;
    }

    try {

        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);

        if(!userSnap.exists()) {
            alert("User data nahi mila");
            return;
        }

        const userData = userSnap.data();

        const academicYears = userData.academicYears || {};

        const yearData = academicYears[activeYear];

        if(!yearData) {
            alert("Academic year data missing");
            return;
        }

        const structure = yearData.karkardagiStructure || [];

        let foundTeacher = null;
        let foundJamia = null;

        structure.forEach(jamia => {

            const teacher = (jamia.teachers || []).find(t =>
                String(t.loginCode) === code
            );

            if(teacher) {
                foundTeacher = teacher;
                foundJamia = jamia;
            }

        });

        if(!foundTeacher) {
            alert("Teacher code invalid");
            return;
        }

        currentTeacher = foundTeacher;
        currentJamia = foundJamia;

        loginContainer.classList.add('hidden');
        mainFormContainer.classList.remove('hidden');

        document.getElementById('hidden-jamia-id').value = foundJamia.jamiaName;

        displayJamia.innerHTML =
            `<span class="text-indigo-600">Jamia:</span> ${foundJamia.jamiaName}`;

        displayTeacher.innerHTML =
            `<span class="text-indigo-600">Teacher:</span> ${foundTeacher.name}`;

        teacherNameInput.value = foundTeacher.name;

        loadTeacherPeriods(foundTeacher);

    } catch(error) {

        console.error(error);
        alert("Login error");

    }

});

// Header sync jab user inputs change kare
teacherNameInput.addEventListener('input', (e) => {
    displayTeacher.innerHTML = `<span class="text-indigo-600">Teacher:</span> ${e.target.value || '--'}`;
});

reportMonthSelect.addEventListener('change', (e) => {
    // Inspector dashboard me months shortform (jan, feb, mar...) me lowercase me save hote hain
    const shortMonth = e.target.value.substring(0, 3).toLowerCase();
    displayMonth.innerHTML = `<span class="text-indigo-600">Month:</span> ${e.target.value || '--'}`;
});

// Dynamic Rows add karne ka function
btnAddPeriod.addEventListener('click', () => {
    const newRow = document.createElement('div');
    newRow.className = "period-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-xl border relative";
    newRow.innerHTML = `
        <input type="text" placeholder="Class" class="input-class p-2.5 border rounded-lg text-sm" required>
        <input type="text" placeholder="Subject" class="input-subject p-2.5 border rounded-lg text-sm" required>
        <div class="flex gap-1 items-center col-span-1 md:col-span-2">
            <input type="number" placeholder="Page From" class="input-page-from w-full p-2.5 border rounded-lg text-sm" required>
            <span class="text-slate-400 text-xs">to</span>
            <input type="number" placeholder="Page To" class="input-page-to w-full p-2.5 border rounded-lg text-sm" required>
            <button type="button" class="btn-remove-row text-red-500 px-2 hover:text-red-700"><i class="fas fa-trash"></i></button>
        </div>
    `;
    periodContainer.appendChild(newRow);
    toggleRemoveButtons();
});

periodContainer.addEventListener('click', (e) => {
    if(e.target.closest('.btn-remove-row')) {
        e.target.closest('.period-row').remove();
        toggleRemoveButtons();
    }
});

function toggleRemoveButtons() {
    const rows = periodContainer.querySelectorAll('.period-row');
    rows.forEach((row) => {
        const deleteBtn = row.querySelector('.btn-remove-row');
        if(rows.length === 1) {
            deleteBtn.classList.add('hidden');
        } else {
            deleteBtn.classList.remove('hidden');
        }
    });
}

// FORM SUBMIT: Dashboard ke mutabik Data Structure sync kiya gaya hai
performanceForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const jamiaId = document.getElementById('hidden-jamia-id').value;
    const teacherName = teacherNameInput.value.trim();
    const selectedFullMonth = reportMonthSelect.value;
    
    // Dashboard ke logic ke hisab se month ko 3 letters lowercase me convert karna (e.g., "May" -> "may")
    const dbMonthFormat = selectedFullMonth.substring(0, 3).toLowerCase(); 
    
    // Periods detail ko MAP/OBJECT structure me convert karna jaisa dashboard read karta hai
    // Format: { "period_1": { class: "1", subject: "Urdu", page_from: 1, page_to: 10 } }
    const periodsDetailMap = {};
    const rows = periodContainer.querySelectorAll('.period-row');
    
    rows.forEach((row, index) => {
        const periodKey = `period_${index + 1}`;
        periodsDetailMap[periodKey] = {
            class: row.querySelector('.input-class').value.trim(),
            subject: row.querySelector('.input-subject').value.trim(),
            page_from: parseInt(row.querySelector('.input-page-from').value) || 0,
            page_to: parseInt(row.querySelector('.input-page-to').value) || 0
        };
    });

    try {
        // Dashboard rules ke mutabik collection ka naam "academic_performance" hoga aur doc ID sirf JamiaID hogi
        const docRef = doc(db, "academic_performance", jamiaId);
        
        // Pehle se maujud data check karein taaki purani months ka data delete na ho jaye
        const docSnap = await getDoc(docRef);
        let existingData = {};
        if (docSnap.exists()) {
            existingData = docSnap.data();
        }

        // Naya structure map taiyar karna jo aapke js file ke read function se match kare
        const newTeacherData = {
            name: teacherName,
            designation: "Teacher", // Default designation
            periods_detail: periodsDetailMap
        };

        // Agar us mahine ka data pehle se hai to teachers array check karein ya naya array banayein
        let monthData = existingData[dbMonthFormat] || { teachers: [] };
        
        // Purane same naam ke teacher ka record hataiye agar dubara submit ho raha hai
        let updatedTeachers = (monthData.teachers || []).filter(t => t.name.toLowerCase() !== teacherName.toLowerCase());
        updatedTeachers.push(newTeacherData);

        // Month data object ko update karein
        existingData[dbMonthFormat] = {
            teachers: updatedTeachers,
            updated_at: new Date().toISOString()
        };

        // Final Save back to Firestore
        await setDoc(docRef, existingData, { merge: true });
        
        alert('Performance data kamyabi se save ho gaya hai! Dashboard par ab ye auto-load ho jayega.');
        
        // Form Reset System
        performanceForm.reset();
        displayTeacher.innerHTML = `<span class="text-indigo-600">Teacher:</span> --`;
        displayMonth.innerHTML = `<span class="text-indigo-600">Month:</span> --`;
        periodContainer.innerHTML = `
            <div class="period-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-xl border relative">
                <input type="text" placeholder="Class" class="input-class p-2.5 border rounded-lg text-sm" required>
                <input type="text" placeholder="Subject" class="input-subject p-2.5 border rounded-lg text-sm" required>
                <div class="flex gap-1 items-center col-span-1 md:col-span-2">
                    <input type="number" placeholder="Page From" class="input-page-from w-full p-2.5 border rounded-lg text-sm" required>
                    <span class="text-slate-400 text-xs">to</span>
                    <input type="number" placeholder="Page To" class="input-page-to w-full p-2.5 border rounded-lg text-sm" required>
                    <button type="button" class="btn-remove-row text-red-500 px-2 hover:text-red-700 hidden"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `;
    } catch (error) {
        console.error("Error saving to Firestore: ", error);
        alert("Data save karne me koi error aayi. Kripya rules aur console check karein.");
    }
});

        function loadTeacherPeriods(teacher) {

    periodContainer.innerHTML = "";

    const periods = teacher.periods || [];

    if(periods.length === 0) {

        periodContainer.innerHTML = `
            <div class="text-center text-red-500 font-bold">
                No periods assigned
            </div>
        `;

        return;
    }

    periods.forEach(period => {

        const row = document.createElement('div');

        row.className =
        "period-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-xl border relative";

        row.innerHTML = `

            <input
                type="text"
                value="${period.className || ''}"
                class="input-class p-2.5 border rounded-lg text-sm bg-gray-100"
                readonly
            >

            <input
                type="text"
                value="${period.bookName || ''}"
                class="input-subject p-2.5 border rounded-lg text-sm bg-gray-100"
                readonly
            >

            <div class="flex gap-1 items-center col-span-1 md:col-span-2">

                <input
                    type="number"
                    placeholder="Page From"
                    class="input-page-from w-full p-2.5 border rounded-lg text-sm"
                    required
                >

                <span class="text-slate-400 text-xs">to</span>

                <input
                    type="number"
                    placeholder="Page To"
                    class="input-page-to w-full p-2.5 border rounded-lg text-sm"
                    required
                >

            </div>
        `;

        periodContainer.appendChild(row);

    });

}
        
    </script>
</body>
</html>
