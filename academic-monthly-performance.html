<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Performance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Mobile App Feel CSS */
        body {
            background-color: #f4f7fb;
            -webkit-tap-highlight-color: transparent;
        }
        .app-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .input-field {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: #7c3aed;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }
        /* Loader Animation */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-800 pb-20">

    <div class="gradient-bg text-white p-6 rounded-b-3xl shadow-lg mb-6 relative z-10">
        <h1 class="text-2xl font-extrabold tracking-wide text-center">
            <i class="fas fa-chalkboard-teacher mr-2"></i>My Performance
        </h1>
        
        <div id="app-info-badges" class="grid grid-cols-2 gap-3 mt-6">
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-3 text-center">
                <p class="text-[10px] text-white/80 uppercase font-black tracking-widest mb-1">Jamia</p>
                <p id="display-jamia" class="font-bold text-sm truncate">Loading...</p>
            </div>
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-3 text-center">
                <p class="text-[10px] text-white/80 uppercase font-black tracking-widest mb-1">Month</p>
                <p id="display-month" class="font-bold text-sm truncate capitalize">Loading...</p>
            </div>
        </div>
    </div>

    <div class="px-4 max-w-md mx-auto">
        <div id="login-container" class="app-card p-6 border-t-4 border-indigo-500">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-xl font-black text-slate-800">Teacher Login</h2>
                <p class="text-slate-500 text-sm mt-1 font-medium">Apna Teacher Code (Ajeer Code) daalein</p>
            </div>
            
            <div class="space-y-5">
                <input type="text" id="login-code" placeholder="Enter Your Code" class="w-full p-4 text-center font-black text-2xl tracking-[0.2em] rounded-2xl input-field outline-none uppercase">
                <button type="button" id="btn-verify" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex justify-center items-center">
                    <span id="btn-verify-text">Verify & Open</span> <i class="fas fa-arrow-right ml-2" id="btn-verify-icon"></i>
                </button>
            </div>
        </div>

        <div id="main-form-container" class="hidden space-y-6">
            <form id="performance-form">
                
                <div class="app-card p-5 border-l-4 border-emerald-500 flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-xl font-bold">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Logged In As</p>
                        <h3 id="display-teacher-name" class="font-black text-slate-800 text-lg">--</h3>
                    </div>
                </div>

                <div class="app-card p-5 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black text-slate-700 flex items-center text-md">
                            <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-2 text-sm"><i class="fas fa-book-open"></i></span>
                            Apni Karkardagi Darj Karein
                        </h3>
                    </div>
                    
                    <div id="period-container" class="space-y-4">
                        </div>
                </div>

                <button type="submit" id="btn-save" class="w-full mt-8 gradient-bg text-white font-black py-4 rounded-2xl shadow-xl shadow-purple-200 text-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> <span>Save Performance</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Yahan apni Firebase Config rakhein
        const firebaseConfig = {
            apiKey: "AIzaSyDhPuyX0y1gb3uXoIRcdcQPkd5Q4KJFgl0",
            authDomain: "data-f15ab.firebaseapp.com",
            projectId: "data-f15ab",
            storageBucket: "data-f15ab.appspot.com",
            messagingSenderId: "449137002393",
            appId: "1:449137002393:web:6a23721d00b1b0daeb3508",
            measurementId: "G-1PHNJQWNPZ",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- URL PARAMS SE DATA NIKALNA ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlJamiaName = urlParams.get('jamiaName');
        const urlMonthIndex = urlParams.get('monthIndex'); // Dashboard "apr", "may" bhej raha hai
        const inspectorId = urlParams.get('inspectorId');

        // DOM Elements
        const displayJamia = document.getElementById('display-jamia');
        const displayMonth = document.getElementById('display-month');
        const loginCodeInput = document.getElementById('login-code');
        const btnVerify = document.getElementById('btn-verify');
        const loginContainer = document.getElementById('login-container');
        const mainFormContainer = document.getElementById('main-form-container');
        const displayTeacherName = document.getElementById('display-teacher-name');
        const periodContainer = document.getElementById('period-container');
        const performanceForm = document.getElementById('performance-form');
        const btnSave = document.getElementById('btn-save');

        // Global Variables
        let gActiveYear = "2026-2027";
        let gUserData = null;
        let gTeacherData = null;
        let gJamiaIndex = -1;
        let gTeacherIndex = -1;

        // UI Setup
        if(urlJamiaName) displayJamia.innerText = urlJamiaName;
        if(urlMonthIndex) displayMonth.innerText = urlMonthIndex;

        // --- LOGIN & VERIFICATION LOGIC ---
        btnVerify.addEventListener('click', async () => {
            const enteredCode = loginCodeInput.value.trim();
            
            if(!enteredCode) {
                alert("Kripya apna Teacher Code enter karein.");
                return;
            }

            if(!inspectorId || !urlJamiaName || !urlMonthIndex) {
                alert("URL me inspector ID, Jamia Name ya Month missing hai. Kripya naya link mangwayein.");
                return;
            }

            // UI Loading state
            btnVerify.disabled = true;
            document.getElementById('btn-verify-text').innerText = "Verifying...";
            document.getElementById('btn-verify-icon').className = "spinner";

            try {
                // 1. Get Active Year from Settings
                const calSnap = await getDoc(doc(db, "settings", "academic_calendar"));
                if (calSnap.exists()) {
                    gActiveYear = calSnap.data().activeYear || "2026-2027";
                }

                // 2. Fetch Admin's User Document
                const userRef = doc(db, "users", inspectorId);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    throw new Error("Admin data nahi mila.");
                }

                gUserData = userSnap.data();
                const structure = gUserData.academicYears?.[gActiveYear]?.karkardagiStructure || [];
                
                // 3. Find Jamia and Teacher
                gJamiaIndex = structure.findIndex(j => j.jamiaName === urlJamiaName);
                if (gJamiaIndex === -1) throw new Error(`Is system me ${urlJamiaName} nahi mila.`);

                const jamiaTeachers = structure[gJamiaIndex].teachers || [];
                gTeacherIndex = jamiaTeachers.findIndex(t => t.loginCode.toLowerCase() === enteredCode.toLowerCase());

                if (gTeacherIndex === -1) {
                    throw new Error("Teacher Code galat hai. Kripya check karein.");
                }

                gTeacherData = jamiaTeachers[gTeacherIndex];

                // 4. Load UI if successful
                displayTeacherName.innerText = gTeacherData.name;
                loginContainer.classList.add('hidden');
                mainFormContainer.classList.remove('hidden');
                
                renderPeriodsUI(gTeacherData.periods || []);

            } catch (error) {
                console.error(error);
                alert(error.message);
            } finally {
                btnVerify.disabled = false;
                document.getElementById('btn-verify-text').innerText = "Verify & Open";
                document.getElementById('btn-verify-icon').className = "fas fa-arrow-right ml-2";
            }
        });

        // --- RENDER PERIODS UI ---
        function renderPeriodsUI(periods) {
            periodContainer.innerHTML = ''; // Clear container

            if(periods.length === 0) {
                periodContainer.innerHTML = `<div class="p-6 text-center text-slate-400 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                    <i class="fas fa-folder-open text-3xl mb-2"></i>
                    <p class="font-bold">Aapki koi class assign nahi hai.</p>
                </div>`;
                btnSave.classList.add('hidden');
                return;
            }

            periods.forEach((p, index) => {
                // Pehle se save kiya hua data (agar ho) nikalne ke liye
                const existingAchieved = (p.achieved && p.achieved[urlMonthIndex.toLowerCase()]) ? p.achieved[urlMonthIndex.toLowerCase()] : '';

                const row = document.createElement('div');
                row.className = "bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100 shadow-sm relative";
                row.innerHTML = `
                    <div class="mb-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-indigo-600 text-white text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-wider">Class</span>
                            <span class="font-black text-slate-700 text-sm">${p.className}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="bg-purple-600 text-white text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-wider">Subject</span>
                            <span class="font-bold text-slate-600 text-sm">${p.bookName}</span>
                        </div>
                    </div>
                    
                    <div class="bg-white p-3 rounded-xl border border-slate-200 flex items-center justify-between shadow-sm">
                        <span class="text-xs font-black text-slate-500 uppercase">Total Target: <span class="text-indigo-600">${p.totalPages}</span></span>
                        <div class="flex items-center gap-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase leading-none text-right">Kitne Pages<br>Padhaye?</label>
                            <input type="number" data-period-id="${p.id}" value="${existingAchieved}" class="achieved-input w-20 p-2 text-center text-lg outline-none font-black text-indigo-700 bg-indigo-50 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-400 transition-all" placeholder="0" required>
                        </div>
                    </div>
                `;
                periodContainer.appendChild(row);
            });
        }

        // --- FORM SUBMIT & SAVE LOGIC ---
        performanceForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Button Loading State
            const originalBtnContent = btnSave.innerHTML;
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Saving Data...</span>';
            btnSave.disabled = true;

            try {
                // Get all inputs
                const inputs = document.querySelectorAll('.achieved-input');
                
                // Hum main JSON object me values modify karenge
                inputs.forEach(input => {
                    const periodId = input.getAttribute('data-period-id');
                    const achievedValue = parseInt(input.value) || 0;

                    // Find corresponding period in gUserData memory
                    const periodIndex = gUserData.academicYears[gActiveYear].karkardagiStructure[gJamiaIndex].teachers[gTeacherIndex].periods.findIndex(p => p.id === periodId);
                    
                    if (periodIndex > -1) {
                        let periodRef = gUserData.academicYears[gActiveYear].karkardagiStructure[gJamiaIndex].teachers[gTeacherIndex].periods[periodIndex];
                        
                        // Agar achieved object nahi hai to banayein
                        if (!periodRef.achieved) {
                            periodRef.achieved = {};
                        }
                        
                        // Us mahine me value save karein (e.g. "apr": 15)
                        periodRef.achieved[urlMonthIndex.toLowerCase()] = achievedValue;
                    }
                });

                // Update the entire document back to Firestore
                const userRef = doc(db, "users", inspectorId);
                await updateDoc(userRef, {
                    academicYears: gUserData.academicYears
                });

                alert(`🎉 MashaAllah! Aapki karkardagi (${urlMonthIndex.toUpperCase()}) successfully save ho gayi hai.`);
                
            } catch (error) {
                console.error("Error saving data:", error);
                alert("Data save hone me error aayi. Kripya apna internet check karein.");
            } finally {
                btnSave.innerHTML = originalBtnContent;
                btnSave.disabled = false;
            }
        });
    </script>
</body>
</html>
