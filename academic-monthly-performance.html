<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Monthly Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-lg p-6">
        <h2 class="text-2xl font-bold text-indigo-600 mb-2">Monthly Performance</h2>
        <p id="target-jamia" class="text-slate-500 font-bold mb-8">Jamia: Loading...</p>

        <form id="performance-form" class="space-y-8">
            <div class="border-b pb-6">
                <h3 class="font-bold text-lg mb-4 text-slate-700"><i class="fas fa-user-tie mr-2"></i> Teacher Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="Teacher Name" class="p-3 border rounded-xl outline-indigo-500" required>
                    <input type="text" placeholder="Designation" class="p-3 border rounded-xl outline-indigo-500">
                </div>
            </div>

            <div>
                <h3 class="font-bold text-lg mb-4 text-slate-700"><i class="fas fa-clock mr-2"></i> Periods Detail</h3>
                <div id="period-container" class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" placeholder="Subject" class="flex-1 p-3 border rounded-xl">
                        <input type="number" placeholder="Total Periods" class="w-32 p-3 border rounded-xl">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700">
                SAVE PERFORMANCE DATA
            </button>
        </form>
    </div>

    <script type="module">
        // Firebase imports yahan aayenge (Auth aur Firestore)
        const urlParams = new URLSearchParams(window.location.search);
        const jamiaId = urlParams.get('jamiaId'); // Unique ID
        const jamiaName = urlParams.get('jamiaName');
        
        document.getElementById('target-jamia').textContent = `Jamia: ${jamiaName} (${jamiaId})`;
        
        // Save function me hum document ID ko jamiaId_Month ke taur par use karenge
    </script>
</body>
</html>
